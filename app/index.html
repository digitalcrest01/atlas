<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0e13" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'&gt;&lt;rect width='32' height='32' fill='%230b0e13' rx='6'/&gt;&lt;g transform='translate(16 16)'&gt;&lt;path d='M0 -11 L2.5 -2.5 L11 0 L2.5 2.5 L0 11 L-2.5 2.5 L-11 0 L-2.5 -2.5 Z' fill='%23d4a056'/&gt;&lt;/g&gt;&lt;/svg&gt;" />
<title>Myatlastic &middot; Explore Every Country</title>
<meta name="description" content="Explore all 195 countries with a photorealistic 3D globe. Capitals, currencies, cultures, history, daily challenges and quizzes." />
<meta property="og:title" content="Myatlastic · Explore Every Country" />
<meta property="og:description" content="Interactive world geography for kids and curious minds of all ages. 3D globe, daily challenges, quizzes, side-by-side comparisons." />
<meta property="og:type" content="website" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Myatlastic" />
<link rel="apple-touch-icon" href="/assets/icon.svg" />
<link rel="manifest" href="/manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e13;
    --panel: #11151c;
    --panel-2: #161b24;
    --ink: #e8e4d8;
    --ink-dim: #8a8676;
    --line: #232a36;
    --accent: #d4a056;
    --accent-2: #6ea8c4;
    --danger: #c97064;
    --success: #6fb87a;
    --lock: #b89460;
  }
  body.kids {
    --bg: #fef9e7;
    --panel: #ffffff;
    --panel-2: #fffbe6;
    --ink: #2b3142;
    --ink-dim: #6b7280;
    --line: #f1e7c4;
    --accent: #e07a3c;
    --accent-2: #2a86b7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    /* Use flex column layout. height: 100vh works everywhere;
       100dvh upgrades it where supported. */
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }
  button { font: inherit; color: inherit; cursor: pointer; }

  /* ===== HEADER ===== */
  header {
    flex: 0 0 auto;
    height: 56px;
    padding: env(safe-area-inset-top, 0) 16px 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .logo {
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-mark { width: 22px; height: 22px; flex-shrink: 0; }
  .logo-mark .star { fill: var(--accent); }
  .logo-mark .inner { fill: var(--bg); }
  .logo-mark .ring { stroke: var(--accent); fill: none; stroke-width: 1; opacity: 0.3; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .badge {
    background: var(--accent); color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 6px 10px;
    border-radius: 4px;
    border: none;
  }
  .streak {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
  }
  .kids-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-dim);
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.1em;
    background: transparent;
  }
  .kids-toggle.on { color: var(--accent); border-color: var(--accent); }

  /* ===== MODE TABS ===== */
  nav.tabs {
    flex: 0 0 auto;
    height: 48px;
    display: flex;
    background: var(--panel-2);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  nav.tabs button {
    flex: 1;
    min-width: 80px;
    background: transparent;
    border: none;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0 12px;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  nav.tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ===== MAIN ===== */
  main {
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Views fill main */
  .view {
    display: none;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }
  .view.active { display: flex; }

  /* ===== EXPLORE VIEW ===== */
  #view-explore { flex-direction: row; }
  @media (max-width: 900px) {
    #view-explore { flex-direction: column; }
  }
  .pane {
    display: none;
    flex-direction: column;
    overflow: hidden;
    background: var(--panel);
    min-height: 0;
  }
  /* Desktop: all three panes visible */
  @media (min-width: 901px) {
    .pane.list { display: flex; flex: 0 0 320px; border-right: 1px solid var(--line); }
    .pane.globe { display: flex; flex: 1 1 auto; }
    .pane.details { display: flex; flex: 0 0 400px; border-left: 1px solid var(--line); }
  }
  @media (min-width: 901px) and (max-width: 1200px) {
    .pane.list { flex-basis: 280px; }
    .pane.details { flex-basis: 340px; }
  }
  /* Mobile: only the active pane visible */
  @media (max-width: 900px) {
    .pane.mobile-active { display: flex; flex: 1 1 auto; }
  }

  /* ===== MOBILE BOTTOM BAR (only in explore mode) ===== */
  .mobile-bar {
    display: none;
    flex: 0 0 auto;
    height: 56px;
    padding-bottom: env(safe-area-inset-bottom, 0);
    background: var(--panel);
    border-top: 1px solid var(--line);
  }
  @media (max-width: 900px) {
    body.mode-explore .mobile-bar { display: flex; }
  }
  .mobile-bar button {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  .mobile-bar button .icon { font-size: 18px; }
  .mobile-bar button.active { color: var(--accent); }
  /* Back navigation */
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: 1px solid var(--line); color: var(--ink-dim);
    border-radius: 8px; padding: 8px 14px; font-size: 13px; font-family: inherit;
    cursor: pointer; margin-bottom: 14px;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .detail-back { display: none; }
  @media (max-width: 900px) {
    body.mode-explore .detail-back { display: inline-flex; }
  }

  /* ===== LIST PANE ===== */
  .list-controls {
    padding: 14px;
    border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 11px 14px;
    font-family: inherit;
    border-radius: 6px;
    font-size: 15px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .filter-chips {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .chip {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 5px 9px;
    border-radius: 3px;
  }
  .chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .country-list {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 6px 0 20px;
    min-height: 0;
  }
  .letter-group {
    padding: 10px 16px 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .country-item {
    padding: 11px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 48px;
    cursor: pointer;
    border-left: 3px solid transparent;
  }
  .country-item:hover { background: var(--panel-2); }
  .country-item.active {
    background: var(--panel-2);
    border-left-color: var(--accent);
  }
  .country-item .flag { font-size: 22px; flex-shrink: 0; }
  .country-item .name {
    flex: 1;
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .country-item .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }
  .country-item .lock { color: var(--lock); flex-shrink: 0; }
  .compare-btn {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--accent-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    min-width: 36px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .compare-btn.picked-a { background: var(--accent-2); color: var(--bg); border-color: var(--accent-2); }
  .compare-btn.picked-b { background: var(--success); color: var(--bg); border-color: var(--success); }

  /* ===== GLOBE PANE ===== */
  .pane.globe {
    position: relative;
    background: radial-gradient(ellipse at center, #18222f 0%, #050810 80%);
    padding: 0;
    min-height: 240px;
  }
  body.kids .pane.globe { background: radial-gradient(ellipse at center, #fff7d6 0%, #fef9e7 80%); }
  #globe-canvas {
    display: block;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
  #flat-map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: none;
  }
  body.flat-mode #globe-canvas { display: none; }
  body.flat-mode #flat-map { display: block; }
  .globe-label, .globe-hint {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    pointer-events: none;
    z-index: 2;
  }
  .globe-label { top: 14px; left: 14px; }
  .globe-hint {
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0.7;
  }
  .globe-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 3;
    background: rgba(17,21,28,0.82);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 20px;
    padding: 7px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }
  .globe-btn-2 { top: 50px; }
  .globe-btn-3 { top: 88px; }
  .globe-btn:hover { border-color: var(--accent); }
  .globe-btn.on { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  /* Explorer rank badge — explains the avatar (compass) bobbing on the globe */
  .globe-explorer {
    position: absolute; bottom: 12px; left: 12px; z-index: 3;
    background: rgba(17,21,28,0.82); border: 1px solid var(--line);
    color: var(--ink); border-radius: 16px; padding: 6px 11px;
    font-size: 12px; font-weight: 600; pointer-events: none;
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  }
  .globe-explorer .ge-ic { font-size: 15px; margin-right: 5px; }
  .globe-tooltip {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    display: none;
    pointer-events: none;
    z-index: 5;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .globe-tooltip .tt-flag { font-size: 22px; margin-right: 8px; vertical-align: middle; }
  .globe-tooltip .tt-name { font-weight: 600; vertical-align: middle; }
  .globe-tooltip .tt-cap {
    display: block;
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ===== DETAILS PANE ===== */
  .pane.details {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px 20px 24px;
  }
  .placeholder {
    color: var(--ink-dim);
    padding: 60px 20px;
    text-align: center;
    font-style: italic;
  }
  .detail-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }
  .detail-name {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.1;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .detail-flag { font-size: 34px; }
  .detail-image {
    margin: 14px 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: var(--panel-2);
    aspect-ratio: 16/9;
    position: relative;
  }
  .detail-image img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .img-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px; background: var(--panel-2);
  }
  .img-locked {
    position: absolute; inset: 0;
    background: rgba(11, 14, 19, 0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--lock);
    gap: 8px;
    cursor: pointer;
  }
  .img-locked .lock-icon { font-size: 28px; }
  .img-locked .lock-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .fact-grid {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 10px 14px;
    padding: 14px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 16px;
  }
  .fact-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding-top: 3px;
  }
  .fact-value { font-size: 14px; }
  .quick-facts {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  @media (min-width: 480px) {
    .quick-facts { grid-template-columns: 1fr 1fr 1fr; }
  }
  .qf-item {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .qf-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .qf-body {
    font-size: 13px;
    line-height: 1.4;
  }
  /* WOW FACT banner — surfaced first */
  .wow-fact {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: linear-gradient(135deg, rgba(212,160,86,0.16), rgba(110,168,196,0.10));
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 12px 14px;
    margin: 4px 0 14px;
    font-size: 15px;
    line-height: 1.45;
    color: var(--ink);
  }
  .wow-spark { font-size: 18px; line-height: 1.3; }
  .wow-label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 3px;
  }
  /* SAY HELLO card */
  .hello-card {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .hello-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-2);
    margin-bottom: 8px;
  }
  .hello-row { display: flex; align-items: center; gap: 10px; }
  .hello-word { font-size: 26px; font-weight: 700; color: var(--ink); }
  .hello-speak {
    background: var(--accent-2);
    border: none;
    color: var(--bg);
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
  }
  .hello-speak:active { transform: scale(0.9); }
  .hello-phon { font-size: 13px; color: var(--ink-dim); margin-top: 6px; }
  .hello-phon b { color: var(--accent-2); font-style: italic; }
  /* Phrasebook rows inside the hello card */
  .phrase-row { padding: 10px 0; border-top: 1px solid var(--line); }
  .phrase-row.first { border-top: none; padding-top: 2px; }
  .phrase-en {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 3px;
  }
  .phrase-main { display: flex; align-items: center; gap: 10px; }
  .phrase-loc { font-size: 20px; font-weight: 700; color: var(--ink); }
  .phrase-row.first .phrase-loc { font-size: 26px; }
  .phrase-speak { width: 34px; height: 34px; font-size: 16px; }
  .phrase-phon { font-size: 12px; color: var(--ink-dim); margin-top: 4px; }
  .phrase-phon b { color: var(--accent-2); font-style: italic; }
  /* NATIONAL ANTHEM card */
  .anthem-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; }
  .anthem-head { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .anthem-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); border: none; color: var(--bg); font-weight: 700; font-size: 14px; border-radius: 22px; padding: 9px 16px; cursor: pointer; transition: transform 0.1s, opacity 0.1s; }
  .anthem-btn:active { transform: scale(0.96); }
  .anthem-play { font-size: 12px; }
  .anthem-btn.playing { animation: speak-pulse 1s ease-in-out infinite; }
  .anthem-btn.playing .anthem-play::before { content: '⏸'; }
  .anthem-btn.playing .anthem-play { font-size: 0; }
  .anthem-btn.playing .anthem-play::before { font-size: 12px; }
  .anthem-note { font-size: 12px; color: var(--ink-dim); margin-top: 8px; }
  /* LANDMARK card */
  .landmark-card {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .landmark-card:hover { border-color: var(--accent); }
  .landmark-card:active { transform: scale(0.99); }
  .landmark-head { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .landmark-fact { font-size: 13px; line-height: 1.45; color: var(--ink-dim); }
  .landmark-cta { font-size: 12px; color: var(--accent); margin-top: 8px; font-weight: 600; }
  /* PASSPORT */
  .passport-wrap { max-width: 720px; margin: 0 auto; padding: 18px 16px 60px; }
  .explorer-card {
    display: flex; align-items: center; gap: 16px;
    background: linear-gradient(135deg, rgba(212,160,86,0.18), rgba(110,168,196,0.10));
    border: 1px solid var(--accent); border-radius: 16px; padding: 18px; margin-bottom: 22px;
  }
  .explorer-avatar { font-size: 52px; line-height: 1; flex-shrink: 0; }
  .explorer-meta { flex: 1; min-width: 0; }

    transform: translateX(-50%);

  /* Daily */
  .daily-flag { font-size: 50px; }
  .daily-title {
    font-size: 32px;
    font-weight: 600;
    line-height: 1.1;
    margin: 12px 0 6px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .hidden { display: none !important; }

  /* ===== FAVORITES ===== */
  .fav-btn {
    background: transparent;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    opacity: 0.4;
    transition: opacity 0.15s, transform 0.15s;
    flex-shrink: 0;
  }
  .fav-btn:hover { opacity: 0.8; }
  .fav-btn.active { opacity: 1; transform: scale(1.15); }
  .fav-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(212,160,86,0.12); color: var(--accent);
    border: 1px solid rgba(212,160,86,0.3);
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 3px 7px; border-radius: 3px; margin-right: 4px; margin-bottom: 4px;
    cursor: pointer;
  }
  .fav-chip:hover { background: rgba(212,160,86,0.22); }

  /* ===== SHARE BUTTON ===== */
  .share-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--accent-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    padding: 6px 10px; border-radius: 4px; cursor: pointer;
    transition: border-color 0.1s, color 0.1s;
  }
  .share-btn:hover { border-color: var(--accent-2); }

  /* ===== ACHIEVEMENT TOAST ===== */
  .achievement-toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--panel); border: 1px solid var(--accent);
    border-radius: 8px; padding: 12px 20px; z-index: 9000;
    font-size: 13px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .achievement-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
  .achievement-toast .badge-icon { font-size: 24px; display: block; margin-bottom: 4px; }
  .achievement-toast .badge-name { font-weight: 600; color: var(--accent); }
  .achievement-toast .badge-desc { color: var(--ink-dim); font-size: 11px; }

  /* ===== PROGRESS BAR ===== */
  .explore-progress {
    height: 2px; background: var(--line); flex-shrink: 0;
    overflow: hidden;
  }
  .explore-progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.4s ease; width: 0%;
  }

  /* ===== QUIZ STREAK COUNTER ===== */
  .quiz-streak-row {
    display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .quiz-streak-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--line);
    transition: background 0.2s;
  }
  .quiz-streak-dot.correct { background: var(--success); }
  .quiz-streak-dot.wrong { background: var(--danger); }

  /* ===== ONBOARDING TOOLTIP ===== */
  .onboard-tip {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: var(--bg);
    border-radius: 8px; padding: 10px 18px; z-index: 8000;
    font-size: 13px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em; text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    animation: tipFade 4s ease forwards;
    pointer-events: none;
  }
  .onboard-tip::before {
    content: '';
    position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
    border: 7px solid transparent; border-top-color: var(--accent);
    border-bottom: none;
  }
  @keyframes tipFade {
    0% { opacity: 0; transform: translateX(-50%) translateY(8px); }
    10% { opacity: 1; transform: translateX(-50%) translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-4px); }
  }
</style>
</head>
