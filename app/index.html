  {n:"Belarus",c:"Europe",cap:"Minsk",cur:"Belarusian ruble (BYN)",lang:"Belarusian, Russian",lat:53.71,lon:27.95,h:"Part of the Grand Duchy of Lithuania, then the Russian Empire and USSR. Independent since 1991, it has been ruled by Alexander Lukashenko since 1994. Closely allied with Russia, it served as a launch point for the 2022 invasion of Ukraine.",rel:"Eastern Orthodox majority, Catholic minority",cul:"Vyshyvanka embroidery, draniki potato pancakes, kupala festival, Slavic ballet.",fig:"Alexander Lukashenko; Svetlana Tikhanovskaya; Marc Chagall; Svetlana Alexievich (Nobel literature).",flag:"🇧🇾",img:"Belarus-Minsk-Independence_Square-2.jpg",pron:"BEL-uh-roos",pop:"9 million (2023)",indep:"1991 from the Soviet Union",sport:"Ice hockey, biathlon, gymnastics, football",food:"Draniki (potato pancakes), machanka, kvass, kolduny",attire:"Embroidered linen shirts (vyshyvanka tradition), woven sashes"},
  {n:"Belgium",c:"Europe",cap:"Brussels",cur:"Euro (EUR)",lang:"Dutch, French, German",lat:50.50,lon:4.47,h:"Independent from the Netherlands in 1830. Twice invaded by Germany in the World Wars. A federal monarchy divided between Dutch-speaking Flanders and French-speaking Wallonia, it hosts the headquarters of the EU and NATO.",rel:"Catholic historically, large secular share",cul:"Trilingual; comics (Tintin, Smurfs), beer, chocolate, surrealist art (Magritte), frites.",fig:"King Leopold II (controversial); Hergé; René Magritte; Eddy Merckx.",flag:"🇧🇪",img:"Grand-Place%2C_Brussels_-_panorama%2C_June_2018.jpg",pron:"BEL-jum",pop:"11.7 million (2023)",indep:"1830 from the Netherlands",sport:"Football, cycling, tennis",food:"Moules-frites, waffles, chocolate, stoofvlees, speculoos",attire:"Modern Western; regional folk dress for festivals (Gilles of Binche)"},
  {n:"Belize",c:"Central America",cap:"Belmopan",cur:"Belize dollar (BZD)",lang:"English",lat:17.19,lon:-88.49,h:"Formerly British Honduras, the only English-speaking country in Central America. Independent in 1981; Guatemala maintained a territorial claim until recent ICJ proceedings.",rel:"Christian (Catholic + Protestant)",cul:"Maya-Caribbean-British fusion, punta music, marine and rainforest tourism.",fig:"George Cadle Price (founding PM); Said Musa.",flag:"🇧🇿",img:"Caye_Caulker_Belize_aerial_(20688990128).jpg",pron:"buh-LEEZ",pop:"411,000 (2023)",indep:"1981 from the United Kingdom",sport:"Football, basketball, cycling, cricket",food:"Rice and beans, fry jacks, hudut (Garifuna fish stew), tamales",attire:"Maya and Garifuna traditional dress; modern Caribbean casual"},
  {n:"Benin",c:"Africa",cap:"Porto-Novo",cur:"West African CFA franc (XOF)",lang:"French",lat:9.30,lon:2.31,h:"Home to the powerful Kingdom of Dahomey before French colonisation. Independent in 1960, it had a Marxist period (1972-90) before transitioning to multi-party democracy.",rel:"Indigenous Vodun alongside Christianity and Islam",cul:"Birthplace of Vodun, bronze sculpture from Dahomey kingdom, vibrant textile arts.",fig:"King Behanzin (anti-French resistance); Mathieu Kérékou; Angélique Kidjo (singer).",flag:"🇧🇯",img:"Porte_du_non-retour_au_Benin.jpg",pron:"buh-NEEN",pop:"13.7 million (2023)",indep:"1960 from France",sport:"Football, athletics, taekwondo",food:"Kuli-kuli (peanut), pâte, akassa, fried plantains",attire:"Boubou robes, wax-print pagnes, headwraps (gele)"},
  {n:"Bhutan",c:"Asia",cap:"Thimphu",cur:"Bhutanese ngultrum (BTN)",lang:"Dzongkha",lat:27.51,lon:90.43,h:"A Himalayan Buddhist kingdom that maintained near-total isolation until the 1970s. Television was permitted only in 1999. Transitioned from absolute to constitutional monarchy in 2008 and famously measures Gross National Happiness.",rel:"Vajrayana Buddhism (state religion)",cul:"Gross National Happiness philosophy, dzong fortress-monasteries, archery, gho/kira dress.",fig:"King Jigme Singye Wangchuck (4th king, GNH); King Jigme Khesar.",flag:"🇧🇹",img:"Paro_Taktsang%2C_Bhutan_(edited).jpg",pron:"boo-TAHN",pop:"780,000 (2023)",indep:"Sovereign throughout; treaty with India 1949",sport:"Archery (national sport), darts, football",food:"Ema datshi (chilli-cheese, national dish), red rice, momos, butter tea",attire:"Gho (men's robe), kira (women's wrapped dress) — required in public"},
  {n:"Bolivia",c:"South America",cap:"Sucre (constitutional), La Paz (seat)",cur:"Bolivian boliviano (BOB)",lang:"Spanish, Quechua, Aymara",lat:-16.29,lon:-63.59,h:"Independent from Spain in 1825, named after Simón Bolívar. Lost its Pacific coastline to Chile in 1884. Has the largest indigenous population share in South America; Evo Morales became its first indigenous president in 2006.",rel:"Catholic majority with strong indigenous Andean beliefs",cul:"Aymara/Quechua heritage, Pachamama reverence, charango music, salar de Uyuni, coca culture.",fig:"Simón Bolívar; Evo Morales (first indigenous president); Túpac Katari.",flag:"🇧🇴",img:"Piles_of_Salt_Salar_de_Uyuni_Bolivia_Luca_Galuzzi_2006_a.jpg",pron:"buh-LIH-vee-uh",pop:"12 million (2023)",indep:"1825 from Spain",sport:"Football, racquetball, cycling",food:"Salteñas, silpancho, pique a lo macho, chuño, api",attire:"Pollera (Aymara women's layered skirt), bowler hat (cholita)"},
  {n:"Bosnia and Herzegovina",c:"Europe",cap:"Sarajevo",cur:"Convertible mark (BAM)",lang:"Bosnian, Croatian, Serbian",lat:43.92,lon:17.68,h:"Part of Yugoslavia until a brutal 1992-95 war that included the Srebrenica genocide. The Dayton Agreement created a complex three-presidency state divided between a Bosniak-Croat Federation and Republika Srpska.",rel:"Muslim, Orthodox, Catholic — three constituent peoples",cul:"Three intertwined Slavic traditions, ćevapi and burek, sevdah music, mosques and churches side by side.",fig:"Alija Izetbegović; Ivo Andrić (Nobel literature); Edin Džeko; Emir Kusturica.",flag:"🇧🇦",img:"Stari_Most_Mostar.jpg",pron:"BOZ-nee-uh and hert-suh-go-VEE-nuh",pop:"3.2 million (2023)",indep:"1992 from Yugoslavia",sport:"Football, basketball, handball",food:"Ćevapi, burek, sarma, baklava, Bosnian coffee",attire:"Dimije (women's loose trousers), fez, embroidered vests"},
  {n:"Botswana",c:"Africa",cap:"Gaborone",cur:"Botswana pula (BWP)",lang:"English, Tswana",lat:-22.33,lon:24.68,h:"A British protectorate (Bechuanaland) until independence in 1966. Diamond discoveries shortly after gave it one of Africa's most stable economies and longest democratic records.",rel:"Christian majority, indigenous beliefs",cul:"Tswana culture, San bushman heritage, Okavango Delta wildlife.",fig:"Sir Seretse Khama (founding president); Ian Khama; Mokgweetsi Masisi.",flag:"🇧🇼",img:"Okavango_Delta.jpg",pron:"bot-SWAH-nuh",pop:"2.7 million (2023)",indep:"1966 from the United Kingdom",sport:"Football, athletics, boxing",food:"Seswaa (pounded meat, national), pap, morogo, vetkoek",attire:"Letsema (Tswana cloak), German-influenced Herero dresses"},
  {n:"Brazil",c:"South America",cap:"Brasília",cur:"Brazilian real (BRL)",lang:"Portuguese",lat:-14.24,lon:-51.93,h:"A Portuguese colony from 1500. Uniquely became seat of the Portuguese Empire (1808-21) before declaring independence in 1822 as a monarchy. A republic since 1889, with a military dictatorship from 1964-85. Now the largest economy in Latin America.",states:[{n:"Acre",cap:"Rio Branco"},{n:"Bahia",cap:"Salvador"},{n:"Ceará",cap:"Fortaleza"},{n:"Federal District",cap:"Brasília"},{n:"Goiás",cap:"Goiânia"},{n:"Minas Gerais",cap:"Belo Horizonte"},{n:"Paraná",cap:"Curitiba"},{n:"Pernambuco",cap:"Recife"},{n:"Rio de Janeiro",cap:"Rio de Janeiro"},{n:"Rio Grande do Sul",cap:"Porto Alegre"},{n:"São Paulo",cap:"São Paulo"},{n:"...and 16 more states",cap:""}],rel:"Catholic (largest worldwide), growing Evangelical",cul:"Carnival, samba, bossa nova, capoeira, football, churrascaria barbecue.",fig:"Pelé; Ronaldo; Tom Jobim; Oscar Niemeyer; Lula da Silva.",flag:"🇧🇷",img:"Christ_the_Redeemer_-_Cristo_Redentor.jpg",pron:"bruh-ZIL",pop:"216 million (2023)",indep:"1822 from Portugal",sport:"Football (5 World Cups), volleyball, capoeira, MMA",food:"Feijoada (national), pão de queijo, açaí, brigadeiro, churrasco",attire:"Bahian baiana dress, Carnival costumes; modern casual elsewhere"},
  {n:"Brunei",c:"Asia",cap:"Bandar Seri Begawan",cur:"Brunei dollar (BND)",lang:"Malay",lat:4.54,lon:114.73,h:"Once ruled most of Borneo; reduced to its present small territory by Dutch and British expansion. A British protectorate from 1888, fully independent in 1984. An absolute Islamic monarchy under the Sultan, sustained by oil and gas.",rel:"Sunni Muslim (state religion)",cul:"Strict Islamic culture, sultan ceremonies, water villages (Kampong Ayer), oil-funded prosperity.",fig:"Sultan Hassanal Bolkiah (since 1967, world's longest-reigning current monarch).",flag:"🇧🇳",img:"Sunset_at_the_Sultan_Omar_Ali_Saifuddin_Mosque%2C_Bandar_Seri_Begawan%2C_Brunei_(10226450845).jpg",pron:"broo-NYE",pop:"452,000 (2023)",indep:"1984 from the United Kingdom",sport:"Football, sepak takraw, badminton",food:"Ambuyat (sago, national), nasi katok, satay, soto",attire:"Baju Melayu (men), baju kurung (women), tudong headscarf"},
  {n:"Bulgaria",c:"Europe",cap:"Sofia",cur:"Bulgarian lev (BGN)",lang:"Bulgarian",lat:42.73,lon:25.49,h:"Liberated from Ottoman rule in 1878. A Soviet satellite from 1946 until 1989. Joined NATO in 2004 and the EU in 2007.",rel:"Eastern Orthodox majority",cul:"Cyrillic origin, rose oil, folk music (Le Mystère des Voix Bulgares), kukeri rituals.",fig:"Tsar Simeon the Great; Vasil Levski; Christo (artist).",flag:"🇧🇬",img:"Alexander_Nevsky_Cathedral_Sofia.jpg",pron:"bul-GAIR-ee-uh",pop:"6.7 million (2023)",indep:"1908 from the Ottoman Empire (de jure)",sport:"Wrestling, weightlifting, football, gymnastics",food:"Banitsa, shopska salad, kebapche, tarator, yogurt (homeland)",attire:"Sukman (women's pinafore), nosia folk dress, kalpak fur hat"},
  {n:"Burkina Faso",c:"Africa",cap:"Ouagadougou",cur:"West African CFA franc (XOF)",lang:"French",lat:12.24,lon:-1.56,h:"Independent from France in 1960 as Upper Volta, renamed Burkina Faso ('land of upright people') in 1984 under revolutionary leader Thomas Sankara. Has suffered repeated coups, most recently in 2022, amid a worsening jihadist insurgency.",rel:"Muslim majority, Christian and indigenous",cul:"FESPACO (largest African film festival), mask traditions, balafon music (UNESCO).",fig:"Thomas Sankara ('Africa's Che Guevara'); Blaise Compaoré.",flag:"🇧🇫",img:"Sleeping_man_in_Ouagadougou.jpg",pron:"ber-KEE-nuh FAH-so",pop:"23 million (2023)",indep:"1960 from France",sport:"Football, cycling (Tour du Faso)",food:"Tô (millet porridge), riz gras, brochettes, dolo (millet beer)",attire:"Faso dan fani (handwoven cotton), boubous, headwraps"},
  {n:"Burundi",c:"Africa",cap:"Gitega",cur:"Burundian franc (BIF)",lang:"Kirundi, French, English",lat:-3.37,lon:29.92,h:"A Belgian-administered territory after WWI, independent in 1962. Decades of Hutu-Tutsi tensions culminated in a civil war (1993-2005) parallel to Rwanda's. Remains one of the world's poorest countries.",rel:"Catholic majority",cul:"Royal drummers of Burundi (UNESCO), village dance, agricultural culture.",fig:"King Mwami Mwambutsa IV; Pierre Nkurunziza.",flag:"🇧🇮",img:"Bujumbura_view.jpg",pron:"buh-ROON-dee",pop:"13.2 million (2023)",indep:"1962 from Belgium",sport:"Football, athletics (long-distance), drumming traditions",food:"Ugali, beans, fish from Lake Tanganyika, isombe, mukeke",attire:"Imvutano (wrapped cloth), beaded jewellery, drum performance regalia"},
  {n:"Cambodia",c:"Asia",cap:"Phnom Penh",cur:"Cambodian riel (KHR)",lang:"Khmer",lat:12.57,lon:104.99,h:"Heir to the great Khmer Empire (9th-15th century) that built Angkor Wat. A French protectorate from 1863. Suffered the Khmer Rouge genocide (1975-79) which killed an estimated 1.7 million. A constitutional monarchy under one-party rule today.",rel:"Theravada Buddhism (97%)",cul:"Angkor temples, apsara dance, amok and prahok cuisine, saffron-robed monks.",fig:"King Sihanouk; Pol Pot (Khmer Rouge); Hun Sen; Loung Ung (writer-survivor).",flag:"🇰🇭",img:"Angkor_Wat.jpg",pron:"kam-BO-dee-uh",pop:"16.9 million (2023)",indep:"1953 from France",sport:"Bokator (martial art), football, kickboxing, sepak takraw",food:"Amok (curry, national), num banh chok, lap khmer, prahok",attire:"Sampot (wrapped skirt), krama checked scarf, silk for ceremonies"},
  {n:"Cameroon",c:"Africa",cap:"Yaoundé",cur:"Central African CFA franc (XAF)",lang:"French, English",lat:7.37,lon:12.35,h:"A German colony divided between Britain and France after WWI. Independent in 1960-61. President Paul Biya has ruled since 1982. An Anglophone separatist conflict has destabilised the country since 2017.",rel:"Christian (south), Muslim (north), indigenous",cul:"250+ ethnic groups, makossa music (Manu Dibango), bilingual French/English, football.",fig:"Paul Biya; Manu Dibango; Roger Milla; Samuel Eto'o.",flag:"🇨🇲",img:"Mount_Cameroon.jpg",pron:"kam-uh-ROON",pop:"28 million (2023)",indep:"1960 from France; British Cameroons joined 1961",sport:"Football (Indomitable Lions), athletics, volleyball",food:"Ndolé (national), achu, fufu, koki, suya",attire:"Kaba (loose dress), boubou, toghu (men's embroidered robe)"},
  {n:"Canada",c:"North America",cap:"Ottawa",cur:"Canadian dollar (CAD)",lang:"English, French",lat:56.13,lon:-106.35,h:"Confederated in 1867 from British North American colonies. Acquired full legislative independence with the Statute of Westminster (1931) and constitutional independence in 1982. A federal parliamentary state with Quebec's francophone identity central to its politics.",states:[{n:"Alberta",cap:"Edmonton"},{n:"British Columbia",cap:"Victoria"},{n:"Manitoba",cap:"Winnipeg"},{n:"New Brunswick",cap:"Fredericton"},{n:"Newfoundland & Labrador",cap:"St. John's"},{n:"Nova Scotia",cap:"Halifax"},{n:"Ontario",cap:"Toronto"},{n:"PEI",cap:"Charlottetown"},{n:"Quebec",cap:"Quebec City"},{n:"Saskatchewan",cap:"Regina"},{n:"Northwest Territories",cap:"Yellowknife"},{n:"Nunavut",cap:"Iqaluit"},{n:"Yukon",cap:"Whitehorse"}],rel:"Christian historically, very secular now",cul:"Bilingual French/English heritage, multiculturalism, ice hockey, maple syrup, First Nations cultures, Quebec identity.",fig:"Sir John A. Macdonald; Pierre and Justin Trudeau; Wayne Gretzky; Margaret Atwood; Drake.",flag:"🇨🇦",img:"CN_Tower_Toronto.jpg",pron:"KAN-uh-duh",pop:"40 million (2023)",indep:"Confederation 1867; full sovereignty Statute of Westminster 1931",sport:"Ice hockey (winter), lacrosse (summer), curling, football",food:"Poutine, butter tarts, maple syrup, tourtière, Nanaimo bars",attire:"Modern Western; Indigenous regalia, ribbon shirts, Métis sashes"},
  {n:"Cape Verde",c:"Africa",cap:"Praia",cur:"Cape Verdean escudo (CVE)",lang:"Portuguese",lat:16.00,lon:-24.00,h:"Uninhabited islands settled by the Portuguese in the 15th century and used in the trans-Atlantic slave trade. Independent in 1975, it is one of Africa's most stable democracies.",rel:"Roman Catholic majority",cul:"Creole culture, morna and coladeira music (Cesária Évora), Portuguese-African fusion.",fig:"Cesária Évora ('barefoot diva'); Amílcar Cabral.",flag:"🇨🇻",img:"Carnival_participant_in_Mindelo%2C_Cape_Verde.jpg",pron:"KAH-bo VAIR-day",pop:"525,000 (2023)",indep:"1975 from Portugal",sport:"Football, basketball, athletics",food:"Cachupa (national stew), pastel com diabo dentro, grogue rum",attire:"Pano di terra (handwoven cloth), modern Lusophone casual"},
  {n:"Central African Republic",c:"Africa",cap:"Bangui",cur:"Central African CFA franc (XAF)",lang:"French, Sango",lat:6.61,lon:20.94,h:"Independent from France in 1960. Self-proclaimed Emperor Bokassa ruled in the 1970s. Has suffered chronic instability and civil conflict since the 2010s, with Russian Wagner forces playing a significant role.",rel:"Christian majority, Muslim and indigenous",cul:"Sango lingua franca, traditional pygmy music (UNESCO), diamond/forest cultures.",fig:"Jean-Bédel Bokassa (self-proclaimed emperor); David Dacko.",flag:"🇨🇫",img:"Republique_Centrafricaine_-_Boali_-_Chutes_de_Boali.jpg",pron:"SEN-trul AF-ri-kun ree-PUB-lik",pop:"5.5 million (2023)",indep:"1960 from France",sport:"Football, basketball, athletics",food:"Cassava-based dishes, fish, gozo, kanda ti nyma",attire:"Wax-print dresses, embroidered tunics, beaded ornaments"},
  {n:"Chad",c:"Africa",cap:"N'Djamena",cur:"Central African CFA franc (XAF)",lang:"French, Arabic",lat:15.45,lon:18.73,h:"Independent from France in 1960. Long-running conflicts with Libya and internal civil war. President Idriss Déby ruled for 30 years until killed in 2021; his son took power.",rel:"Muslim and Christian roughly equal",cul:"Sahara-Sahel divide, Toubou and Sara peoples, kanembu music, Lake Chad fishing.",fig:"Idriss Déby (30-year ruler); Hissène Habré (convicted dictator).",flag:"🇹🇩",img:"Lake_Chad%2C_Chad_-_Cameroon_-_Niger_-_Nigeria_(34083999803).jpg",pron:"CHAD",pop:"18 million (2023)",indep:"1960 from France",sport:"Football, wrestling, athletics",food:"Boule (millet porridge), maafe, grilled fish from Lake Chad",attire:"Boubou robes, tagelmust (Tuareg veil), embroidered caps"},
  {n:"Chile",c:"South America",cap:"Santiago",cur:"Chilean peso (CLP)",lang:"Spanish",lat:-35.68,lon:-71.54,h:"Independent from Spain in 1818. The 1973 US-backed coup overthrew socialist president Salvador Allende and installed Augusto Pinochet's military dictatorship until 1990. Now Latin America's most developed economy.",rel:"Catholic historically, growing secular share",cul:"Wine country, poetry (two Nobel laureates), Easter Island moai, copper mining.",fig:"Salvador Allende; Augusto Pinochet; Pablo Neruda; Gabriela Mistral; Michelle Bachelet.",flag:"🇨🇱",img:"Chilean_horse_rider_in_front_of_moai_at_Rano_Raraku%2C_Oc%2CG.T.1611%2C_Mana_Expedition_to_Easter_Island%2C_British_Museum.jpg",pron:"CHEE-lay",pop:"19.6 million (2023)",indep:"1818 from Spain",sport:"Football, tennis, rodeo (national sport), skiing",food:"Empanadas, pastel de choclo, cazuela, completo, curanto",attire:"Huaso outfit: chamanto poncho, wide-brimmed hat, riding boots"},
  {n:"China",c:"Asia",cap:"Beijing",cur:"Chinese yuan (CNY)",lang:"Mandarin",lat:35.86,lon:104.20,h:"A civilisation spanning over 4,000 years and successive dynasties. The Qing fell in 1911; the Communist Party under Mao won the civil war in 1949. Deng Xiaoping's reforms from 1978 transformed China into the world's second-largest economy.",states:[{n:"Beijing",cap:"Beijing"},{n:"Shanghai",cap:"Shanghai"},{n:"Guangdong",cap:"Guangzhou"},{n:"Sichuan",cap:"Chengdu"},{n:"Zhejiang",cap:"Hangzhou"},{n:"Jiangsu",cap:"Nanjing"},{n:"Shandong",cap:"Jinan"},{n:"Hubei",cap:"Wuhan"},{n:"Tibet (Aut. Region)",cap:"Lhasa"},{n:"Xinjiang (Aut. Region)",cap:"Ürümqi"},{n:"Hong Kong (SAR)",cap:"Hong Kong"},{n:"...and 23 more provinces",cap:""}],rel:"Officially atheist; folk religion, Buddhism, Taoism, Christianity, Islam present",cul:"5,000 years of continuous civilisation: Confucian ethics, calligraphy, opera, tea, regional cuisines, Lunar New Year.",fig:"Confucius; Qin Shi Huang; Mao Zedong; Deng Xiaoping; Xi Jinping; Sun Yat-sen.",flag:"🇨🇳",img:"Great_Wall_of_China.jpg",pron:"CHY-nuh",pop:"1.41 billion (2023)",indep:"Continuous civilisation; modern republic 1912; People's Republic 1949",sport:"Table tennis, badminton, martial arts, football, basketball",food:"Regional cuisines: Sichuan (spicy), Cantonese (dim sum), Hunan, Shandong",attire:"Hanfu (historic), qipao/cheongsam, tangzhuang; modern Western daily"},
  {n:"Colombia",c:"South America",cap:"Bogotá",cur:"Colombian peso (COP)",lang:"Spanish",lat:4.57,lon:-74.30,h:"Independent from Spain in 1819 as part of Gran Colombia. A six-decade civil conflict involving FARC guerrillas, paramilitaries and drug cartels formally ended with a 2016 peace deal, though violence continues in parts.",rel:"Catholic majority",cul:"Cumbia and vallenato, magical realism literature, coffee culture, salsa.",fig:"Simón Bolívar; Gabriel García Márquez (Nobel literature); Shakira.",flag:"🇨🇴",img:"Sector_Antiguo_de_Cartagena%2C_Colombia_01.jpg",pron:"kuh-LUM-bee-uh",pop:"52 million (2023)",indep:"1810 from Spain (full 1819)",sport:"Football, cycling, baseball (Caribbean coast)",food:"Arepas, bandeja paisa, ajiaco, sancocho, lechona",attire:"Sombrero vueltiao, ruana poncho, pollera, guayabera shirt"},
  {n:"Comoros",c:"Africa",cap:"Moroni",cur:"Comorian franc (KMF)",lang:"Comorian, Arabic, French",lat:-11.65,lon:43.33,h:"A volcanic archipelago colonised by France, independent in 1975. Notorious for repeated coups (more than 20 attempts since independence). The island of Mayotte voted to remain French.",rel:"Sunni Muslim",cul:"Arab-African-French mix, ylang-ylang perfume, dhow boats.",fig:"Ahmed Abdallah; Azali Assoumani.",flag:"🇰🇲",img:"Mosque_in_Moroni%2C_Comoros_(3923026238).jpg",pron:"KOM-uh-rohz",pop:"850,000 (2023)",indep:"1975 from France",sport:"Football, athletics",food:"Langouste à la vanille, mataba, pilao, samosas",attire:"Shiromani (women's wrap), kandu (men's robe), kofia cap"},
  {n:"Congo (DRC)",c:"Africa",cap:"Kinshasa",cur:"Congolese franc (CDF)",lang:"French",lat:-4.04,lon:21.76,h:"Belgian colonial rule under King Leopold II was extraordinarily brutal. Independent in 1960, the country endured Mobutu's 32-year dictatorship and then two Congo Wars (1996-2003) often called Africa's World War, killing millions. Eastern provinces remain unstable.",rel:"Christian majority, indigenous",cul:"Soukous/rumba (Papa Wemba), masks, sapeur fashion, mineral economy.",fig:"Patrice Lumumba; Mobutu Sese Seko; Félix Tshisekedi; Papa Wemba.",flag:"🇨🇩",img:"Congo_River_from_Kinshasa_in_Democratic_Republic_of_the_Congo_(DRC).jpg",pron:"KON-go (DRC)",pop:"102 million (2023)",indep:"1960 from Belgium",sport:"Football, basketball (DRC produces many NBA players)",food:"Fufu, mwambé, pondu (cassava leaves), liboke fish",attire:"Liputa wax-prints, abacost (men's suit), beaded jewellery"},
  {n:"Congo (Republic)",c:"Africa",cap:"Brazzaville",cur:"Central African CFA franc (XAF)",lang:"French",lat:-0.23,lon:15.83,h:"A former French colony, independent in 1960. Brief Marxist period followed by civil wars in the 1990s. Denis Sassou Nguesso has dominated politics for most of the period since 1979.",rel:"Christian majority",cul:"Rumba music, bantu traditions, Brazzaville cultural twin of Kinshasa.",fig:"Marien Ngouabi; Denis Sassou Nguesso (long ruler).",flag:"🇨🇬",img:"Poto-Poto_(arrondissement_3)%2C_Brazzaville_(municipality)%2C_Brazzaville_(department)%2C_Congo-Brazzaville_(CAPELLA_C09_SP_GEO_HH_20241122001705_20241122001731).png",pron:"KON-go",pop:"6 million (2023)",indep:"1960 from France",sport:"Football, basketball, handball",food:"Saka-saka (cassava leaves), poulet à la moambé, fumbwa",attire:"Pagne wax-prints, boubous, headwraps"},
  {n:"Costa Rica",c:"Central America",cap:"San José",cur:"Costa Rican colón (CRC)",lang:"Spanish",lat:9.75,lon:-83.75,h:"Independent from Spain in 1821. Famously abolished its military in 1948 after a brief civil war. The most stable democracy in Central America.",rel:"Catholic majority",cul:"'Pura vida', ecotourism leader, coffee culture, no military, biodiversity.",fig:"Óscar Arias (Nobel Peace); José Figueres.",flag:"🇨🇷",img:"Arenal_Volcano_-_Costa_Rica_-_by_Ardyiii.jpg",pron:"KOS-tuh REE-kuh",pop:"5.2 million (2023)",indep:"1821 from Spain",sport:"Football, surfing, cycling",food:"Gallo pinto (national), casado, ceviche, olla de carne, tres leches",attire:"Traditional folk dress for festivals; modern Latin American casual"},
  {n:"Côte d'Ivoire",c:"Africa",cap:"Yamoussoukro",cur:"West African CFA franc (XOF)",lang:"French",lat:7.54,lon:-5.55,h:"Independent from France in 1960. Long stable under founding president Houphouët-Boigny, it descended into civil war in 2002-07 and again 2010-11. The world's largest cocoa producer.",rel:"Christian and Muslim roughly equal, indigenous",cul:"Cocoa capital, zouglou and coupé-décalé music, masks and goldweights.",fig:"Félix Houphouët-Boigny; Alassane Ouattara; Didier Drogba.",flag:"🇨🇮",img:"Notre-Dame-de-la-Paix_de_Yamoussoukro_2.jpg",pron:"EYE-vree COAST",pop:"29 million (2023)",indep:"1960 from France",sport:"Football (Drogba era), athletics, taekwondo",food:"Attiéké (cassava couscous), kedjenou, alloco, foutou, garba",attire:"Kente-influenced cloth, boubou robes, pagne wax prints"},
  {n:"Croatia",c:"Europe",cap:"Zagreb",cur:"Euro (EUR)",lang:"Croatian",lat:45.10,lon:15.20,h:"Part of Yugoslavia until 1991. Its war of independence and the wider Yugoslav wars ended in 1995. Joined the EU in 2013 and the eurozone in 2023.",rel:"Roman Catholic majority",cul:"Adriatic culture, klapa singing (UNESCO), Game of Thrones filming locations, wine and olive oil.",fig:"Marshal Tito (born Croatia); Franjo Tuđman; Nikola Tesla (born here); Luka Modrić.",flag:"🇭🇷",img:"Old_Town_roofs%2C_with_the_Franciscan_Church_and_Monastery_tower_visible%2C_Dubrovnik%2C_Croatia_(PPL3-Altered)_julesvernex2.jpg",pron:"kro-AY-shuh",pop:"3.85 million (2023)",indep:"1991 from Yugoslavia",sport:"Football, water polo, handball, basketball",food:"Pašticada, peka, ćevapi, štrukli, Dalmatian seafood",attire:"Lika folk costume, Slavonian embroidery, red Šibenik cap"},
  {n:"Cuba",c:"Caribbean",cap:"Havana",cur:"Cuban peso (CUP)",lang:"Spanish",lat:21.52,lon:-77.78,h:"Spanish colony until 1898, then a US-dominated republic. Fidel Castro's 1959 revolution established a one-party communist state. The 1962 Missile Crisis brought the world close to nuclear war. US economic embargo remains largely in place.",rel:"Catholic historically, large secular share, Santería folk religion",cul:"Son, mambo, salsa origins; vintage cars, cigars and rum, baseball, revolutionary iconography.",fig:"Fidel Castro; Che Guevara; José Martí; Celia Cruz; Buena Vista Social Club.",flag:"🇨🇺",img:"AvMalecon-LaHabanaCuba-04735.jpg",pron:"KYOO-buh",pop:"11.2 million (2023)",indep:"1902 from US occupation (after 1898 Spanish war)",sport:"Baseball (national passion), boxing, athletics, volleyball",food:"Ropa vieja, lechón asado, moros y cristianos, tostones",attire:"Guayabera shirt (national), white linen, rumba dress for performance"},
  {n:"Cyprus",c:"Europe",cap:"Nicosia",cur:"Euro (EUR)",lang:"Greek, Turkish",lat:35.13,lon:33.43,h:"Independent from Britain in 1960. Turkey invaded in 1974 in response to a Greek-backed coup; the island has been divided since, with the self-declared Turkish Republic of Northern Cyprus recognised only by Turkey. Joined the EU in 2004.",rel:"Greek Orthodox (south), Sunni Muslim (north)",cul:"Divided island, halloumi and meze, Greek/Turkish heritage, Aphrodite mythology.",fig:"Archbishop Makarios III; Mustafa Akıncı.",flag:"🇨🇾",img:"Paphos%2C_Cyprus%2C_Aphrodite's_Rock%2C_eastern_end.jpg",pron:"SY-pruss",pop:"1.26 million (2023)",indep:"1960 from the United Kingdom",sport:"Football, tennis, sailing",food:"Halloumi, meze, kleftiko, souvla, loukoumades",attire:"Vraka (men's baggy trousers), saya dress, embroidered Lefkara lace"},
  {n:"Czech Republic",c:"Europe",cap:"Prague",cur:"Czech koruna (CZK)",lang:"Czech",lat:49.82,lon:15.47,h:"Heart of the Bohemian crown, then Czechoslovakia from 1918. Soviet invasion crushed the 1968 Prague Spring. The 1989 Velvet Revolution ended communist rule, followed by the peaceful 1993 split with Slovakia.",rel:"Historically Catholic, now one of Europe's most secular",cul:"Pilsner beer (Czech invention), Kafka and Kundera, glassmaking, puppet theatre.",fig:"Václav Havel; Tomáš Masaryk; Franz Kafka; Antonín Dvořák; Milan Kundera.",flag:"🇨🇿",img:"Prague_07-2016_View_from_Petrinska_Tower_img2.jpg",pron:"CHEH-kee-uh",pop:"10.5 million (2023)",indep:"1918 (from Austria-Hungary); 1993 split from Slovakia",sport:"Ice hockey, football, tennis, athletics",food:"Svíčková, knedlíky (dumplings), goulash, trdelník, Pilsner beer",attire:"Kroj folk costume (regional variation), embroidered blouses"},
  {n:"Denmark",c:"Europe",cap:"Copenhagen",cur:"Danish krone (DKK)",lang:"Danish",lat:56.26,lon:9.50,h:"One of the world's oldest monarchies, with Viking roots. A constitutional monarchy since 1849. Includes the autonomous territories of Greenland and the Faroe Islands. EU member since 1973 but retains its own currency.",rel:"Lutheran historically, very secular",cul:"Hygge, design (Lego, Bang & Olufsen), smørrebrød, Vikings, cycling.",fig:"Hans Christian Andersen; Søren Kierkegaard; Niels Bohr; Mads Mikkelsen.",flag:"🇩🇰",img:"Nyhavn_Copenhagen.jpg",pron:"DEN-mark",pop:"5.93 million (2023)",indep:"Sovereign throughout (one of the oldest monarchies)",sport:"Football, handball, cycling, sailing",food:"Smørrebrød, frikadeller, æbleskiver, rugbrød, Danish pastry",attire:"Egnsdragt regional folk costume; minimalist modern fashion"},
  {n:"Djibouti",c:"Africa",cap:"Djibouti",cur:"Djiboutian franc (DJF)",lang:"French, Arabic",lat:11.83,lon:42.59,h:"Independent from France in 1977. Strategically located on the Bab-el-Mandeb strait, it now hosts foreign military bases including those of the US, France, China and Japan.",rel:"Sunni Muslim",cul:"Afar and Somali traditions, salt-flat landscapes, strategic port culture.",fig:"Hassan Gouled Aptidon; Ismaïl Omar Guelleh.",flag:"🇩🇯",img:"Lake_Assal_1-Djibouti.jpg",pron:"ji-BOO-tee",pop:"1.13 million (2023)",indep:"1977 from France",sport:"Football, athletics (distance running)",food:"Skoudehkaris, lahoh, fah-fah, sambusa",attire:"Macawiis (men's sarong), garbasaar (women's shawl), dirac dress"},
  {n:"Dominica",c:"Caribbean",cap:"Roseau",cur:"East Caribbean dollar (XCD)",lang:"English",lat:15.41,lon:-61.37,h:"Contested between France and Britain in the 18th century, ceded to Britain in 1763. Independent in 1978. Heavily damaged by Hurricane Maria in 2017.",rel:"Catholic majority",cul:"Carib (Kalinago) indigenous heritage uniquely preserved, soca/calypso, rainforest hiking.",fig:"Dame Eugenia Charles (Caribbean's first female PM).",flag:"🇩🇲",img:"Dominica_boiling_lake.jpg",pron:"dom-i-NEE-kuh",pop:"73,000 (2023)",indep:"1978 from the United Kingdom",sport:"Cricket, football, athletics",food:"Mountain chicken (frog), callaloo soup, pelau, fresh fish",attire:"Wob dwiyèt (national dress), madras headtie"},
  {n:"Dominican Republic",c:"Caribbean",cap:"Santo Domingo",cur:"Dominican peso (DOP)",lang:"Spanish",lat:18.74,lon:-70.16,h:"Site of the first permanent European settlement in the Americas (1496). Independent from Haiti in 1844. Endured the brutal Trujillo dictatorship (1930-61); a stable democracy since the late 1970s.",rel:"Catholic majority",cul:"Merengue and bachata, baseball (many MLB stars), Spanish colonial Santo Domingo.",fig:"Rafael Trujillo (dictator); Juan Bosch; Pedro Martínez; Albert Pujols.",flag:"🇩🇴",img:"Santo_Domingo%2C_Dominican_Republic._Streets_of_Colonial_zone.jpg",pron:"duh-MIN-i-kun ree-PUB-lik",pop:"11.3 million (2023)",indep:"1844 from Haiti (after Spanish rule)",sport:"Baseball (national obsession, many MLB stars), boxing, basketball",food:"La bandera (rice, beans, meat), sancocho, mangú, mofongo",attire:"Guayabera, traje de merengue for dance; modern Caribbean casual"},
  {n:"Ecuador",c:"South America",cap:"Quito",cur:"US dollar (USD)",lang:"Spanish",lat:-1.83,lon:-78.18,h:"Independent in 1830 after the break-up of Gran Colombia. Adopted the US dollar in 2000 after a banking crisis. Politics has swung between left-populism and conservatism; security has deteriorated sharply with the rise of drug-trafficking gangs.",rel:"Catholic majority",cul:"Galápagos Islands (Darwin), Andean indigenous textiles, ceviche, Otavalo markets.",fig:"Simón Bolívar; Eloy Alfaro; Rafael Correa; Oswaldo Guayasamín.",flag:"🇪🇨",img:"Quito_old_town%2C_Ecuador.jpg",pron:"EK-wuh-dor",pop:"18.2 million (2023)",indep:"1822 from Spain",sport:"Football, ecuavoley (volleyball variant), athletics",food:"Ceviche, llapingachos, encebollado, hornado, locro",attire:"Otavalo indigenous dress: anaco wrap, embroidered blouse, panama hat"},
  {n:"Egypt",c:"Africa",cap:"Cairo",cur:"Egyptian pound (EGP)",lang:"Arabic",lat:26.82,lon:30.80,h:"Home to one of humanity's oldest civilisations along the Nile. Successively conquered by Persians, Greeks, Romans, Arabs, and Ottomans. A British protectorate from 1882; fully independent in 1952 after the Free Officers' coup. The 2011 revolution ousted Mubarak; Sisi has ruled since 2014.",rel:"Sunni Muslim majority, Coptic Christian minority",cul:"Pharaonic civilisation, Arabic-speaking heart of the Arab world, Cairo cinema, koshari cuisine.",fig:"Pharaohs (Tutankhamun, Cleopatra); Nasser; Sadat; Mubarak; Naguib Mahfouz; Umm Kulthum.",flag:"🇪🇬",img:"Pyramids_of_Giza%2C_Egypt_-_Cairo_skyline_in_the_background_-_panoramio.jpg",pron:"EE-jipt",pop:"112 million (2023)",indep:"1922 from the United Kingdom (full 1952)",sport:"Football, squash (world-leading), handball",food:"Koshari (national), ful medames, molokhia, mahshi, kunafa",attire:"Galabeya robe, hijab, traditional Bedouin dress in Sinai"},
  {n:"El Salvador",c:"Central America",cap:"San Salvador",cur:"US dollar (USD)",lang:"Spanish",lat:13.79,lon:-88.90,h:"Independent in 1821. A brutal civil war (1980-92) between US-backed government forces and FMLN guerrillas killed 75,000. Under President Bukele since 2019, the country has cracked down hard on gangs and became the first to adopt Bitcoin as legal tender.",rel:"Catholic and growing Evangelical Christian",cul:"Pupusa national dish, surf culture, indigenous Pipil-Nahua heritage.",fig:"Óscar Romero (assassinated archbishop, saint); Nayib Bukele.",flag:"🇸🇻",img:"Church_of_San_Justo_and_Church_of_El_Salvador%2C_Segovia.jpg",pron:"el SAL-vuh-dor",pop:"6.36 million (2023)",indep:"1821 from Spain",sport:"Football, surfing, baseball",food:"Pupusas (national), yuca frita, tamales, atol de elote",attire:"Bordado embroidered blouses, full skirts; modern casual daily"},
  {n:"Equatorial Guinea",c:"Africa",cap:"Malabo",cur:"Central African CFA franc (XAF)",lang:"Spanish, French, Portuguese",lat:1.65,lon:10.27,h:"The only Spanish-speaking country in sub-Saharan Africa. Independent in 1968. President Teodoro Obiang has ruled since 1979, making him the world's longest-serving non-royal leader. Oil wealth has not translated into broad development.",rel:"Catholic majority",cul:"Bantu and Fang traditions, only Spanish-speaking African nation.",fig:"Francisco Macías Nguema; Teodoro Obiang (since 1979).",flag:"🇬🇶",img:"Santa_Isabel_Malabo_20131224_140204.jpg",pron:"ee-kwuh-TOR-ee-ul GIN-ee",pop:"1.7 million (2023)",indep:"1968 from Spain",sport:"Football, athletics, basketball",food:"Succotash, palm soup, pepe soup, plantains, fish",attire:"Wax-print pagnes, boubous, Spanish-influenced formal wear"},
  {n:"Eritrea",c:"Africa",cap:"Asmara",cur:"Eritrean nakfa (ERN)",lang:"Tigrinya, Arabic, English",lat:15.18,lon:39.78,h:"Italian colony, then under British administration, then federated with Ethiopia in 1952 and annexed in 1962. A 30-year war of independence ended in 1993. Has been ruled by Isaias Afwerki ever since with no elections and indefinite national service.",rel:"Christian (Orthodox) and Muslim roughly equal",cul:"Italian colonial architecture in Asmara (UNESCO), Tigrinya culture, coffee ceremony.",fig:"Isaias Afwerki (since 1993).",flag:"🇪🇷",img:"Cinema_Impero_Asmara%2C_Eritrea_(30660837982).jpg",pron:"er-i-TREE-uh",pop:"3.7 million (2023)",indep:"1993 from Ethiopia",sport:"Cycling (national strength), football, athletics",food:"Injera with stews (zigni, alicha), kicha, shiro",attire:"Zuria (women's white dress), netela shawl, regional ethnic variation"},
  {n:"Estonia",c:"Europe",cap:"Tallinn",cur:"Euro (EUR)",lang:"Estonian",lat:58.60,lon:25.01,h:"Briefly independent (1918-40), then absorbed into the USSR. Regained independence in 1991. Joined NATO and EU in 2004. A leader in digital governance, including the world's first online national elections.",rel:"Mostly non-religious; Lutheran and Orthodox minorities",cul:"Song Festival tradition, digital-first society (e-Estonia, Skype origin), saunas.",fig:"Konstantin Päts; Lennart Meri; Arvo Pärt (composer).",flag:"🇪🇪",img:"Tallinna_vanalinn_p%C3%A4ikeset%C3%B5usu_ajal.jpg",pron:"es-TOH-nee-uh",pop:"1.37 million (2023)",indep:"1991 from the Soviet Union (first independence 1918)",sport:"Skiing, athletics, basketball, wrestling",food:"Kama, black bread, sült, mulgipuder, marinated sprats",attire:"Rahvariided folk dress: striped skirts, embroidered blouses"},
  {n:"Eswatini",c:"Africa",cap:"Mbabane (admin), Lobamba (legislative)",cur:"Swazi lilangeni (SZL)",lang:"Swazi, English",lat:-26.52,lon:31.47,h:"A British protectorate, independent in 1968 as Swaziland; renamed Eswatini in 2018. Africa's last absolute monarchy, ruled by King Mswati III.",rel:"Christian majority with indigenous Swazi beliefs",cul:"Umhlanga reed dance (largest in Africa), Incwala kingship ceremony.",fig:"King Mswati III; King Sobhuza II (long-serving father).",flag:"🇸🇿",img:"Mlilwane_Wildlife_Sanctuary_in_Eswatini_banner.jpg",pron:"es-wah-TEE-nee",pop:"1.2 million (2023)",indep:"1968 from the United Kingdom",sport:"Football, athletics, traditional dance competitions",food:"Sidvudvu (pumpkin porridge), siphuphe, slambu, emasi",attire:"Lihiya (cloth wrap), emajobo skins (royal), beadwork"},
  {n:"Ethiopia",c:"Africa",cap:"Addis Ababa",cur:"Ethiopian birr (ETB)",lang:"Amharic",lat:9.15,lon:40.49,h:"One of the world's oldest continuous nations and the only African country never fully colonised (briefly occupied by Italy 1936-41). The 1974 revolution overthrew Emperor Haile Selassie. The 2020-22 Tigray war killed an estimated 600,000.",rel:"Ethiopian Orthodox Christian majority, large Muslim minority",cul:"Coffee origin, Ge'ez script, injera and wat, rock-hewn churches at Lalibela.",fig:"Haile Selassie; Menelik II; Abiy Ahmed (Nobel Peace then war); Haile Gebrselassie.",flag:"🇪🇹",img:"Bete_Giyorgis_Lalibela_Ethiopia.jpg",pron:"ee-thee-OH-pee-uh",pop:"127 million (2023)",indep:"Sovereign throughout (briefly occupied by Italy 1936-41)",sport:"Long-distance running (Olympic dominance), football",food:"Injera (national bread), doro wat, kitfo, shiro, tibs",attire:"Habesha kemis (white embroidered dress), netela shawl, gabi"},
  {n:"Fiji",c:"Oceania",cap:"Suva",cur:"Fijian dollar (FJD)",lang:"English, Fijian, Hindi",lat:-17.71,lon:178.07,h:"A British colony from 1874, independent in 1970. Tensions between indigenous Fijians and the Indian-descended population (brought as indentured labour) drove four coups between 1987 and 2006.",rel:"Christian (Methodist majority), Hindu and Muslim minorities",cul:"Indigenous Fijian and Indo-Fijian cultures, kava ceremonies, rugby passion, meke dance.",fig:"Ratu Sir Kamisese Mara; Sitiveni Rabuka.",flag:"🇫🇯",img:"Yasawa_Islands%2C_Fiji_-_August_2016.jpg",pron:"FEE-jee",pop:"925,000 (2023)",indep:"1970 from the United Kingdom",sport:"Rugby sevens (Olympic champions), rugby union, football",food:"Kokoda (fish ceviche), lovo (earth oven), rourou, kava",attire:"Sulu (wrapped skirt for both sexes), masi (tapa) cloth for ceremonies"},
  {n:"Finland",c:"Europe",cap:"Helsinki",cur:"Euro (EUR)",lang:"Finnish, Swedish",lat:61.92,lon:25.75,h:"Part of Sweden, then Russia; independent in 1917. The Winter War (1939-40) saw Finland resist Soviet invasion. Maintained careful neutrality through the Cold War, then joined the EU in 1995 and NATO in 2023 after Russia's invasion of Ukraine.",rel:"Lutheran historically, large secular share",cul:"Sauna culture, sisu, Moomins, Nokia, design (Marimekko, Aalto), heavy metal density.",fig:"Mannerheim; Jean Sibelius; Linus Torvalds; Tove Jansson (Moomins); Sanna Marin.",flag:"🇫🇮",img:"Helsinki_Cathedral.jpg",pron:"FIN-lund",pop:"5.55 million (2023)",indep:"1917 from Russia",sport:"Ice hockey, skiing, athletics, pesäpallo (national, Finnish baseball)",food:"Karjalanpiirakka, salmon soup, ruisleipä, korvapuusti, reindeer",attire:"Kansallispuku folk dress (regional), Sámi gákti in Lapland"},
  {n:"France",c:"Europe",cap:"Paris",cur:"Euro (EUR)",lang:"French",lat:46.23,lon:2.21,h:"Shaped by the 1789 Revolution, Napoleonic empire, and successive republics. A major colonial power until decolonisation in the mid-20th century. A founding member of the EU and a permanent UN Security Council member with nuclear weapons. Currently in its Fifth Republic, founded by de Gaulle in 1958.",rel:"Catholic historically, strong secularism (laïcité), large Muslim minority",cul:"Cuisine (Michelin), wine, fashion (Paris), film (nouvelle vague), philosophy, café culture.",fig:"Napoleon; Louis XIV; de Gaulle; Victor Hugo; Voltaire; Marie Curie; Coco Chanel.",flag:"🇫🇷",img:"Eiffel_Tower_from_Champ_de_Mars.jpg",pron:"FRANS",pop:"68 million (2023)",indep:"Continuous statehood; Fifth Republic 1958",sport:"Football, rugby, cycling (Tour de France), tennis",food:"Baguette, croissant, coq au vin, ratatouille, escargot, cheese",attire:"Modern fashion capital; Breton stripes, beret are folk markers"},
  {n:"Gabon",c:"Africa",cap:"Libreville",cur:"Central African CFA franc (XAF)",lang:"French",lat:-0.80,lon:11.61,h:"Independent from France in 1960. The Bongo family ruled for 56 years until ousted by a military coup in 2023. Oil-dependent economy.",rel:"Christian majority",cul:"Fang masks, equatorial rainforest, sapeur subculture, oil-dependent modern life.",fig:"Omar Bongo (43-year ruler); Ali Bongo (ousted 2023).",flag:"🇬🇦",img:"Loango_National_Park.jpg",pron:"ga-BON",pop:"2.4 million (2023)",indep:"1960 from France",sport:"Football, basketball, athletics",food:"Poulet nyembwe, manioc, plantain, fresh river fish",attire:"Boubous, wax-print pagnes, Bwiti ceremonial dress"},
  {n:"Gambia",c:"Africa",cap:"Banjul",cur:"Gambian dalasi (GMD)",lang:"English",lat:13.44,lon:-15.31,h:"A narrow strip along the Gambia River, a British colony, independent in 1965. Yahya Jammeh seized power in 1994 and ruled for 22 years before losing an election and being forced out by ECOWAS troops in 2017.",rel:"Sunni Muslim majority",cul:"Mandinka and Wolof cultures, kora music, slave-trade history (Kunta Kinte).",fig:"Dawda Jawara; Yahya Jammeh (dictator); Adama Barrow.",flag:"🇬🇲",img:"Banjul_Arch_22.jpg",pron:"GAM-bee-uh",pop:"2.7 million (2023)",indep:"1965 from the United Kingdom",sport:"Football, wrestling (traditional), athletics",food:"Domoda (peanut stew), benachin (jollof rice), yassa, akara",attire:"Grand boubou, kaftans, headwraps, indigo dyed cloth"},
  {n:"Georgia",c:"Asia",cap:"Tbilisi",cur:"Georgian lari (GEL)",lang:"Georgian",lat:42.32,lon:43.36,h:"One of the world's earliest Christian states (4th century). Part of the Russian Empire and USSR; independent again in 1991. The 2003 Rose Revolution brought reform. Russia recognised the breakaway regions of South Ossetia and Abkhazia after the 2008 war.",rel:"Georgian Orthodox Christian",cul:"Ancient winemaking (8,000 years), unique script, polyphonic singing (UNESCO), khachapuri.",fig:"Shevardnadze; Saakashvili; Stalin (born Gori); Zaza Pachulia.",flag:"🇬🇪",img:"20110421_Tbilisi_Georgia_Panoramic.jpg",pron:"JOR-juh",pop:"3.7 million (2023)",indep:"1991 from the Soviet Union",sport:"Rugby, wrestling, football, judo",food:"Khachapuri (cheese bread), khinkali, mtsvadi, lobio, churchkhela",attire:"Chokha (men's wool coat with cartridges), kabalakhi cap, papakhi"},
  {n:"Germany",c:"Europe",cap:"Berlin",cur:"Euro (EUR)",lang:"German",lat:51.17,lon:10.45,h:"Unified in 1871 under Prussia. Defeated in two World Wars; the second left it divided 1949-90 along the Cold War's central fault line. Reunification, EU integration, and the lasting weight of Nazi-era memory define modern German identity.",states:[{n:"Baden-Württemberg",cap:"Stuttgart"},{n:"Bavaria",cap:"Munich"},{n:"Berlin",cap:"Berlin"},{n:"Brandenburg",cap:"Potsdam"},{n:"Bremen",cap:"Bremen"},{n:"Hamburg",cap:"Hamburg"},{n:"Hesse",cap:"Wiesbaden"},{n:"Lower Saxony",cap:"Hanover"},{n:"Meck.-Vorpommern",cap:"Schwerin"},{n:"North Rhine-W.",cap:"Düsseldorf"},{n:"Rhineland-Palatinate",cap:"Mainz"},{n:"Saarland",cap:"Saarbrücken"},{n:"Saxony",cap:"Dresden"},{n:"Saxony-Anhalt",cap:"Magdeburg"},{n:"Schleswig-Holstein",cap:"Kiel"},{n:"Thuringia",cap:"Erfurt"}],rel:"Christian (Catholic/Protestant equal) historically, large secular and Muslim share now",cul:"Beer and bread, Christmas markets, automotive engineering, classical music (Bach, Beethoven), Berlin techno.",fig:"Bach; Beethoven; Einstein; Marx; Bismarck; Hitler (dark legacy); Merkel; Goethe.",flag:"🇩🇪",img:"Bundesarchiv_Bild_183-85458-0002%2C_Berlin%2C_Mauerbau%2C_Kampfgruppen_am_Brandenburger_Tor.jpg",pron:"JER-muh-nee",pop:"84.5 million (2023)",indep:"Unification 1871; reunification 1990",sport:"Football (4 World Cups), motorsport, handball, gymnastics",food:"Bratwurst, sauerkraut, pretzels, schnitzel, sauerbraten, beer (purity law)",attire:"Lederhosen and dirndl (Bavarian); modern Western daily"},
  {n:"Ghana",c:"Africa",cap:"Accra",cur:"Ghanaian cedi (GHS)",lang:"English",lat:7.95,lon:-1.02,h:"Heir to the great Ashanti Empire. The first sub-Saharan African colony to gain independence (1957) under Kwame Nkrumah. After military rule in the 1970s-80s, has been a stable multi-party democracy since 1992.",rel:"Christian majority, Muslim north",cul:"Kente cloth, highlife music, drumming traditions, palm-wine culture.",fig:"Kwame Nkrumah (pan-African); Jerry Rawlings; Kofi Annan (UN Secretary-General).",flag:"🇬🇭",img:"Cape_Coast_Castle.jpg",pron:"GAH-nuh",pop:"34 million (2023)",indep:"1957 from the United Kingdom (first sub-Saharan independence)",sport:"Football (Black Stars), boxing (multiple world champions)",food:"Jollof rice, banku, fufu, waakye, kelewele",attire:"Kente cloth (Ashanti, woven), smock (northern), beadwork"},
  {n:"Greece",c:"Europe",cap:"Athens",cur:"Euro (EUR)",lang:"Greek",lat:39.07,lon:21.82,h:"The cradle of Western philosophy, democracy and theatre. Under Ottoman rule for nearly 400 years until independence in 1830. Joined the EU in 1981. The 2009 debt crisis triggered years of severe austerity.",rel:"Greek Orthodox majority",cul:"Birthplace of philosophy (Plato, Aristotle, Socrates) and democracy, Mediterranean diet, ouzo and souvlaki.",fig:"Socrates; Plato; Aristotle; Alexander the Great; Maria Callas; Aristotle Onassis.",flag:"🇬🇷",img:"Attica_06-13_Athens_50_View_from_Philopappos_-_Acropolis_Hill.jpg",pron:"GREES",pop:"10.4 million (2023)",indep:"1830 from the Ottoman Empire",sport:"Football, basketball (Euroleague success), athletics, water polo",food:"Moussaka, souvlaki, gyros, feta, dolmades, baklava, tzatziki",attire:"Foustanella (men's pleated skirt of evzones), embroidered vests"},
  {n:"Grenada",c:"Caribbean",cap:"St. George's",cur:"East Caribbean dollar (XCD)",lang:"English",lat:12.26,lon:-61.60,h:"A British colony, independent in 1974. A leftist coup and counter-coup led to US military invasion in 1983.",rel:"Catholic and Protestant Christian",cul:"Spice island (nutmeg, mace), calypso, oil-down national dish.",fig:"Eric Gairy; Maurice Bishop (leftist PM, assassinated).",flag:"🇬🇩",img:"Grand_Anse_Beach_Grenada.jpg",pron:"gruh-NAY-duh",pop:"126,000 (2023)",indep:"1974 from the United Kingdom",sport:"Cricket, athletics, football",food:"Oil down (national, breadfruit stew), nutmeg dishes, callaloo",attire:"Wob dwiyèt and madras; modern Caribbean casual"},
  {n:"Guatemala",c:"Central America",cap:"Guatemala City",cur:"Guatemalan quetzal (GTQ)",lang:"Spanish",lat:15.78,lon:-90.23,h:"The heart of the ancient Maya civilisation. Independent from Spain in 1821. A US-backed 1954 coup overthrew the elected government and triggered a 36-year civil war that killed 200,000, mostly indigenous Maya.",rel:"Catholic and Evangelical, indigenous Maya beliefs",cul:"Maya heritage (Tikal), textile weaving, marimba, Antigua colonial city.",fig:"Rigoberta Menchú (Nobel Peace); Miguel Ángel Asturias (Nobel literature).",flag:"🇬🇹",img:"Tikal_Temple_I.jpg",pron:"gwah-tuh-MAH-luh",pop:"17.6 million (2023)",indep:"1821 from Spain",sport:"Football, athletics, racquetball",food:"Pepián (national), kaq'ik, tamales, jocón, rellenitos",attire:"Huipil (embroidered blouse) and corte skirt — distinctive Maya weaving"},
  {n:"Guinea",c:"Africa",cap:"Conakry",cur:"Guinean franc (GNF)",lang:"French",lat:9.95,lon:-9.70,h:"The only French colony to reject de Gaulle's 1958 community offer and choose immediate independence. France withdrew vindictively. A series of authoritarian governments since, with a military coup in 2021.",rel:"Sunni Muslim majority",cul:"Mandinka griot tradition, djembe drumming origin, bauxite economy.",fig:"Ahmed Sékou Touré; Alpha Condé.",flag:"🇬🇳",img:"Un_aper%C3%A7u_de_la_ville_de_conakry.jpg",pron:"GIN-ee",pop:"13.9 million (2023)",indep:"1958 from France",sport:"Football, athletics, basketball",food:"Jollof rice, fouti, peanut soup, plantains, fonio",attire:"Boubou, wax-print dresses, Mandinka embroidery"},
  {n:"Guinea-Bissau",c:"Africa",cap:"Bissau",cur:"West African CFA franc (XOF)",lang:"Portuguese",lat:11.80,lon:-15.18,h:"Independent from Portugal in 1974 after a long liberation war. Chronic political instability and a notorious role as a cocaine transit point have plagued it.",rel:"Muslim, Christian and indigenous",cul:"Balanta, Fula, Mandinka cultures, kriol creole, cashew economy.",fig:"Amílcar Cabral (assassinated); Luís Cabral.",flag:"🇬🇼",img:"Mahindra_Gambia_tractor%2C_Bijagos_Archipelago%2C_Guinea-Bissau.jpg",pron:"GIN-ee bi-SOW",pop:"2.1 million (2023)",indep:"1974 from Portugal",sport:"Football, athletics, basketball",food:"Jollof rice, cachupa, peanut stew, palm wine",attire:"Pano de pente woven cloth, kaftans, headwraps"},
  {n:"Guyana",c:"South America",cap:"Georgetown",cur:"Guyanese dollar (GYD)",lang:"English",lat:4.86,lon:-58.93,h:"The only English-speaking country in South America. A British colony, independent in 1966. Massive 2015 offshore oil discoveries are transforming its economy into one of the world's fastest-growing.",rel:"Christian, Hindu, Muslim",cul:"Caribbean-South American-Indian mix, calypso and chutney, cricket, rainforest interior.",fig:"Cheddi Jagan; Forbes Burnham; Walter Rodney.",flag:"🇬🇾",img:"Kaieteur_Falls_Guyana_(2)_2007.jpg",pron:"guy-AH-nuh",pop:"813,000 (2023)",indep:"1966 from the United Kingdom",sport:"Cricket (national passion), football, basketball",food:"Pepperpot (national), roti, cook-up rice, metemgee",attire:"Multicultural: shalwar kameez, African wraps, Amerindian dress"},
  {n:"Haiti",c:"Caribbean",cap:"Port-au-Prince",cur:"Haitian gourde (HTG)",lang:"French, Haitian Creole",lat:18.97,lon:-72.29,h:"The world's first successful slave revolution led to independence from France in 1804, the first Black republic. Crippled by indemnity payments to France, US occupation (1915-34), Duvalier dictatorships, and the catastrophic 2010 earthquake. Currently in a state of near-collapse with gang control of much of the country.",rel:"Catholic with strong Vodou tradition",cul:"Vodou origin, kompa music, Creole language, world's first Black republic, vivid Haitian art.",fig:"Toussaint Louverture; Jean-Jacques Dessalines; François 'Papa Doc' Duvalier; Jean-Bertrand Aristide.",flag:"🇭🇹",img:"Citadelle_Laferri%C3%A8re.jpg",pron:"HAY-tee",pop:"11.7 million (2023)",indep:"1804 from France (first successful slave revolt republic)",sport:"Football, basketball, athletics",food:"Griot (fried pork), diri ak djon djon, soup joumou (independence soup, UNESCO)",attire:"Karabela dress, madras headtie, denim and embroidered blouses"},
  {n:"Honduras",c:"Central America",cap:"Tegucigalpa",cur:"Honduran lempira (HNL)",lang:"Spanish",lat:15.20,lon:-86.24,h:"Independent in 1821. The original 'banana republic', dominated by US fruit companies. A 2009 coup and persistent gang violence have shaped recent decades.",rel:"Catholic and Evangelical Christian",cul:"Maya ruins at Copán, Garifuna coastal culture, baleadas, banana republic history.",fig:"Manuel Zelaya (deposed); Juan Orlando Hernández (jailed).",flag:"🇭🇳",img:"Ruinas_MAYA_Copan_Honduras_10.jpg",pron:"hon-DUR-us",pop:"10.6 million (2023)",indep:"1821 from Spain",sport:"Football, baseball, basketball",food:"Baleadas, plato típico, sopa de caracol, anafres",attire:"Embroidered blouses, full skirts, Garifuna dress on coast"},
  {n:"Hungary",c:"Europe",cap:"Budapest",cur:"Hungarian forint (HUF)",lang:"Hungarian",lat:47.16,lon:19.50,h:"A central European kingdom from 1000 AD, dual core of the Habsburg Empire from 1867. Lost two-thirds of its territory at Trianon (1920). Soviet satellite from 1947; the 1956 uprising was crushed by Soviet tanks. EU member since 2004, governed by Viktor Orbán's Fidesz since 2010 with an increasingly illiberal turn.",rel:"Catholic majority, Protestant minority",cul:"Goulash and paprika, thermal baths (Budapest), folk music, Liszt and Bartók, unique Magyar language.",fig:"Liszt; Bartók; Puskás (football); Imre Nagy; Viktor Orbán.",flag:"🇭🇺",img:"Hungarian_Parliament_Building.jpg",pron:"HUN-guh-ree",pop:"9.6 million (2023)",indep:"1918 (from Austria-Hungary); 1989 end of communism",sport:"Water polo (Olympic dominance), football, fencing, swimming",food:"Goulash (national), paprikás csirke, lángos, dobos torte, pálinka",attire:"Matyó embroidery (UNESCO), bunda fur coats, kalocsai blouses"},
  {n:"Iceland",c:"Europe",cap:"Reykjavík",cur:"Icelandic króna (ISK)",lang:"Icelandic",lat:64.96,lon:-19.02,h:"Settled by Norse and Celts from the 9th century. Home to one of the world's oldest parliaments (Althing, 930 AD). Independent from Denmark in 1944. The 2008 banking collapse devastated the economy; recovery came through tourism and tough creditor measures.",rel:"Lutheran historically, large secular share",cul:"Sagas literature, hot-spring bathing, elf folklore, geothermal economy.",fig:"Björk; Halldór Laxness (Nobel literature); Vigdís Finnbogadóttir (first elected female president, 1980).",flag:"🇮🇸",img:"View_of_Reykjav%C3%ADk_from_Hallgr%C3%ADmskirkja%2C_20230507_1229_5733.jpg",pron:"EYES-lund",pop:"395,000 (2023)",indep:"1944 from Denmark",sport:"Football (men and women), handball, glíma (folk wrestling)",food:"Lamb stew, skyr, hákarl (fermented shark), plokkfiskur, rye bread",attire:"Lopapeysa wool sweater (modern national), þjóðbúningurinn folk dress"},
  {n:"India",c:"Asia",cap:"New Delhi",cur:"Indian rupee (INR)",lang:"Hindi, English",lat:20.59,lon:78.96,h:"Home to one of humanity's oldest civilisations and the birthplace of Hinduism, Buddhism, Jainism and Sikhism. The British Raj (1858-1947) ended with independence and the traumatic partition that created Pakistan. The world's largest democracy and now most populous country.",states:[{n:"Andhra Pradesh",cap:"Amaravati"},{n:"Assam",cap:"Dispur"},{n:"Bihar",cap:"Patna"},{n:"Delhi",cap:"New Delhi"},{n:"Goa",cap:"Panaji"},{n:"Gujarat",cap:"Gandhinagar"},{n:"Karnataka",cap:"Bengaluru"},{n:"Kerala",cap:"Thiruvananthapuram"},{n:"Maharashtra",cap:"Mumbai"},{n:"Punjab",cap:"Chandigarh"},{n:"Rajasthan",cap:"Jaipur"},{n:"Tamil Nadu",cap:"Chennai"},{n:"Telangana",cap:"Hyderabad"},{n:"Uttar Pradesh",cap:"Lucknow"},{n:"West Bengal",cap:"Kolkata"},{n:"...and 13 more states/UTs",cap:""}],rel:"Hindu majority; Muslim, Christian, Sikh, Buddhist, Jain — birthplace of four major religions",cul:"Diwali, Holi, regional cuisines, Bollywood (largest film output), classical music, yoga, sari, 22 official languages.",fig:"Gandhi; Nehru; Indira Gandhi; B.R. Ambedkar; Tagore (Nobel literature); A.R. Rahman; Sachin Tendulkar.",flag:"🇮🇳",img:"Taj_Mahal%2C_Agra%2C_India.jpg",pron:"IN-dee-uh",pop:"1.43 billion (2023, world's largest)",indep:"1947 from the United Kingdom",sport:"Cricket (national passion), hockey (8 Olympic golds), kabaddi, chess",food:"Regional: biryani, curry, dosa, samosa, tandoori, sweets (laddu, jalebi)",attire:"Sari, salwar kameez, lehenga (women); kurta, dhoti, sherwani (men)"},
  {n:"Indonesia",c:"Asia",cap:"Jakarta (Nusantara from 2024)",cur:"Indonesian rupiah (IDR)",lang:"Indonesian",lat:-0.79,lon:113.92,h:"A Dutch colony from the 17th century until Sukarno's 1945 declaration of independence, recognised in 1949. The world's largest Muslim-majority country and an archipelago of over 17,000 islands. Suharto's authoritarian 'New Order' (1966-98) gave way to democracy. The capital is being moved to Nusantara on Borneo.",rel:"Sunni Muslim majority (world's largest); Hindu (Bali), Christian, Buddhist minorities",cul:"Batik textiles (UNESCO), gamelan, wayang puppet theatre, satay and rendang.",fig:"Sukarno; Suharto; Joko Widodo.",flag:"🇮🇩",img:"Borobudur_Temple.jpg",pron:"in-doh-NEE-zhuh",pop:"278 million (2023)",indep:"1945 from the Netherlands",sport:"Badminton (Olympic powerhouse), pencak silat, football",food:"Nasi goreng, rendang, satay, gado-gado, soto, sambal",attire:"Batik (UNESCO), kebaya, sarong, regional dress across 17,000 islands"},
  {n:"Iran",c:"Asia",cap:"Tehran",cur:"Iranian rial (IRR)",lang:"Persian",lat:32.43,lon:53.69,h:"The heir to ancient Persia. The 1953 CIA/MI6 coup restored the Shah; his rule ended with the 1979 Islamic Revolution led by Khomeini. The 1980-88 war with Iraq killed hundreds of thousands. Now a theocratic republic under international sanctions over its nuclear programme.",rel:"Shia Muslim (95%); small Christian, Zoroastrian, Jewish minorities",cul:"Persian poetry (Hafez, Rumi, Ferdowsi), Nowruz, carpets, kebab and rice cuisine.",fig:"Cyrus the Great; Darius; the Pahlavi shahs; Ayatollahs Khomeini and Khamenei; Shirin Ebadi (Nobel Peace).",flag:"🇮🇷",img:"Iranian_Handicraft.JPG",pron:"ee-RAHN",pop:"89 million (2023)",indep:"Continuous statehood as Persia; Islamic Republic 1979",sport:"Wrestling (national), football, weightlifting, volleyball",food:"Chelo kabab (national), ghormeh sabzi, fesenjan, tahdig, saffron rice",attire:"Chador and hijab (women), traditional Persian tunics and trousers"},
  {n:"Iraq",c:"Asia",cap:"Baghdad",cur:"Iraqi dinar (IQD)",lang:"Arabic, Kurdish",lat:33.22,lon:43.68,h:"Mesopotamia, cradle of civilisation. Created from Ottoman provinces by Britain after WWI. Saddam Hussein's Ba'athist rule (1979-2003) included wars with Iran and Kuwait. The 2003 US-led invasion overthrew Saddam and triggered years of insurgency and the rise of ISIS.",rel:"Shia Muslim majority, Sunni and Christian minorities",cul:"Mesopotamian cradle of civilisation (writing, the wheel), Arabic poetry, masgouf cuisine.",fig:"Saddam Hussein; Hammurabi (ancient lawgiver); Gertrude Bell (helped form modern Iraq).",flag:"🇮🇶",img:"Ruins_of_the_ancient_city_of_Babylon%2C_Iraq%2C_6th_century_BC.jpg",pron:"ee-RAHK",pop:"45 million (2023)",indep:"1932 from the United Kingdom",sport:"Football, weightlifting, athletics",food:"Masgouf (national, grilled fish), dolma, kebab, tashreeb, baklava",attire:"Dishdasha (men), abaya (women), Kurdish dress in the north"},
  {n:"Ireland",c:"Europe",cap:"Dublin",cur:"Euro (EUR)",lang:"Irish, English",lat:53.41,lon:-8.24,h:"Under English/British rule for centuries. The 1916 Easter Rising and War of Independence led to the 1922 Free State and full republic in 1949. The Troubles in Northern Ireland (1968-98) ended with the Good Friday Agreement. Joined the EU in 1973.",rel:"Catholic majority, increasingly secular",cul:"Literary giants (Joyce, Yeats, Beckett, Wilde, Heaney), trad music, Guinness, Gaelic games.",fig:"James Joyce; W.B. Yeats; Samuel Beckett; Oscar Wilde; Bono; Mary Robinson; Michael Collins.",flag:"🇮🇪",img:"Cliffs_of_Moher.jpg",pron:"EYE-er-lund",pop:"5.13 million (2023)",indep:"1922 from the United Kingdom (Free State); 1949 Republic",sport:"Gaelic football, hurling (national), rugby, football",food:"Irish stew, soda bread, boxty, colcannon, Guinness, smoked salmon",attire:"Aran sweater, Irish dance dresses, modern Western daily"},
  {n:"Israel",c:"Asia",cap:"Jerusalem (claimed); Tel Aviv (most embassies)",cur:"Israeli new shekel (ILS)",lang:"Hebrew, Arabic",lat:31.05,lon:34.85,h:"Established in 1948 following the UN partition plan and Holocaust. Multiple wars with Arab neighbours and ongoing conflict with Palestinians, particularly intense since the October 2023 Hamas attacks and the subsequent Gaza war.",rel:"Jewish majority, Muslim, Christian, Druze minorities",cul:"Hebrew revived as living language, kibbutz tradition, 'Startup Nation' tech culture, Holocaust memory.",fig:"Ben-Gurion; Golda Meir; Rabin (assassinated); Peres; Netanyahu; Theodor Herzl.",flag:"🇮🇱",img:"Jerusalem-2013-Temple_Mount-Dome_of_the_Rock_%26_Chain_02.jpg",pron:"IZ-ree-ul",pop:"9.7 million (2023)",indep:"1948",sport:"Football, basketball, judo, sailing",food:"Hummus, falafel, shakshuka, sabich, bourekas, challah",attire:"Kippah, tallit (religious); shtreimel (Hasidic); modern casual"},
  {n:"Italy",c:"Europe",cap:"Rome",cur:"Euro (EUR)",lang:"Italian",lat:41.87,lon:12.57,h:"Heart of the Roman Empire and the Renaissance. Unified as a kingdom in 1861. Mussolini's fascist regime (1922-43) allied with Nazi Germany. A republic since 1946 and founding EU member, marked by frequent government turnover.",rel:"Catholic (Vatican enclave)",cul:"Renaissance art (Michelangelo, Leonardo), opera (Verdi, Puccini), regional cuisines, fashion (Milan), Roman heritage.",fig:"Julius Caesar; Leonardo da Vinci; Michelangelo; Galileo; Dante; Garibaldi; Sophia Loren; Pavarotti.",flag:"🇮🇹",img:"Colosseum_in_Rome-April_2007-1-_copie_2B.jpg",pron:"IT-uh-lee",pop:"58.8 million (2023)",indep:"Unification 1861; Republic 1946",sport:"Football (4 World Cups), cycling, motorsport (Ferrari), fencing",food:"Pasta (hundreds of shapes), pizza (Neapolitan UNESCO), risotto, espresso",attire:"Fashion capital (Milan); regional folk dress for festivals"},
  {n:"Jamaica",c:"Caribbean",cap:"Kingston",cur:"Jamaican dollar (JMD)",lang:"English",lat:18.11,lon:-77.30,h:"A Spanish then British colony built on sugar and slavery. Independent in 1962. Birthplace of reggae and Rastafarianism.",rel:"Christian (mainly Protestant), Rastafari tradition",cul:"Reggae (Bob Marley), Rastafarianism birthplace, jerk cuisine, sprinting prowess, patois.",fig:"Bob Marley; Marcus Garvey; Usain Bolt; Shelly-Ann Fraser-Pryce; Michael Manley.",flag:"🇯🇲",img:"Jamaica_Dunns_River_Falls.jpg",pron:"juh-MAY-kuh",pop:"2.8 million (2023)",indep:"1962 from the United Kingdom",sport:"Athletics (Bolt, sprinting dominance), cricket, football",food:"Jerk chicken, ackee and saltfish (national), curry goat, festival",attire:"Bandana check (national fabric), Rastafarian red-gold-green knits"},
  {n:"Japan",c:"Asia",cap:"Tokyo",cur:"Japanese yen (JPY)",lang:"Japanese",lat:36.20,lon:138.25,h:"Closed to the outside world for centuries until forced open in 1853. The Meiji Restoration (1868) launched rapid industrialisation. Imperial expansion ended with defeat in WWII and the atomic bombings of Hiroshima and Nagasaki. Postwar pacifist constitution and economic miracle made it the world's third-largest economy.",rel:"Shinto and Buddhist (often practised together)",cul:"Tea ceremony, sushi and ramen, manga and anime, samurai legacy, kabuki and noh, cherry blossom, J-pop.",fig:"Emperors (Naruhito current); Shinzo Abe (assassinated 2022); Akira Kurosawa; Hayao Miyazaki; Haruki Murakami.",flag:"🇯🇵",img:"View_towards_Mount_Fuji_from_Arakurayama_Sengen_Park_in_Fujiyoshida%2C_Yamanashi%2C_Japan%2C_2024_May_-_2.jpg",pron:"juh-PAN",pop:"124 million (2023)",indep:"Sovereign throughout; legendary founding 660 BCE",sport:"Sumo (national), baseball, judo, karate, football",food:"Sushi, ramen, tempura, soba, washoku tradition (UNESCO heritage)",attire:"Kimono (formal), yukata (summer), hakama (men), happi for festivals"},
  {n:"Jordan",c:"Asia",cap:"Amman",cur:"Jordanian dinar (JOD)",lang:"Arabic",lat:30.59,lon:36.24,h:"Created from a British mandate after WWI. The Hashemite monarchy has ruled since independence (1946), navigating conflicts with Israel and absorbing waves of Palestinian, Iraqi and Syrian refugees.",rel:"Sunni Muslim majority, small Christian minority",cul:"Bedouin heritage, Petra rock city (Nabatean), mansaf national dish.",fig:"King Hussein; King Abdullah II; Queen Rania.",flag:"🇯🇴",img:"Al_Khazneh_Petra.jpg",pron:"JOR-dn",pop:"11.3 million (2023)",indep:"1946 from British mandate",sport:"Football, basketball, taekwondo",food:"Mansaf (national, lamb and yogurt), maqluba, knafeh, falafel",attire:"Keffiyeh (red-and-white), thobe, embroidered Palestinian-style dresses"},
  {n:"Kazakhstan",c:"Asia",cap:"Astana",cur:"Kazakhstani tenge (KZT)",lang:"Kazakh, Russian",lat:48.02,lon:66.92,h:"The last Soviet republic to declare independence (December 1991). Nursultan Nazarbayev ruled until 2019; his successor Tokayev consolidated power after 2022 unrest. Oil-rich and the largest landlocked country in the world.",rel:"Sunni Muslim majority, Russian Orthodox minority",cul:"Kazakh nomadic heritage, eagle hunting, horse culture, beshbarmak.",fig:"Nazarbayev; Tokayev; Abay Qunanbaiuly (national poet).",flag:"🇰🇿",img:"Night_at_Esil_District%2C_Astana_(P1190721).jpg",pron:"KAH-zak-stan",pop:"20 million (2023)",indep:"1991 from the Soviet Union",sport:"Boxing, wrestling, kokpar (horseback), football",food:"Beshbarmak (national), kazy, baursak, kumis (fermented mare's milk)",attire:"Chapan robe, saukele (bridal hat), kalpak (felt hat)"},
  {n:"Kenya",c:"Africa",cap:"Nairobi",cur:"Kenyan shilling (KES)",lang:"Swahili, English",lat:-0.02,lon:37.91,h:"A British colony where the Mau Mau Uprising (1952-60) preceded independence in 1963. Long ruled by Jomo Kenyatta and Daniel arap Moi. Now East Africa's largest economy and a regional tech hub.",rel:"Christian majority, Muslim on coast",cul:"Maasai and Kikuyu cultures, safari, distance running tradition (Eldoret), Swahili coast.",fig:"Jomo Kenyatta; Uhuru Kenyatta; William Ruto; Wangari Maathai (Nobel Peace); Eliud Kipchoge.",flag:"🇰🇪",img:"Three_zebras_in_Masai_Mara_National_Park%2C_Kenya.jpg",pron:"KEN-yuh",pop:"55 million (2023)",indep:"1963 from the United Kingdom",sport:"Long-distance running (Olympic dominance), rugby, football",food:"Ugali, nyama choma, sukuma wiki, githeri, chapati",attire:"Maasai shuka (red checked cloth), kanga and kitenge wraps"},
  {n:"Kiribati",c:"Oceania",cap:"South Tarawa",cur:"Australian dollar (AUD)",lang:"English, Gilbertese",lat:-3.37,lon:-168.73,h:"A British protectorate, independent in 1979. 33 atolls spread across the Pacific; severely threatened by sea-level rise.",rel:"Christian (Catholic + Protestant)",cul:"I-Kiribati dance, atoll culture, climate-threatened nation.",fig:"Anote Tong (climate advocate); Taneti Maamau.",flag:"🇰🇮",img:"Tarawa_Kiribati.jpg",pron:"KIR-i-bas",pop:"133,000 (2023)",indep:"1979 from the United Kingdom",sport:"Football, te ano (traditional ball game), athletics",food:"Coconut, fish, palu sami, breadfruit, te bua toro ni baukin",attire:"Grass skirts and woven mats for dance; modern Pacific casual"},

  {n:"Montenegro",c:"Europe",cap:"Podgorica",cur:"Euro (EUR)",lang:"Montenegrin",lat:42.71,lon:19.37,h:"Part of Yugoslavia until peaceful separation from Serbia in 2006. Joined NATO in 2017 and is an EU candidate.",rel:"Eastern Orthodox majority, Muslim minority",cul:"Adriatic-Balkan blend, Tara River canyon, Sveti Stefan island, Slavic Orthodox heritage.",fig:"King Nikola I; Milo Đukanović.",flag:"🇲🇪",img:"20090719_Crkva_Gospa_od_Zdravlja_Kotor_Bay_Montenegro.jpg",pron:"mon-tuh-NEG-roh",pop:"617,000 (2023)",indep:"2006 from Serbia (independent state earlier 1878-1918)",sport:"Water polo, handball, football, basketball",food:"Cicvara, kačamak, njeguški pršut, lamb under sač",attire:"Crmnička nošnja: red waistcoats, fez-style cap, embroidered details"},
