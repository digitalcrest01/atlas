  {n:"Mozambique",c:"Africa",cap:"Maputo",cur:"Mozambican metical (MZN)",lang:"Portuguese",lat:-18.67,lon:35.53,h:"Independent from Portugal in 1975 after a long liberation war. A devastating civil war (1977-92) followed. An Islamist insurgency has destabilised the gas-rich north since 2017.",rel:"Christian majority, Muslim minority, indigenous",cul:"Marrabenta music, prawn cuisine, Portuguese-Bantu fusion, makonde wood carving.",fig:"Samora Machel; Joaquim Chissano; Eusébio (footballer).",flag:"🇲🇿",img:"Maputo_Cathedral.jpg",pron:"mo-zum-BEEK",pop:"33 million (2023)",indep:"1975 from Portugal",sport:"Football, basketball, athletics",food:"Xima, matapa, peri-peri chicken, prawns, frango zambeziana",attire:"Capulana (wax-print wrap, national), kaftans, headwraps"},
  {n:"Myanmar",c:"Asia",cap:"Naypyidaw",cur:"Myanmar kyat (MMK)",lang:"Burmese",lat:21.92,lon:95.96,h:"A British colony, independent in 1948. Military rule from 1962 to 2011, then a brief democratic opening under Aung San Suu Kyi. The 2017 Rohingya crisis prompted genocide accusations; the military reasserted full control in a 2021 coup, triggering ongoing civil war.",rel:"Theravada Buddhist majority, persecuted Muslim Rohingya minority, Christian highland minorities",cul:"Pagodas everywhere (Shwedagon iconic), longyi dress, thanaka face paste, nat spirit veneration.",fig:"Aung San (assassinated); Aung San Suu Kyi (Nobel Peace, jailed); Min Aung Hlaing.",flag:"🇲🇲",img:"Shwedagon_Pagoda_Yangon.jpg",pron:"MYAN-mar",pop:"54.5 million (2023)",indep:"1948 from the United Kingdom",sport:"Chinlone (cane ball, national), football, lethwei (boxing)",food:"Mohinga (national), laphet thoke (tea leaf salad), curries, ohn no khao swè",attire:"Longyi (wrapped skirt for both sexes), thanaka face paste"},
  {n:"Namibia",c:"Africa",cap:"Windhoek",cur:"Namibian dollar (NAD)",lang:"English",lat:-22.96,lon:18.49,h:"A German colony where genocide against the Herero and Nama (1904-08) foreshadowed later atrocities. Administered by apartheid South Africa from WWI. Independent only in 1990 after a long liberation war.",rel:"Christian majority (Lutheran largest)",cul:"San (Bushman) cultures (some of oldest on Earth), Herero distinctive Victorian-influenced dress, German colonial Windhoek.",fig:"Sam Nujoma; Hage Geingob; Hendrik Witbooi.",flag:"🇳🇦",img:"Sossusvlei%2C_Namibia%2C_2018-08-06%2C_DD_040.jpg",pron:"nuh-MIB-ee-uh",pop:"2.6 million (2023)",indep:"1990 from South Africa",sport:"Rugby, football, athletics, netball",food:"Potjiekos, biltong, kapana, mahangu porridge, oshifima",attire:"Herero dress (Victorian-influenced, distinctive), Himba ochre body paint"},
  {n:"Nauru",c:"Oceania",cap:"Yaren (de facto)",cur:"Australian dollar (AUD)",lang:"Nauruan, English",lat:-0.52,lon:166.93,h:"The world's third-smallest country. Briefly wealthy from phosphate mining, now economically dependent on hosting Australia's offshore migrant detention.",rel:"Christian (Protestant + Catholic)",cul:"Phosphate-mining shaped landscape, Pacific island traditions.",fig:"Hammer DeRoburt; Baron Waqa.",flag:"🇳🇷",img:"Living_on_a_Blue_Planet_-_Nauru.jpg",pron:"nah-OO-roo",pop:"12,500 (2023)",indep:"1968 from Australia/NZ/UK trusteeship",sport:"Australian rules football, weightlifting, football",food:"Coconut, fish, ekaiya, brown noddy bird",attire:"Light Pacific casual; pandanus crowns for ceremony"},
  {n:"Nepal",c:"Asia",cap:"Kathmandu",cur:"Nepalese rupee (NPR)",lang:"Nepali",lat:28.39,lon:84.12,h:"A Hindu kingdom for centuries, home to eight of the world's ten highest peaks including Everest. A Maoist insurgency (1996-2006) and the 2001 royal massacre led to abolition of the monarchy in 2008 and a federal republic.",rel:"Hindu majority (largest Hindu state proportionally); Buddhist (Buddha's birthplace Lumbini)",cul:"Sherpa mountaineering, dhal bhat, Newari art (Kathmandu valley UNESCO), Tihar and Dashain.",fig:"Prithvi Narayan Shah; King Birendra (massacred 2001); Tenzing Norgay (Everest).",flag:"🇳🇵",img:"Boudhanath_Stupa.jpg",pron:"nuh-PAWL",pop:"30.9 million (2023)",indep:"Sovereign throughout (treaty with East India Company 1816)",sport:"Volleyball (national), football, cricket, dandi biyo",food:"Dal bhat (national, lentils and rice), momo, sel roti, gundruk",attire:"Daura suruwal and dhaka topi (men), sari and gunyu cholo (women)"},
  {n:"Netherlands",c:"Europe",cap:"Amsterdam (capital); The Hague (government)",cur:"Euro (EUR)",lang:"Dutch",lat:52.13,lon:5.29,h:"Independent from Spain after the Eighty Years' War (1568-1648). A 17th-century maritime and trading power with a global empire. Founding member of the EU and NATO. A constitutional monarchy famous for liberal social policies.",rel:"Calvinist/Catholic split historically, now largely secular",cul:"Tulips, windmills, cycling, painting (Rembrandt, Vermeer, Van Gogh), tolerance culture, King's Day orange.",fig:"Rembrandt; Vermeer; Van Gogh; Erasmus; Anne Frank; Cruyff.",flag:"🇳🇱",img:"Amsterdam_canals.jpg",pron:"NETH-er-lundz",pop:"17.8 million (2023)",indep:"1648 from Spain (recognised at Westphalia)",sport:"Football, cycling, speed skating, korfball",food:"Stroopwafels, bitterballen, herring, stamppot, gouda, drop liquorice",attire:"Klederdracht regional folk dress (Volendam), wooden klompen clogs"},
  {n:"New Zealand",c:"Oceania",cap:"Wellington",cur:"NZ dollar (NZD)",lang:"English, Māori",lat:-40.90,lon:174.89,h:"Settled by Polynesian Māori around the 13th century, then by the British under the 1840 Treaty of Waitangi. Independent in 1947. A constitutional monarchy under the British Crown, recognised for early universal suffrage (women gained the vote in 1893).",rel:"Christian historically, large 'no religion' share, Māori spiritual traditions",cul:"Māori haka and tā moko, rugby (All Blacks), LOTR landscapes, kiwi bird symbol, Pavlova.",fig:"Jacinda Ardern; Sir Edmund Hillary (Everest); Kiri Te Kanawa (opera); Peter Jackson; Whina Cooper.",flag:"🇳🇿",img:"Milford_Sound_NZ.jpg",pron:"noo ZEE-lund",pop:"5.22 million (2023)",indep:"1907 dominion; full sovereignty 1986",sport:"Rugby union (All Blacks), cricket, netball, sailing",food:"Pavlova, hangi (Māori earth oven), lamb roast, fish and chips, kumara",attire:"Māori korowai cloak, piupiu skirt; modern casual daily"},
  {n:"Nicaragua",c:"Central America",cap:"Managua",cur:"Nicaraguan córdoba (NIO)",lang:"Spanish",lat:12.87,lon:-85.21,h:"Independent in 1821. The 1979 Sandinista revolution overthrew the Somoza dynasty; the 1980s Contra War was a major Cold War flashpoint. Daniel Ortega returned to power in 2007 and has progressively dismantled democratic institutions.",rel:"Catholic majority",cul:"Marimba music, mestizo-indigenous culture, gallo pinto, Sandinista iconography.",fig:"Augusto Sandino; Anastasio Somoza; Daniel Ortega; Violeta Chamorro.",flag:"🇳🇮",img:"Granada_Nicaragua.jpg",pron:"nik-uh-RAH-gwuh",pop:"6.85 million (2023)",indep:"1821 from Spain",sport:"Baseball (national passion, more than football), boxing",food:"Gallo pinto, nacatamal, vigorón, indio viejo, quesillo",attire:"Mestiza dress with embroidery, modern Latin American casual"},
  {n:"Niger",c:"Africa",cap:"Niamey",cur:"West African CFA franc (XOF)",lang:"French",lat:17.61,lon:8.08,h:"Independent from France in 1960. Major uranium producer. A 2023 military coup ousted the elected government and ended the French military presence, aligning with Russia.",rel:"Sunni Muslim majority",cul:"Tuareg blue-veiled nomads, Wodaabe Gerewol male beauty festival, Hausa traditions.",fig:"Hamani Diori; Mohamed Bazoum (deposed 2023); General Tchiani.",flag:"🇳🇪",img:"Niger%2C_Agadez_(28)%2C_grand_mosque%2C_old_city.jpg",pron:"NY-jer",pop:"26.2 million (2023)",indep:"1960 from France",sport:"Football, wrestling, athletics",food:"Djerma rice, tuwo, brochettes, dambou, masa",attire:"Tuareg blue veils and indigo robes (north), Hausa boubou (south)"},
  {n:"Nigeria",c:"Africa",cap:"Abuja",cur:"Nigerian naira (NGN)",lang:"English",lat:9.08,lon:8.68,h:"Independent from Britain in 1960. The 1967-70 Biafran War killed over a million. Africa's most populous country and largest economy, divided between a largely Muslim north and Christian south. Faces a long Boko Haram insurgency in the northeast.",rel:"Christian (south) and Muslim (north) roughly equal, indigenous",cul:"Nollywood (world's 2nd-largest film output), Afrobeats global wave (Burna Boy, Wizkid), jollof rice debates, Yoruba/Igbo/Hausa cultures.",fig:"Chinua Achebe; Wole Soyinka (Nobel literature); Fela Kuti; Olusegun Obasanjo; Bola Tinubu.",flag:"🇳🇬",img:"Skyline_from_ojo_Lagos_Nigeria_IMG_20240627_183111.jpg",pron:"ny-JEER-ee-uh",pop:"224 million (2023, largest in Africa)",indep:"1960 from the United Kingdom",sport:"Football (Super Eagles), athletics, boxing, basketball",food:"Jollof rice (rivalry with Ghana), egusi, suya, pounded yam, akara",attire:"Agbada (men, flowing robes), iro and buba (women), gele headwrap"},
  {n:"North Korea",c:"Asia",cap:"Pyongyang",cur:"North Korean won (KPW)",lang:"Korean",lat:40.34,lon:127.51,h:"Founded in 1948 in the Soviet zone of occupied Korea. The 1950-53 Korean War ended without a peace treaty. Three generations of the Kim family have ruled a totalitarian state with a nuclear weapons programme and severe international isolation.",rel:"Officially atheist; Juche state ideology functions quasi-religiously",cul:"Mass Games gymnastics, state-controlled media, kimchi and naengmyeon, Arirang folk song.",fig:"Kim Il-sung ('Eternal President'); Kim Jong-il; Kim Jong-un.",flag:"🇰🇵",img:"Pyongyang%2C_Juche_Tower%2C_North_Korea_1988_(5).jpg",pron:"north kuh-REE-uh",pop:"26 million (2023)",indep:"1948 (founded as DPRK)",sport:"Football, taekwondo, weightlifting, mass games",food:"Pyongyang cold noodles, kimchi, naengmyeon, sundae, tteok",attire:"Chosŏn-ot (hanbok), military uniforms, modern Western in cities"},
  {n:"North Macedonia",c:"Europe",cap:"Skopje",cur:"Macedonian denar (MKD)",lang:"Macedonian",lat:41.61,lon:21.75,h:"Part of Yugoslavia until peaceful independence in 1991. A long dispute with Greece over its name was settled in 2019, renaming the country and unlocking NATO membership (2020).",rel:"Eastern Orthodox majority, Muslim Albanian minority",cul:"Ohrid Lake UNESCO heritage, Slavic-Albanian-Roma mix, ajvar relish, čalgija music.",fig:"Alexander the Great (disputed with Greece); Nikola Gruevski; Zoran Zaev.",flag:"🇲🇰",img:"Lake_Ohrid%2C_North_Macedonia_2022-08_-_Floating.jpg",pron:"north mas-uh-DOH-nee-uh",pop:"1.83 million (2023)",indep:"1991 from Yugoslavia",sport:"Football, handball, basketball",food:"Tavče gravče (national, beans), ajvar, kebapche, burek, shopska",attire:"Folk costumes vary by region: embroidered shirts, woollen overcoats"},
  {n:"Norway",c:"Europe",cap:"Oslo",cur:"Norwegian krone (NOK)",lang:"Norwegian",lat:60.47,lon:8.47,h:"Independent from Sweden in 1905. Occupied by Nazi Germany 1940-45. North Sea oil discoveries from the 1960s funded the world's largest sovereign wealth fund. Twice voted against joining the EU.",rel:"Lutheran historically, very secular, indigenous Sámi spirituality",cul:"Viking heritage, fjords, oil sovereign wealth fund (largest), Sámi reindeer herding, Munch's Scream, black metal scene.",fig:"Edvard Munch; Henrik Ibsen; Edvard Grieg; Roald Amundsen; Thor Heyerdahl; King Harald V.",flag:"🇳🇴",img:"A_view_towards_Geirangerfjord_from_Dalsnibba%2C_M%C3%B8re_og_Romsdal%2C_Norway%2C_2013_June.jpg",pron:"NOR-way",pop:"5.49 million (2023)",indep:"1905 from Sweden",sport:"Skiing (cross-country and alpine), biathlon, football, handball",food:"Lutefisk, rakfisk, brunost, fårikål (national), salmon, kjøttkaker",attire:"Bunad (regional folk dress, formal for festivals), Sámi gákti"},
  {n:"Oman",c:"Asia",cap:"Muscat",cur:"Omani rial (OMR)",lang:"Arabic",lat:21.51,lon:55.92,h:"An ancient maritime power that once controlled Zanzibar. Modernised under Sultan Qaboos (1970-2020) who came to power by overthrowing his father. Known for quiet diplomacy in the Gulf.",rel:"Ibadi Muslim (unique, neither Sunni nor Shia majority)",cul:"Frankincense heritage, dhow building, khanjar dagger, Omani halwa.",fig:"Sultan Qaboos (modernised Oman 1970-2020); Sultan Haitham.",flag:"🇴🇲",img:"Main_minaret_of_Sultan_Qaboos_Grand_Mosque_in_Muscat%2C_Oman_(53698184120).jpg",pron:"oh-MAHN",pop:"4.6 million (2023)",indep:"Sovereign throughout (1650 expelled Portuguese)",sport:"Football, sailing, camel racing",food:"Shuwa (national, slow-roasted lamb), majboos, harees, halwa",attire:"Dishdasha and kummah cap (men), abaya and lihaf (women)"},
  {n:"Pakistan",c:"Asia",cap:"Islamabad",cur:"Pakistani rupee (PKR)",lang:"Urdu, English",lat:30.38,lon:69.35,h:"Created by the 1947 partition of British India as a Muslim-majority state. Lost East Pakistan (now Bangladesh) in 1971. A nuclear power since 1998, alternating between military and civilian rule, with ongoing tensions with India over Kashmir.",rel:"Sunni Muslim majority, Shia, Christian and Hindu minorities",cul:"Mughal heritage, Urdu poetry (Ghalib, Iqbal), qawwali music (Nusrat Fateh Ali Khan), cricket fanaticism, biryani.",fig:"Muhammad Ali Jinnah (founding father); Benazir Bhutto (assassinated); Imran Khan (jailed); Allama Iqbal; Malala Yousafzai.",flag:"🇵🇰",img:"Badshahi_Mosque_Lahore.jpg",pron:"PAK-i-stan",pop:"240 million (2023)",indep:"1947 from the United Kingdom",sport:"Cricket (national passion), hockey (3 Olympic golds), squash",food:"Biryani, nihari, haleem, chapli kebab, sajji, halwa puri",attire:"Shalwar kameez (national, both sexes), dupatta, sherwani for formal"},
  {n:"Palau",c:"Oceania",cap:"Ngerulmud",cur:"US dollar (USD)",lang:"Palauan, English",lat:7.51,lon:134.58,h:"Independent in 1994 under a Compact of Free Association with the US. One of the world's most aggressive marine conservation states.",rel:"Christian, some indigenous Modekngei",cul:"Bai meeting houses, rock-island lagoons, marine conservation leadership.",fig:"Tommy Remengesau Jr.; Surangel Whipps Jr.",flag:"🇵🇼",img:"Palau_fantail_(Rhipidura_lepida)_Rock_Islands_3.jpg",pron:"puh-LAU",pop:"18,000 (2023)",indep:"1994 from US trusteeship",sport:"Baseball (national), football, athletics",food:"Tinola, fruit bat soup, taro, coconut crab, fresh fish",attire:"Grass skirts and shell jewellery for ceremony; modern Pacific casual"},
  {n:"Palestine",c:"Asia",cap:"Ramallah (admin); East Jerusalem (claimed)",cur:"Israeli shekel (ILS)",lang:"Arabic",lat:31.95,lon:35.23,h:"Recognised by most UN states. Comprises the West Bank (governed by the Palestinian Authority) and Gaza (controlled by Hamas since 2007). Decades of conflict with Israel intensified dramatically after Hamas's October 2023 attack and the ensuing war in Gaza.",rel:"Sunni Muslim majority, Christian minority (significant in Bethlehem)",cul:"Levantine cuisine (hummus, falafel, maqluba, knafeh), olive culture, tatreez embroidery, keffiyeh symbol.",fig:"Yasser Arafat; Mahmoud Abbas; Edward Said; Mahmoud Darwish (poet).",flag:"🇵🇸",img:"Dome_of_the_Rock_Jerusalem.jpg",pron:"PAL-uh-styne",pop:"5.4 million (2023)",indep:"Declared 1988; partial recognition; not a full UN member state",sport:"Football, basketball",food:"Maqluba, musakhan (national), knafeh nabulsiyeh, falafel, hummus",attire:"Thobe with tatreez embroidery (UNESCO), keffiyeh (black-and-white)"},
  {n:"Panama",c:"Central America",cap:"Panama City",cur:"Balboa / US dollar (PAB/USD)",lang:"Spanish",lat:8.54,lon:-80.78,h:"Independent from Colombia in 1903 with US backing, enabling construction of the Panama Canal (opened 1914). The US handed full control of the canal to Panama in 1999.",rel:"Catholic majority",cul:"Polleras dress, salsa and reggaeton, canal-funded modern Panama City.",fig:"Omar Torrijos (canal negotiator); Manuel Noriega (deposed 1989); Mireya Moscoso (first female president).",flag:"🇵🇦",img:"Miraflores_Locks_Panama_1914.JPG",pron:"PAN-uh-mah",pop:"4.5 million (2023)",indep:"1903 from Colombia",sport:"Baseball, boxing (many world champions), football",food:"Sancocho (national), ropa vieja, tamales, ceviche, hojaldres",attire:"Pollera (women's lavish dress, national symbol), montuno (men)"},
  {n:"Papua New Guinea",c:"Oceania",cap:"Port Moresby",cur:"PNG kina (PGK)",lang:"English, Tok Pisin, Hiri Motu",lat:-6.31,lon:143.96,h:"Independent from Australia in 1975. One of the world's most linguistically diverse countries with over 800 languages. The Bougainville civil war (1988-98) led to a 2019 independence referendum on that island.",rel:"Christian (high) with indigenous traditions",cul:"800+ languages spoken, Highland sing-sing festivals, bilum bags, varied tribal customs.",fig:"Michael Somare (founding PM); James Marape.",flag:"🇵🇬",img:"April_2024_Defense_Cooperation_Agreement_bilateral_coordination_meeting_at_the_U.S._Embassy_in_Port_Moresby%2C_Papua_New_Guinea_(1).jpg",pron:"PAP-yoo-uh noo GIN-ee",pop:"10.3 million (2023)",indep:"1975 from Australia",sport:"Rugby league (national passion), Australian rules football",food:"Mumu (earth oven), kaukau (sweet potato), sago, kokoda fish",attire:"Bilas (ceremonial body decoration with feathers, shells, paint)"},
  {n:"Paraguay",c:"South America",cap:"Asunción",cur:"Paraguayan guaraní (PYG)",lang:"Spanish, Guaraní",lat:-23.44,lon:-58.44,h:"Independent in 1811. The catastrophic War of the Triple Alliance (1864-70) killed perhaps 60% of the male population. Alfredo Stroessner's 35-year dictatorship ended in 1989.",rel:"Catholic majority",cul:"Guaraní language widely spoken (rare official bilingualism), nanduti lace, terere yerba mate, Jesuit Reductions.",fig:"Alfredo Stroessner (35-year dictator); Augusto Roa Bastos (writer).",flag:"🇵🇾",img:"Asunci%C3%B3n_temple_by_Bwood720.jpeg",pron:"PAR-uh-gway",pop:"6.86 million (2023)",indep:"1811 from Spain",sport:"Football, basketball, volleyball",food:"Sopa paraguaya (national, actually a cornbread), chipa, asado, mbeju",attire:"Ao po'i (embroidered tunic), ñandutí lace, ponchos"},
  {n:"Peru",c:"South America",cap:"Lima",cur:"Peruvian sol (PEN)",lang:"Spanish, Quechua, Aymara",lat:-9.19,lon:-75.02,h:"Heart of the Inca Empire, conquered by Spain in the 1530s. Independent in 1821. The Shining Path insurgency (1980-2000) and Fujimori's authoritarian rule defined the late 20th century. Repeated presidential crises mark recent politics.",rel:"Catholic majority with Andean indigenous beliefs",cul:"Inca heritage (Machu Picchu, Quechua), ceviche national pride, pisco sour, gastronomy boom, Andean weaving.",fig:"Túpac Amaru II; Mario Vargas Llosa (Nobel literature); Alberto Fujimori (jailed).",flag:"🇵🇪",img:"Machu_Picchu%2C_Peru.jpg",pron:"puh-ROO",pop:"34.4 million (2023)",indep:"1821 from Spain",sport:"Football, volleyball, surfing",food:"Ceviche (national), lomo saltado, ají de gallina, anticuchos, pisco sour",attire:"Pollera, llicllas, chullo (knit hat with earflaps), poncho"},
  {n:"Philippines",c:"Asia",cap:"Manila",cur:"Philippine peso (PHP)",lang:"Filipino, English",lat:12.88,lon:121.77,h:"A Spanish colony for 333 years, then a US colony (1898-1946). The 1986 People Power Revolution ousted Marcos. His son Bongbong Marcos was elected president in 2022.",rel:"Catholic majority (largest in Asia), Muslim south",cul:"Bayanihan community spirit, jeepneys, adobo and sinigang, karaoke obsession, basketball.",fig:"José Rizal (national hero); Ferdinand Marcos Sr.; Cory Aquino; Manny Pacquiao; Bongbong Marcos; Rodrigo Duterte.",flag:"🇵🇭",img:"Banaue_Rice_Terraces.jpg",pron:"FIL-i-peenz",pop:"117 million (2023)",indep:"1946 from the United States (after Spanish-American transfer)",sport:"Basketball (national obsession), boxing (Pacquiao), arnis/eskrima",food:"Adobo (national), sinigang, lechon, halo-halo, lumpia",attire:"Barong Tagalog (men, transparent embroidered shirt), Maria Clara (women)"},
  {n:"Poland",c:"Europe",cap:"Warsaw",cur:"Polish złoty (PLN)",lang:"Polish",lat:51.92,lon:19.15,h:"Once a vast Polish-Lithuanian Commonwealth; partitioned out of existence in 1795. Restored in 1918, invaded by Nazi Germany in 1939 to start WWII, and lost six million people including three million Jews. A Soviet satellite until Solidarity-led transition in 1989. EU member since 2004.",rel:"Roman Catholic (one of Europe's most Catholic)",cul:"Pierogi and bigos, Chopin piano tradition, sci-fi (Stanisław Lem), vodka heritage, John Paul II's homeland.",fig:"Chopin; Marie Curie (born here); Copernicus; Pope John Paul II; Lech Wałęsa (Solidarity, Nobel Peace); Lewandowski.",flag:"🇵🇱",img:"Warsaw_Old_Town.jpg",pron:"POH-lund",pop:"37.7 million (2023)",indep:"1918 (regained); 1989 end of communism",sport:"Football, volleyball, ski jumping, athletics",food:"Pierogi, bigos, kielbasa, żurek, gołąbki, oscypek cheese",attire:"Kraków folk dress, krakowiak hat, Highland gorale costume"},

// Builds the ordered phrase list for a country: Hello (always) + any extras.
function phrasesFor(c) {
  const g = helloFor(c);
  const out = [{ key: 'hi', label: 'Hello', t: g.hi, p: g.phon }];
  const ph = PHRASES[primaryLang(c)];
  if (ph) {
    if (ph.meet)   out.push({ key: 'meet',   label: 'Nice to meet you', t: ph.meet[0],   p: ph.meet[1] });
    if (ph.thanks) out.push({ key: 'thanks', label: 'Thank you',        t: ph.thanks[0], p: ph.thanks[1] });
    if (ph.bye)    out.push({ key: 'bye',    label: 'Goodbye',          t: ph.bye[0],    p: ph.bye[1] });
  }
  return out;
}

function primaryLang(c) { return (c.lang || '').split(/[,/]/)[0].trim(); }
function helloFor(c) { return HELLO_BY_LANG[primaryLang(c)] || {hi:'Hello', phon:'heh-LOH'}; }
function animalFor(c) { return ANIMALS[c.n] || null; }
function landmarkFor(c) { return LANDMARKS[c.n] || null; }
function wowFor(c) {
  if (WOW[c.n]) return WOW[c.n];
  // Safe fallbacks derived from real fields already on the country.
  if (c.pop) return 'Around ' + c.pop.replace(/\s*\(\d{4}\)/, '') + ' people call ' + c.n + ' home.';
  if (c.indep) return c.n + ' became a nation in ' + (c.indep.match(/\d{4}/) ? c.indep.match(/\d{4}/)[0] : c.indep) + '.';
  return 'The capital of ' + c.n + ' is ' + c.cap + '.';
}
function tzOffsetFor(c) {
  if (Object.prototype.hasOwnProperty.call(TZ_OFFSET, c.n)) return TZ_OFFSET[c.n];
  return Math.round((c.lon || 0) / 15);
}
function localTimeFor(c) {
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  const local = new Date(utcMs + tzOffsetFor(c) * 3600000);
  let h = local.getHours();
  const m = local.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if (h === 0) h = 12;
  return { text: h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm, hour24: local.getHours() };
}

/* ============================================================
 * NATIONAL ANTHEMS — short opening phrases, synthesized ON DEVICE
 * with the Web Audio API. We render the audio ourselves, so there is
 * nothing to license; the underlying melodies here are all public
 * domain (composers long deceased). Accuracy matters in a learning
 * app, so this set only contains openings transcribed with confidence —
 * the "Play anthem" button simply doesn't appear for countries not yet
 * verified. To add one: transcribe the opening bars as [note, beats]
 * pairs (note = scientific pitch, null = rest) against a trusted score.
 * ============================================================ */
const NOTE_FREQ = {
  'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,
  'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88,
  'C5':523.25,'C#5':554.37,'D5':587.33,'D#5':622.25,'E5':659.25,'F5':698.46,
  'F#5':739.99,'G5':783.99,'G#5':830.61,'A5':880.00,'B5':987.77,'C6':1046.50,
};
// God Save the King melody (also Liechtenstein's anthem — same tune).
const GSTK = [['G4',1],['G4',1],['A4',1],['F#4',1.5],['G4',0.5],['A4',1],
  ['B4',1],['B4',1],['C5',1],['B4',1.5],['A4',0.5],['G4',1],
  ['A4',1],['G4',1],['F#4',1],['G4',2]];
const ANTHEMS = {
  'United Kingdom': { title: 'God Save the King', tempo: 112, notes: GSTK },
  'Liechtenstein': { title: 'Oben am jungen Rhein', tempo: 112, notes: GSTK },
  'United States': { title: 'The Star-Spangled Banner', tempo: 100, notes: [
    ['G4',1.5],['E4',0.5],['C4',1],['E4',1],['G4',1],['C5',2],
    ['E5',1.5],['D5',0.5],['C5',1],['A4',1],['F4',1],['G4',2]] },
};

let _anthemCtx = null, _anthemNodes = [], _anthemPlaying = false, _anthemTimer = null;
function stopAnthem() {
  _anthemNodes.forEach(n => { try { n.stop(); } catch (e) {} });
  _anthemNodes = []; _anthemPlaying = false;
  if (_anthemTimer) { clearTimeout(_anthemTimer); _anthemTimer = null; }
  document.querySelectorAll('.anthem-btn.playing').forEach(b => b.classList.remove('playing'));
}
window.__myatlasticAnthem = (countryName) => {
  const a = ANTHEMS[countryName];
  if (!a) return;
  if (_anthemPlaying) { stopAnthem(); return; } // tap again = stop
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    _anthemCtx = _anthemCtx || new AC();
    if (_anthemCtx.state === 'suspended') _anthemCtx.resume(); // iOS needs the gesture
  } catch (e) { return; }
  const ctx = _anthemCtx;
  const beat = 60 / (a.tempo || 100);
  const master = ctx.createGain();
  master.gain.value = 0.22;
  master.connect(ctx.destination);
  let t = ctx.currentTime + 0.06;
  _anthemNodes = [];
  a.notes.forEach(([note, dur]) => {
    const len = dur * beat;
    if (note && NOTE_FREQ[note]) {
      const osc = ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = NOTE_FREQ[note];
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.9, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + len * 0.92);
      osc.connect(g); g.connect(master);
      osc.start(t); osc.stop(t + len);
      _anthemNodes.push(osc);
    }
    t += len;
  });
  _anthemPlaying = true;
  document.querySelectorAll('.anthem-btn').forEach(b => { if (b.dataset.country === countryName) b.classList.add('playing'); });
  _anthemTimer = setTimeout(stopAnthem, (t - ctx.currentTime + 0.2) * 1000);
};

const AGE_BANDS = {
  young: { label: 'Ages 3–5', difficulty: 'easy', options: 3, clueStart: 3, hideHeavy: true },
  mid:   { label: 'Ages 6–8', difficulty: 'easy', options: 4, clueStart: 2, hideHeavy: true },

};
function ageBand() { return AGE_BANDS[state.ageBand] || AGE_BANDS.all; }
function effectiveDifficulty() {
  const b = ageBand();
  if (b.difficulty) return b.difficulty; // age band overrides when set
  return state.difficulty;
}
function quizOptionCount() {
  const d = effectiveDifficulty();
  return d === 'easy' ? Math.min(3, ageBand().options) : 4;
}

const CONTINENTS = ['All', ...Array.from(new Set(COUNTRIES.map(c => c.c.split(' / ')[0]))).sort()];
const FREE_COUNTRIES = [...COUNTRIES].sort((a, b) => a.n.localeCompare(b.n)).slice(0, 10).map(c => c.n);

function isFree(c) { return FREE_COUNTRIES.includes(c.n); }
// Sovereign = the 195 (193 UN members + Vatican + Palestine). Kosovo & Taiwan are tagged isCountry:false.
function isSovereign(c) { return c.isCountry !== false; }
const SOVEREIGN_COUNTRIES = COUNTRIES.filter(isSovereign);
function canView(c) { return state.isPro || isFree(c); }
function canCompare() { return state.isPro; }
function canQuiz() {
  if (state.isPro) return true;
  try {
    const today = todaySeed();
    const lastDay = parseInt(localStorage.getItem('myatlastic_quiz_day') || '0', 10);
    const count = lastDay === today ? parseInt(localStorage.getItem('myatlastic_quiz_count') || '0', 10) : 0;
    return count < 3;
  } catch (e) { return true; }
}
function recordQuiz() {
  try {
    const today = todaySeed();
    const lastDay = parseInt(localStorage.getItem('myatlastic_quiz_day') || '0', 10);
    const count = lastDay === today ? parseInt(localStorage.getItem('myatlastic_quiz_count') || '0', 10) : 0;
    localStorage.setItem('myatlastic_quiz_day', String(today));
    localStorage.setItem('myatlastic_quiz_count', String(count + 1));
  } catch (e) {}
}

function todaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}
function getDaily() { return SOVEREIGN_COUNTRIES[todaySeed() % SOVEREIGN_COUNTRIES.length]; }
function getStreak() { try { return parseInt(localStorage.getItem('myatlastic_streak') || '0', 10); } catch (e) { return 0; } }
function setStreak(n) { try { localStorage.setItem('myatlastic_streak', String(n)); } catch (e) {} }
function getLastDailyDay() { try { return parseInt(localStorage.getItem('myatlastic_lastday') || '0', 10); } catch (e) { return 0; } }
function setLastDailyDay(d) { try { localStorage.setItem('myatlastic_lastday', String(d)); } catch (e) {} }

const speech = {
  available: typeof window !== 'undefined' && 'speechSynthesis' in window,
  voices: [],
  current: null,
  warmedUp: false,
};

function loadVoices() {
  if (!speech.available) return;
  speech.voices = window.speechSynthesis.getVoices();
}
if (speech.available) {
  loadVoices();
  // Voices load asynchronously on some browsers
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function findVoice(locale) {
  if (!speech.voices.length) return null;
  const lc = (locale || 'en-US').toLowerCase();
  const bad = /compact|eloquence|novelty|grandma|grandpa|whisper|bells|bad news|good news|bubbles|jester|organ|cellos|zarvox|trinoids|wobble|boing/i;
  // English narration: pick the most natural-sounding voice, never a low-quality "compact" one
  if (lc.startsWith('en')) {
    const en = speech.voices.filter(x => x.lang && x.lang.toLowerCase().replace('_', '-').startsWith('en'));
    const usable = en.filter(x => !bad.test(x.name || ''));
    const prefer = ['google us english', 'samantha', 'ava', 'allison', 'susan', 'aaron', 'nicky',
      'microsoft aria', 'microsoft jenny', 'microsoft michelle', 'microsoft guy', 'microsoft zira'];
    for (const name of prefer) {
      const v = usable.find(x => (x.name || '').toLowerCase().includes(name));
      if (v) return v;
    }
    // Prefer a US English voice, then any usable English voice
    return usable.find(x => x.lang.toLowerCase().replace('_', '-') === 'en-us')
      || usable[0] || en[0] || speech.voices[0] || null;
  }
  // Non-English (kept for safety; narration currently forces en-US)
  let v = speech.voices.find(x => x.lang === locale);
  if (v) return v;
  const prefix = locale.split('-')[0];
  v = speech.voices.find(x => x.lang.startsWith(prefix + '-') || x.lang === prefix);
  return v || speech.voices.find(x => x.lang.startsWith('en')) || speech.voices[0] || null;
}

function speakCountry(country) {
  if (!speech.available) return;
  // If currently speaking, cancel — second tap = stop
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.speak-btn.speaking').forEach(b => b.classList.remove('speaking'));
    return;
  }
  const locale = 'en-US'; // force consistent American-English narration
  const text = country.n + '. Capital: ' + country.cap + '.';
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = locale;
  const voice = findVoice(locale);
  if (voice) utt.voice = voice;
  utt.rate = 0.95; // natural pace
  utt.pitch = 1.0;
  // Visual feedback: pulse the buttons for this country
  const buttons = Array.from(document.querySelectorAll('.speak-btn')).filter(b =>
    b.getAttribute('onclick') && b.getAttribute('onclick').indexOf(JSON.stringify(country.n)) !== -1
  );
  buttons.forEach(b => b.classList.add('speaking'));
  utt.onend = utt.onerror = () => {
    buttons.forEach(b => b.classList.remove('speaking'));
  };
  window.speechSynthesis.speak(utt);
}

// iOS workaround: must "warm up" speech synthesis on first user interaction
// or the first real speak() call gets silently dropped
function warmUpSpeech() {
  if (speech.warmedUp || !speech.available) return;
  speech.warmedUp = true;
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0;
  window.speechSynthesis.speak(u);
}
document.addEventListener('touchstart', warmUpSpeech, { once: true, passive: true });
document.addEventListener('click', warmUpSpeech, { once: true });

window.__myatlasticSpeak = (countryName) => {
  const c = COUNTRIES.find(x => x.n === countryName);
  if (c) speakCountry(c);
};

// Speak arbitrary text. `locale` lets us greet in the country's own language
// using whatever matching voice the device has; falls back to English narration.
// AUDIO HOOK: real native-speaker / anthem recordings can be wired in here later
// by checking an asset map before falling back to this synthesized voice.
function speakInLocale(text, locale, btnSelector) {
  if (!speech.available || !text) return;
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.speaking').forEach(b => b.classList.remove('speaking'));
    return;
  }
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = locale || 'en-US';
  const voice = findVoice(locale || 'en-US');
  if (voice) utt.voice = voice;
  utt.rate = 0.9; utt.pitch = 1.0;
  const btns = btnSelector ? Array.from(document.querySelectorAll(btnSelector)) : [];
  btns.forEach(b => b.classList.add('speaking'));
  utt.onend = utt.onerror = () => btns.forEach(b => b.classList.remove('speaking'));
  window.speechSynthesis.speak(utt);
}

// "Say hello" in the local language, recorded-speaker style via on-device TTS.
window.__myatlasticSayHello = (countryName) => {
  const c = COUNTRIES.find(x => x.n === countryName);
  if (!c) return;
  const greeting = helloFor(c);
  const locale = SPEECH_LOCALE[c.n] || 'en-US';
  speakInLocale(greeting.hi, locale, '.hello-speak');
};

// Speak any phrasebook line (hello / nice to meet you / thank you / goodbye).
window.__myatlasticSpeakPhrase = (countryName, key) => {
  const c = COUNTRIES.find(x => x.n === countryName);
  if (!c) return;
  const p = phrasesFor(c).find(x => x.key === key);
  if (!p) return;
  const locale = SPEECH_LOCALE[c.n] || 'en-US';
  speakInLocale(p.t, locale, '.phrase-speak.k-' + key);
};

// Read-aloud of the country's detail text, so pre-readers get the same content.
window.__myatlasticReadAloud = (countryName) => {
  const c = COUNTRIES.find(x => x.n === countryName);
  if (!c) return;
  const parts = [c.n + '.', wowFor(c), 'Capital: ' + c.cap + '.', c.h];
  speakInLocale(parts.filter(Boolean).join(' '), 'en-US', '.read-aloud-btn');
};

function $(id) { return document.getElementById(id); }
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]);
}

/* ============================================================
 * MODE / PANE SWITCHING
 * ============================================================ */
function setMode(newMode) {
  // Remember where to return from the paywall
  if (newMode === 'paywall' && state.mode !== 'paywall') state.returnMode = state.mode;
  state.mode = newMode;
  document.body.className = document.body.className.replace(/\bmode-\S+/g, '').trim();
  document.body.classList.add('mode-' + newMode);
  if (state.kidsMode) document.body.classList.add('kids');

  document.querySelectorAll('#mode-tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === newMode);
  });
  document.querySelectorAll('.view').forEach(v => {
    v.classList.toggle('active', v.id === 'view-' + newMode);
  });

  if (newMode === 'quiz') renderQuiz();
  else if (newMode === 'daily') renderDaily();
  else if (newMode === 'compare') renderCompare();
  else if (newMode === 'currency') renderCurrency();
  else if (newMode === 'game') renderGame();
  else if (newMode === 'mystery') renderMystery();
  else if (newMode === 'passport') renderPassport();
  else if (newMode === 'paywall') renderPaywall();
  else if (newMode === 'explore' && window.innerWidth <= 900) {
    // Globe may have been hidden — resize it
    if (state.mobilePane === 'globe' && globeAPI && globeAPI.resize) {
      requestAnimationFrame(() => globeAPI.resize());
    }
  }
}

function setMobilePane(pane) {
  state.mobilePane = pane;
  document.querySelectorAll('#view-explore .pane').forEach(p => {
    const matches = (
      (pane === 'list' && p.classList.contains('list')) ||
      (pane === 'globe' && p.classList.contains('globe')) ||
      (pane === 'details' && p.classList.contains('details'))
    );
    p.classList.toggle('mobile-active', matches);
  });
  document.querySelectorAll('.mobile-bar button').forEach(b => {
    b.classList.toggle('active', b.dataset.pane === pane);
  });
  if (pane === 'globe' && globeAPI && globeAPI.resize) {
    requestAnimationFrame(() => globeAPI.resize());
  }
}

function renderFilters() {
  const root = $('filter-chips');
  root.innerHTML = '';
  CONTINENTS.forEach(cont => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (cont === state.filter ? ' active' : '');
    btn.textContent = cont;
    btn.onclick = () => { state.filter = cont; renderFilters(); renderList(); };
    root.appendChild(btn);
  });
}

function renderList() {
  const root = $('country-list');
  root.innerHTML = '';
  const q = state.search.trim().toLowerCase();
  const sorted = [...COUNTRIES].sort((a, b) => a.n.localeCompare(b.n));
  const filtered = sorted.filter(c => {
    if (q && !c.n.toLowerCase().includes(q) && !c.cap.toLowerCase().includes(q)) return false;
    if (state.filter !== 'All' && !c.c.startsWith(state.filter)) return false;
    return true;
  });

  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:24px;text-align:center;color:var(--ink-dim);font-style:italic';
    empty.textContent = 'No countries match.';
    root.appendChild(empty);
    return;
  }

  let lastLetter = '';
  filtered.forEach(c => {
    const letter = c.n[0].toUpperCase();
    if (letter !== lastLetter) {
      lastLetter = letter;
      const grp = document.createElement('div');
      grp.className = 'letter-group';
      grp.textContent = letter;
      root.appendChild(grp);
    }
    const item = document.createElement('div');
    item.className = 'country-item' + (state.activeCountry === c ? ' active' : '');

    const flag = document.createElement('span');
    flag.className = 'flag'; flag.textContent = c.flag || '🌐';
    const name = document.createElement('span');
    name.className = 'name'; name.textContent = c.n;
    item.appendChild(flag);
    item.appendChild(name);

    if (!canView(c)) {
      const lock = document.createElement('span');
      lock.className = 'lock'; lock.textContent = '🔒';
      item.appendChild(lock);
    }
    const meta = document.createElement('span');
    meta.className = 'meta'; meta.textContent = c.c.split(' / ')[0];
    item.appendChild(meta);

    if (state.mode === 'compare') {
      const isA = state.compareA === c, isB = state.compareB === c;
      const btn = document.createElement('button');
      btn.className = 'compare-btn' + (isA ? ' picked-a' : isB ? ' picked-b' : '');
      btn.textContent = isA ? 'A ✓' : isB ? 'B ✓' : '+';
      btn.onclick = (ev) => {
        ev.stopPropagation();
        if (!canCompare()) { setMode('paywall'); return; }
        if (state.compareA === c) state.compareA = null;
        else if (state.compareB === c) state.compareB = null;
        else if (!state.compareA) state.compareA = c;
        else if (!state.compareB) state.compareB = c;
        else { state.compareA = state.compareB; state.compareB = c; }
        renderList();
        renderCompare();
      };
      item.appendChild(btn);
    }

    item.onclick = () => {
      state.activeCountry = c;
      renderList();
      renderDetails();
      if (globeAPI) globeAPI.focus(c);
      if (window.innerWidth <= 900 && state.mode === 'explore') setMobilePane('details');
    };

    root.appendChild(item);
  });
}

function renderDetails() {
  const root = $('details-pane');
  const c = state.activeCountry;
  if (!c) {
    root.innerHTML = '<div class="placeholder">Click a country in the list or on the globe to see capital, flag, currency, language, religion, culture, history and notable figures.</div>';
    return;
  }

  const free = canView(c);
  const imgUrl = wikiImage(c.img);

  let html = '';
  recordCountryView(c.n);
  html += '<button class="back-btn detail-back" onclick="setMobilePane(\'list\')">← Back to list</button>';
  html += '<div class="detail-eyebrow" style="display:flex;justify-content:space-between;align-items:center">' +
    '<span>' + escapeHtml(c.c) + (free ? '' : ' · Pro preview') + '</span>' +
    '<div style="display:flex;gap:6px">' +
    '<button class="fav-btn' + (isFav(c.n) ? ' active' : '') + '" onclick="window.__myatlasticToggleFav(' + JSON.stringify(c.n).replace(/"/g, '&quot;') + ')" title="' + (isFav(c.n) ? 'Remove favourite' : 'Add to favourites') + '">' + (isFav(c.n) ? '★' : '☆') + '</button>' +
    '<button class="share-btn" onclick="window.__myatlasticShare(' + JSON.stringify(c.n).replace(/"/g, '&quot;') + ')" title="Share">Share</button>' +
    '</div></div>';
  const cq = JSON.stringify(c.n).replace(/"/g, '&quot;');
  html += '<div class="detail-name"><span class="detail-flag">' + (c.flag || '🌐') + '</span><span>' + escapeHtml(c.n) + '</span>' +
    (speech.available ? '<button class="speak-btn" onclick="window.__myatlasticSpeak(' + cq + ')" aria-label="Hear pronunciation" title="Hear pronunciation">🔊</button>' : '') +
    (speech.available ? '<button class="speak-btn read-aloud-btn" onclick="window.__myatlasticReadAloud(' + cq + ')" aria-label="Read this country aloud" title="Read aloud">📖</button>' : '') +
    '</div>';

  // WOW FACT — surfaced first, before the heavier detail. Free for everyone:
  // it is the hook that makes a child want to dig in (and unlock Pro).
  html += '<div class="wow-fact"><span class="wow-spark">✨</span><span><span class="wow-label">Wow fact</span>' + escapeHtml(wowFor(c)) + '</span></div>';

  // USEFUL PHRASES in the local language — phonetic spell-out + spoken playback.
  const phrases = phrasesFor(c);
  const langLabel = escapeHtml(primaryLang(c) || c.lang);
  html += '<div class="hello-card">' +
    '<div class="hello-head">🗣 ' + (phrases.length > 1 ? 'Useful phrases' : 'Say hello') + ' in ' + langLabel + '</div>';
  phrases.forEach((p, i) => {
    html += '<div class="phrase-row' + (i === 0 ? ' first' : '') + '">' +
      '<div class="phrase-en">' + escapeHtml(p.label) + '</div>' +
      '<div class="phrase-main">' +
        '<span class="phrase-loc">' + escapeHtml(p.t) + '</span>' +
        (speech.available ? '<button class="hello-speak phrase-speak k-' + p.key + '" onclick="window.__myatlasticSpeakPhrase(' + cq + ', \'' + p.key + '\')" aria-label="Hear it" title="Hear it">🔊</button>' : '') +
      '</div>' +
      (p.p ? '<div class="phrase-phon">say it: <b>' + escapeHtml(p.p) + '</b></div>' : '') +
    '</div>';
  });
  html += '</div>';

  // NATIONAL ANTHEM (opening) — synthesized on-device; only shown where we have
  // a verified public-domain melody.
  if (ANTHEMS[c.n]) {
    html += '<div class="anthem-card">' +
      '<div class="anthem-head">🎵 National anthem · opening</div>' +
      '<button class="anthem-btn" data-country="' + escapeHtml(c.n) + '" onclick="window.__myatlasticAnthem(' + cq + ')">' +
        '<span class="anthem-play">▶</span> ' + escapeHtml(ANTHEMS[c.n].title) +
      '</button>' +
      '<div class="anthem-note">A short rendition of the opening bars, played on your device.</div>' +
      '</div>';
  }

  if (free && imgUrl) {
    html += '<div class="detail-image"><img src="' + imgUrl + '" alt="" loading="lazy" data-flag="' + (c.flag || '🌐') + '" onerror="window.__myatlasticImgFallback(this)"></div>';
  } else if (!free) {
    html += '<div class="detail-image"><div class="img-locked" onclick="window.__myatlasticOpenPaywall()"><div class="lock-icon">🔒</div><div class="lock-label">Pro · tap to unlock</div></div></div>';
  }

  html += '<div class="fact-grid">';
  html += '<div class="fact-label">Capital</div><div class="fact-value">' + escapeHtml(c.cap) + '</div>';
  if (c.pron) {
    html += '<div class="fact-label">Pronounced</div><div class="fact-value" style="font-style:italic;color:var(--accent-2)">' + escapeHtml(c.pron) + '</div>';
  }
  if (c.pop) {
    html += '<div class="fact-label">Population</div><div class="fact-value">' + escapeHtml(c.pop) + '</div>';
  }
  html += '<div class="fact-label">Currency</div><div class="fact-value">' + escapeHtml(c.cur) + '</div>';
  html += '<div class="fact-label">Language</div><div class="fact-value">' + escapeHtml(c.lang) + '</div>';
  if (c.indep) {
    html += '<div class="fact-label">Sovereign</div><div class="fact-value">' + escapeHtml(c.indep) + '</div>';
  }
  html += '<div class="fact-label">Coords</div><div class="fact-value" style="font-family:monospace;font-size:12px">' + c.lat.toFixed(2) + '°, ' + c.lon.toFixed(2) + '°</div>';
  const lt = localTimeFor(c);
  html += '<div class="fact-label">Time now</div><div class="fact-value">' + (lt.hour24 >= 6 && lt.hour24 < 19 ? '☀️ ' : '🌙 ') + escapeHtml(lt.text) + ' <span style="color:var(--ink-dim);font-size:11px">(approx)</span></div>';
  html += '</div>';

  // Quick-look chips: dish, wildlife, sport, attire (free for all)
  const animal = animalFor(c);
  if (c.food || animal || c.sport || c.attire) {
    html += '<div class="quick-facts">';
    if (c.food) html += '<div class="qf-item"><div class="qf-label">🍽 Iconic dish</div><div class="qf-body">' + escapeHtml(c.food) + '</div></div>';
    if (animal) html += '<div class="qf-item"><div class="qf-label">' + animal[1] + ' Wildlife</div><div class="qf-body"><b>' + escapeHtml(animal[0]) + '</b></div></div>';
    if (c.sport) html += '<div class="qf-item"><div class="qf-label">⚽ Sport</div><div class="qf-body">' + escapeHtml(c.sport) + '</div></div>';
    if (c.attire) html += '<div class="qf-item"><div class="qf-label">👘 Attire</div><div class="qf-body">' + escapeHtml(c.attire) + '</div></div>';
    html += '</div>';
  }

  // FAMOUS LANDMARK — tappable to fly the globe there, with one fun fact.
  const lm = landmarkFor(c);
  if (lm) {
    html += '<div class="landmark-card" onclick="window.__myatlasticShowOnGlobe(' + cq + ')" title="Show on globe">' +
      '<div class="landmark-head">📍 ' + escapeHtml(lm.name) + '</div>' +
      '<div class="landmark-fact">' + escapeHtml(lm.fact) + '</div>' +
      '<div class="landmark-cta">🌍 Show me on the globe →</div>' +
      '</div>';
  }

  const sections = [
    ['Short History', c.h],
    ['Religion', c.rel || '—'],
    ['Culture', c.cul || '—'],
    ['Notable Figures', c.fig || '—'],
  ];
  sections.forEach(([label, body]) => {
    if (free) {
      html += '<div class="section"><h4>' + label + '</h4><div class="section-body">' + escapeHtml(body) + '</div></div>';
    } else {
      html += '<div class="section locked" onclick="window.__myatlasticOpenPaywall()"><h4>' + label + '</h4><div class="section-body">' + escapeHtml(body) + '</div></div>';
    }
  });

  if (c.states && c.states.length && free) {
    html += '<div class="states"><h4>States / Provinces</h4><div class="states-grid">';
    c.states.forEach(s => {
      html += '<div class="state-item"><span>' + escapeHtml(s.n) + '</span><span class="state-cap">' + escapeHtml(s.cap || '') + '</span></div>';
    });
    html += '</div></div>';
  }

  if (!free) {
    html += '<div class="upgrade-cta">';
    html += '<h3>🔓 Unlock all 195 countries</h3>';
    html += '<p>Myatlastic Pro unlocks every country with full depth, landmark images, unlimited quizzes, Compare mode, and full Daily streak.</p>';
    html += '<button class="btn-primary" onclick="window.__myatlasticOpenPaywall()">See plans</button>';
    html += '</div>';
  }

  html += '<div class="footer-note">Static reference data. Histories are deliberately brief. Image: Wikimedia Commons.</div>';
  root.innerHTML = html;
}

function getViewedSet() {

function getStampedSet() {

function stampCountry(name) {
  try {

/* ============================================================
 * MYSTERY COUNTRY — Carmen Sandiego-style guessing loop.
 * Clues reveal one at a time; fewer clues used = more points.
 * Free for everyone — it's the replay loop kids show their friends.
 * ============================================================ */
let mysteryState = null;

// Countries rich enough to make good mysteries (have wildlife + food).
function mysteryPool() {
  return SOVEREIGN_COUNTRIES.filter(c => animalFor(c) && c.food && c.cap);
}

function buildClues(c) {
  const greet = helloFor(c);
  const animal = animalFor(c);
  const lm = landmarkFor(c);
  const clues = [
    { icon: '🧭', text: 'This country is in ' + c.c.split(' / ')[0] + '.' },
    { icon: animal[1], text: 'You might spot a ' + animal[0].toLowerCase() + ' here.' },
    { icon: '🍽', text: 'People here love to eat ' + c.food.split(',')[0].trim() + '.' },
    { icon: '👋', text: 'To say hello, you say "' + greet.hi + '".' },
    { icon: '💰', text: 'They pay with the ' + c.cur.replace(/\s*\([^)]*\)/, '') + '.' },
    { icon: '🏙', text: 'The capital city starts with the letter "' + c.cap[0] + '".' },
  ];
  if (lm) clues.push({ icon: '📍', text: 'A famous sight here is ' + lm.name + '.' });
  return clues;
}

function startMystery() {
  const pool = mysteryPool();
  const target = pool[Math.floor(Math.random() * pool.length)];
  // 5 distractors, preferring the same continent for a real challenge.
  const cont = target.c.split(' / ')[0];
  const sameCont = pool.filter(c => c !== target && c.c.split(' / ')[0] === cont);
  const others = pool.filter(c => c !== target && c.c.split(' / ')[0] !== cont);
  const distractors = gameShuffle([...sameCont]).slice(0, 4)
    .concat(gameShuffle([...others])).slice(0, 5);
  const options = gameShuffle([target, ...distractors.slice(0, 5)]);
  mysteryState = {
    target, options,
    clues: buildClues(target),
    revealed: Math.max(1, ageBand().clueStart), // younger kids start with more clues
    status: 'playing', // playing | won | lost
    wrong: [],         // names guessed wrong
  };
  renderMystery();
}

function renderMystery() {
  const root = $('view-mystery');
  if (!mysteryState) {
    root.innerHTML =
      '<div class="center-card" style="max-width:480px;text-align:center">' +
        '<div style="font-size:60px;margin:6px 0">🕵️</div>' +
        '<h2 style="color:var(--accent);font-size:28px;margin:8px 0 6px">Mystery Country</h2>' +
        '<p style="color:var(--ink-dim);margin-bottom:24px;font-size:14px">Read the clues about a hidden country — its animals, food, language and more — then guess which one it is. Use fewer clues to score more!</p>' +
        '<button class="btn-primary" id="mystery-start" style="width:100%;padding:14px">Start the hunt 🔍</button>' +
      '</div>';
    $('mystery-start').onclick = startMystery;
    return;
  }
  const m = mysteryState;
  const maxClues = m.clues.length;
  const points = Math.max(1, (maxClues - m.revealed + 1) * 10);

  let html = '<div class="center-card" style="max-width:520px">';
  html += '<div style="text-align:left"><button class="back-btn" onclick="window.__myatlasticExitMystery()">← Quit</button></div>';
  html += '<div class="quiz-eyebrow" style="text-align:center">🕵️ Who am I?</div>';

  // Clue list
  html += '<div class="clue-list">';
  for (let i = 0; i < m.revealed; i++) {
    html += '<div class="clue"><span class="clue-ic">' + m.clues[i].icon + '</span><span>' + escapeHtml(m.clues[i].text) + '</span></div>';
  }
  html += '</div>';

  if (m.status === 'playing') {
    html += '<div class="mystery-score">Guess now for <b>' + points + '</b> points' +
      (m.revealed < maxClues ? ' &middot; or get another clue' : '') + '</div>';
    if (m.revealed < maxClues) {
      html += '<button id="mystery-clue" class="clue-btn">🔎 Reveal another clue</button>';
    }
    html += '<div class="mystery-options">';
    m.options.forEach(o => {
      const wrong = m.wrong.includes(o.n);
      html += '<button class="mystery-opt' + (wrong ? ' wrong' : '') + '" data-name="' + escapeHtml(o.n) + '"' + (wrong ? ' disabled' : '') + '>' +
        '<span style="font-size:22px">' + (o.flag || '🌐') + '</span> ' + escapeHtml(o.n) + '</button>';
    });
    html += '</div>';
  } else {
    const won = m.status === 'won';
    html += '<div style="text-align:center;margin:18px 0">' +
      '<div style="font-size:56px">' + (won ? '🎉' : '🌍') + '</div>' +
      '<div style="font-size:64px;margin:6px 0">' + m.target.flag + '</div>' +
      '<h2 style="color:' + (won ? 'var(--success)' : 'var(--accent)') + ';font-size:24px;margin:6px 0">' +
        (won ? 'Correct! +' + m.lastPoints + ' points' : 'It was ' + escapeHtml(m.target.n)) + '</h2>' +
      '<p style="color:var(--ink-dim)">It was <b style="color:var(--ink)">' + escapeHtml(m.target.n) + '</b> — ' + escapeHtml(wowFor(m.target)) + '</p>' +
      '<button class="btn-primary" id="mystery-again" style="width:100%;padding:14px;margin-top:14px">Play again</button>' +
      '<button id="mystery-explore" style="width:100%;padding:12px;margin-top:10px;background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:10px;cursor:pointer">See this country</button>' +
      '</div>';
  }
  html += '</div>';
  root.innerHTML = html;

  if (m.status === 'playing') {
    const cb = $('mystery-clue');
    if (cb) cb.onclick = () => { m.revealed = Math.min(maxClues, m.revealed + 1); renderMystery(); };
    root.querySelectorAll('.mystery-opt').forEach(btn => {
      if (btn.disabled) return;
      btn.onclick = () => {
        const name = btn.dataset.name;
        if (name === m.target.n) {
          m.lastPoints = points;
          m.status = 'won';
          stampCountry(m.target.n);
          checkAchievements();
        } else {
          m.wrong.push(name);
          btn.classList.add('wrong'); btn.disabled = true;
          // Reveal a clue as a hint; lose if all clues used and still wrong.
          if (m.revealed < maxClues) m.revealed++;
          else if (m.wrong.length >= m.options.length - 1) m.status = 'lost';
          renderMystery();
        }
        if (m.status === 'won') renderMystery();
      };
    });
  } else {
    $('mystery-again').onclick = startMystery;
    $('mystery-explore').onclick = () => { const t = m.target; mysteryState = null; window.__myatlasticShowOnGlobe(t.n); renderDetails(); };
  }
}
window.__myatlasticExitMystery = () => { mysteryState = null; setMode('explore'); };

function trueSizeCountries() {
  return SOVEREIGN_COUNTRIES.filter(c => AREA_KM2[c.n]).sort((a, b) => a.n.localeCompare(b.n));
}
function fmtArea(km2) {
  if (km2 >= 1000) return Math.round(km2).toLocaleString() + ' km²';
  return km2 + ' km²';
}

function renderTrueSize(aName, bName) {
  const list = trueSizeCountries();
  const a = COUNTRIES.find(c => c.n === aName) || list[0];
  const b = COUNTRIES.find(c => c.n === bName) || list.find(c => c.n !== a.n);
  const areaA = AREA_KM2[a.n], areaB = AREA_KM2[b.n];
  const big = Math.max(areaA, areaB);
  // Square side ∝ sqrt(area) so the *area* (not the side) is to scale.
  const MAX = 170;
  const sideA = MAX * Math.sqrt(areaA / big);
  const sideB = MAX * Math.sqrt(areaB / big);
  const ratio = areaA >= areaB ? (areaA / areaB) : (areaB / areaA);
  const bigger = areaA >= areaB ? a : b, smaller = areaA >= areaB ? b : a;
  // Mercator illusion: a country's area looks 1/cos²(lat) bigger on a flat map.
  const inflate = c => Math.min(99, 1 / Math.pow(Math.cos(c.lat * Math.PI / 180), 2));

  const opts = sel => list.map(c => '<option value="' + escapeHtml(c.n) + '"' + (c.n === sel ? ' selected' : '') + '>' + escapeHtml(c.n) + '</option>').join('');

  return '<div class="ts-pickers">' +
      '<select id="ts-a" class="ts-select">' + opts(a.n) + '</select>' +
      '<span class="ts-vs">vs</span>' +
      '<select id="ts-b" class="ts-select">' + opts(b.n) + '</select>' +
    '</div>' +
    '<div class="ts-stage">' +
      '<div class="ts-sq" style="width:' + sideA.toFixed(0) + 'px;height:' + sideA.toFixed(0) + 'px;background:rgba(212,160,86,0.30);border-color:var(--accent)"><span>' + a.flag + '</span></div>' +
      '<div class="ts-sq" style="width:' + sideB.toFixed(0) + 'px;height:' + sideB.toFixed(0) + 'px;background:rgba(110,168,196,0.30);border-color:var(--accent-2)"><span>' + b.flag + '</span></div>' +
    '</div>' +
    '<div class="ts-verdict"><b>' + escapeHtml(bigger.n) + '</b> is about <b>' + (ratio >= 10 ? Math.round(ratio) : ratio.toFixed(1)) + '×</b> the size of <b>' + escapeHtml(smaller.n) + '</b>.</div>' +
    '<div class="ts-areas">' +
      '<span>' + a.flag + ' ' + escapeHtml(a.n) + ': ' + fmtArea(areaA) + '</span>' +
      '<span>' + b.flag + ' ' + escapeHtml(b.n) + ': ' + fmtArea(areaB) + '</span>' +
    '</div>' +
    '<div class="ts-illusion">🗺️ Map trick: on a flat world map, <b>' + escapeHtml(a.n) + '</b> looks about <b>' + inflate(a).toFixed(1) + '×</b> bigger than it really is, and <b>' + escapeHtml(b.n) + '</b> about <b>' + inflate(b).toFixed(1) + '×</b>. The further from the equator, the more a country gets stretched!</div>';
}

/* ---- Two-player pass-and-play quiz ---- */
let twoP = null;
function startTwoPlayer() {
  twoP = { round: 0, total: 8, scores: [0, 0], turn: 0, current: null, phase: 'play' };
  twoPNext();
}
function twoPNext() {
  twoP.round++;
  if (twoP.round > twoP.total) { renderTwoPlayer(); return; }
  twoP.current = newQuizQuestion();
  twoP.phase = 'play';
  renderTwoPlayer();
}
function renderTwoPlayer() {
  let modal = document.getElementById('twop-modal');
  if (!modal) { modal = document.createElement('div'); modal.id = 'twop-modal'; modal.className = 'ts-modal'; document.body.appendChild(modal); }

  if (twoP.round > twoP.total) {
    const [a, b] = twoP.scores;
    const result = a === b ? "It's a tie! 🤝" : (a > b ? 'Player 1 wins! 🏆' : 'Player 2 wins! 🏆');
    modal.innerHTML = '<div class="ts-box" style="text-align:center">' +
      '<div style="font-size:54px;margin:6px">🎉</div>' +
      '<h2 class="ts-title" style="text-align:center">' + result + '</h2>' +
      '<p style="font-size:18px;margin:14px 0">Player 1: <b style="color:var(--accent)">' + a + '</b> &nbsp;·&nbsp; Player 2: <b style="color:var(--accent-2)">' + b + '</b></p>' +
      '<button class="btn-primary" id="twop-again" style="width:100%;padding:13px;margin-top:8px">Play again</button>' +
      '<button class="set-action" id="twop-close" style="margin-top:10px">Close</button>' +
      '</div>';
    $('twop-again').onclick = startTwoPlayer;
    $('twop-close').onclick = () => modal.remove();
    return;
  }

  const q = twoP.current;
  const player = twoP.turn; // 0 or 1
  const pColor = player === 0 ? 'var(--accent)' : 'var(--accent-2)';
  const { type, correct, options } = q;
  let eyebrow = '', promptHtml = '', textFn = c => c.n;
  switch (type) {
    case 'flag-to-country': eyebrow = 'Which country owns this flag?'; promptHtml = '<div style="font-size:70px;text-align:center">' + correct.flag + '</div>'; textFn = c => c.n; break;
    case 'country-to-capital': eyebrow = 'Capital of ' + correct.n + '?'; promptHtml = '<div class="quiz-prompt">' + correct.flag + ' ' + escapeHtml(correct.n) + '</div>'; textFn = c => c.cap; break;
    case 'capital-to-country': eyebrow = 'Which country has this capital?'; promptHtml = '<div class="quiz-prompt">' + escapeHtml(correct.cap) + '</div>'; textFn = c => c.flag + ' ' + c.n; break;
    case 'culture-hint': eyebrow = 'Which country fits?'; promptHtml = '<div class="quiz-prompt" style="font-size:15px;font-style:italic">' + escapeHtml(correct.cul || '') + '</div>'; textFn = c => c.flag + ' ' + c.n; break;
    case 'food-to-country': eyebrow = 'Whose dishes are these?'; promptHtml = '<div class="quiz-prompt" style="font-size:15px">🍽 ' + escapeHtml(correct.food || '') + '</div>'; textFn = c => c.flag + ' ' + c.n; break;
    case 'sport-to-country': eyebrow = 'Whose sports?'; promptHtml = '<div class="quiz-prompt" style="font-size:15px">⚽ ' + escapeHtml(correct.sport || '') + '</div>'; textFn = c => c.flag + ' ' + c.n; break;
  }

  if (twoP.phase === 'handoff') {
    modal.innerHTML = '<div class="ts-box" style="text-align:center">' +
      '<h2 class="ts-title" style="text-align:center;color:' + pColor + '">Pass to Player ' + (player + 1) + '</h2>' +
      '<p style="color:var(--ink-dim);margin:12px 0 20px">Hand the device over, then tap when ready.</p>' +
      '<button class="btn-primary" id="twop-ready" style="width:100%;padding:14px">Player ' + (player + 1) + " — I'm ready</button>" +
      '</div>';
    $('twop-ready').onclick = () => { twoP.phase = 'play'; renderTwoPlayer(); };
    return;
  }

  modal.innerHTML = '<div class="ts-box">' +
    '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-dim);margin-bottom:6px">' +
      '<span style="color:var(--accent)">P1: ' + twoP.scores[0] + '</span>' +
      '<span>Round ' + twoP.round + '/' + twoP.total + '</span>' +
      '<span style="color:var(--accent-2)">P2: ' + twoP.scores[1] + '</span></div>' +
    '<div style="text-align:center;font-weight:700;color:' + pColor + ';margin-bottom:10px">Player ' + (player + 1) + "'s turn</div>" +
    '<div class="quiz-eyebrow" style="text-align:center">' + eyebrow + '</div>' + promptHtml +
    '<div class="quiz-options" id="twop-opts">' +
      options.map((o, i) => '<button class="quiz-option" data-idx="' + i + '">' + escapeHtml(textFn(o)) + '</button>').join('') +
    '</div></div>';

  modal.querySelectorAll('#twop-opts .quiz-option').forEach(btn => {
    btn.onclick = () => {
      const picked = options[parseInt(btn.dataset.idx, 10)];
      const right = picked === correct;
      if (right) twoP.scores[player]++;
      modal.querySelectorAll('#twop-opts .quiz-option').forEach((b, i) => {
        b.disabled = true;
        if (options[i] === correct) b.classList.add('correct');
        else if (b === btn) b.classList.add('wrong');
      });
      const next = document.createElement('button');
      next.className = 'btn-primary'; next.style.cssText = 'width:100%;padding:13px;margin-top:14px';
      next.textContent = right ? '✓ Correct! Next player →' : 'Next player →';
      next.onclick = () => { twoP.turn = 1 - twoP.turn; if (twoP.turn === 0) twoPNext(); else { twoP.phase = 'handoff'; renderTwoPlayer(); } };
      // After both players answer the same round we advance; alternate turns.
      modal.querySelector('.ts-box').appendChild(next);
    };
  });
}

// Challenge mode — a child opens a ?challenge=… link and plays a fixed flag quiz.
let challengeState = null;
function startChallenge(cfg) {
  let pool = SOVEREIGN_COUNTRIES;
  if (cfg.f && cfg.f !== 'All') pool = pool.filter(c => c.c.split(' / ')[0] === cfg.f);
  if (pool.length < 4) pool = SOVEREIGN_COUNTRIES;
  challengeState = { cfg, pool, round: 0, total: cfg.n || 10, score: 0, current: null };
  setMode('quiz');
  challengeNext();
}
function challengeNext() {
  const cs = challengeState;
  cs.round++;
  if (cs.round > cs.total) { renderChallengeOver(); return; }
  const correct = cs.pool[Math.floor(Math.random() * cs.pool.length)];
  const distractors = pickN(cs.pool.length >= 4 ? cs.pool : SOVEREIGN_COUNTRIES, 3, correct);
  cs.current = { correct, options: gameShuffle([correct, ...distractors]) };
  renderChallenge();
}
function renderChallenge() {
  const root = $('view-quiz');
  const cs = challengeState, { correct, options } = cs.current;
  root.innerHTML = '<div class="center-card quiz-card">' +
    '<div style="text-align:left"><button class="back-btn" onclick="window.__myatlasticExitChallenge()">← Exit challenge</button></div>' +
    '<div class="quiz-eyebrow">🍎 Class challenge · ' + escapeHtml(cs.cfg.f || 'World') + '</div>' +
    '<div class="quiz-prompt-flag">' + correct.flag + '</div>' +
    '<div class="quiz-options">' +
      options.map((o, i) => '<button class="quiz-option" data-idx="' + i + '">' + escapeHtml(o.n) + '</button>').join('') +
    '</div>' +
    '<div class="quiz-score">Round ' + cs.round + ' / ' + cs.total + ' · Score: ' + cs.score + '</div>' +
    '</div>';
  root.querySelectorAll('.quiz-option').forEach(btn => {
    btn.onclick = () => {
      const picked = options[parseInt(btn.dataset.idx, 10)];
      if (picked === correct) { cs.score++; stampCountry(correct.n); }
      root.querySelectorAll('.quiz-option').forEach((b, i) => {
        b.disabled = true;
        if (options[i] === correct) b.classList.add('correct');
        else if (b === btn) b.classList.add('wrong');
      });
      const next = document.createElement('button');
      next.className = 'btn-primary next-btn'; next.textContent = cs.round >= cs.total ? 'See result →' : 'Next →';
      next.onclick = challengeNext;
      root.querySelector('.quiz-card').appendChild(next);
    };
  });
}
function renderChallengeOver() {
  const root = $('view-quiz');
  const cs = challengeState;
  const pct = Math.round((cs.score / cs.total) * 100);
  root.innerHTML = '<div class="center-card quiz-card" style="text-align:center">' +
    '<div style="font-size:54px">' + (pct >= 80 ? '🏆' : pct >= 50 ? '🌟' : '🌍') + '</div>' +
    '<h2 style="color:var(--accent);font-size:26px;margin:8px 0">' + cs.score + ' / ' + cs.total + '</h2>' +
    '<p style="color:var(--ink-dim);margin-bottom:20px">' + pct + '% on the ' + escapeHtml(cs.cfg.f || 'world') + ' challenge</p>' +
    '<button class="btn-primary" id="ch-again" style="width:100%;padding:13px">Try again</button>' +
    '<button class="set-action" id="ch-done" style="margin-top:10px">Done</button>' +
    '</div>';
  $('ch-again').onclick = () => startChallenge(cs.cfg);
  $('ch-done').onclick = () => { challengeState = null; setMode('explore'); };
}
window.__myatlasticExitChallenge = () => { challengeState = null; setMode('explore'); };

function handleDeepLink() {
  try {
    const params = new URLSearchParams(window.location.search);

    const ch = params.get('challenge');
    if (ch) {
      try {

        state.activeCountry = c;

}

/* ============================================================
 * QUIZ
 * ============================================================ */
const QUIZ_TYPES = ['flag-to-country', 'country-to-capital', 'capital-to-country', 'culture-hint', 'food-to-country', 'sport-to-country'];

function pickN(pool, n, exclude) {
  const arr = pool.filter(x => x !== exclude);
  const out = [];
  while (out.length < n && arr.length) {
    out.push(arr.splice(Math.floor(Math.random() * arr.length), 1)[0]);
  }
  return out;
}

function newQuizQuestion() {
  // Difficulty / age band shape the question pool, option count, and how close
  // the wrong answers are (harder = same-continent distractors).
  const diff = effectiveDifficulty();
  const easyTypes = ['flag-to-country', 'country-to-capital', 'capital-to-country'];
  const typePool = diff === 'easy' ? easyTypes : QUIZ_TYPES;
  const type = typePool[Math.floor(Math.random() * typePool.length)];
  const fieldMap = { 'culture-hint': 'cul', 'food-to-country': 'food', 'sport-to-country': 'sport' };
  const required = fieldMap[type];
  let candidates = SOVEREIGN_COUNTRIES;
  if (required) candidates = SOVEREIGN_COUNTRIES.filter(c => c[required] && c[required] !== '—');
  const correct = candidates[Math.floor(Math.random() * candidates.length)];
  const nOpts = quizOptionCount();
  let pool = SOVEREIGN_COUNTRIES;
  if (diff === 'hard') {
    const cont = correct.c.split(' / ')[0];
    const same = SOVEREIGN_COUNTRIES.filter(c => c.c.split(' / ')[0] === cont && c !== correct);
    if (same.length >= nOpts - 1) pool = same; // trickier: neighbours as decoys
  }
  const distractors = pickN(pool, nOpts - 1, correct);
  const options = [correct, ...distractors].sort(() => Math.random() - 0.5);
  return { type, correct, options };
}

function renderQuiz() {
  const root = $('view-quiz');
  if (!canQuiz()) {
    root.innerHTML = '<div class="center-card quiz-card"><div class="quiz-eyebrow">Daily limit reached</div>' +
      '<h2 style="font-size:24px;margin:20px 0">You have used your 3 free quizzes today</h2>' +
      '<p style="color:var(--ink-dim);margin-bottom:24px">Upgrade for unlimited quizzes.</p>' +
      '<button class="btn-primary" onclick="window.__myatlasticOpenPaywall()">See plans</button></div>';
    return;
  }

  if (!state.quiz.current) state.quiz.current = newQuizQuestion();
  const { type, correct, options } = state.quiz.current;

  let eyebrow = '', promptHtml = '', textFn;
  switch (type) {
    case 'flag-to-country':
      eyebrow = 'Which country owns this flag?';
      promptHtml = '<div class="quiz-prompt-flag">' + correct.flag + '</div>';
      textFn = c => c.n; break;
    case 'country-to-capital':
      eyebrow = 'What is the capital of';
      promptHtml = '<div class="quiz-prompt">' + correct.flag + ' ' + escapeHtml(correct.n) + '?</div>';
      textFn = c => c.cap; break;
    case 'capital-to-country':
      eyebrow = 'Which country has this capital?';
      promptHtml = '<div class="quiz-prompt">' + escapeHtml(correct.cap) + '</div>';
      textFn = c => c.flag + ' ' + c.n; break;
    case 'culture-hint':
      eyebrow = 'Which country fits this description?';
      promptHtml = '<div class="quiz-prompt" style="font-size:16px;line-height:1.5;font-style:italic">' + escapeHtml(correct.cul || '') + '</div>';
      textFn = c => c.flag + ' ' + c.n; break;
    case 'food-to-country':
      eyebrow = 'Which country eats these dishes?';
      promptHtml = '<div class="quiz-prompt" style="font-size:16px;line-height:1.5">🍽 ' + escapeHtml(correct.food || '') + '</div>';
      textFn = c => c.flag + ' ' + c.n; break;
    case 'sport-to-country':
      eyebrow = 'Whose national sport(s) are these?';
      promptHtml = '<div class="quiz-prompt" style="font-size:16px;line-height:1.5">⚽ ' + escapeHtml(correct.sport || '') + '</div>';
      textFn = c => c.flag + ' ' + c.n; break;
  }

  root.innerHTML = '<div class="center-card quiz-card">' +
    '<div class="quiz-eyebrow">' + eyebrow + '</div>' + promptHtml +
    '<div class="quiz-options">' +
    options.map((o, i) => '<button class="quiz-option" data-idx="' + i + '">' + escapeHtml(textFn(o)) + '</button>').join('') +
    '</div>' +
    '<div class="quiz-score">Score: ' + state.quiz.score + ' / ' + state.quiz.total + '</div>' +
    '</div>';

  const card = root.querySelector('.quiz-card');
  card.querySelectorAll('.quiz-option').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.idx, 10);
      const picked = options[idx];
      state.quiz.total++;
      if (picked === correct) { state.quiz.score++; stampCountry(correct.n); }
      recordQuiz();
      checkAchievements();
      card.querySelectorAll('.quiz-option').forEach((b, i) => {
        b.disabled = true;
        if (options[i] === correct) b.classList.add('correct');
        else if (i === idx) b.classList.add('wrong');
      });
      const next = document.createElement('button');
      next.className = 'btn-primary next-btn';
      next.textContent = 'Next →';
      next.onclick = () => { state.quiz.current = newQuizQuestion(); renderQuiz(); };
      card.appendChild(next);
      card.querySelector('.quiz-score').textContent = 'Score: ' + state.quiz.score + ' / ' + state.quiz.total;
    };
  });
}

    '</div>';
}

function fillTrayChips(root, query) {
  const box = root.querySelector('#tray-chips');
  if (!box) return;
  const q = (query || '').trim().toLowerCase();
  let matches = q
    ? COUNTRIES.filter(c => c.n.toLowerCase().includes(q) || (c.cap && c.cap.toLowerCase().includes(q)))
    : [...COUNTRIES].sort((a, b) => a.n.localeCompare(b.n));
  matches = matches.filter(c => c !== state.compareA && c !== state.compareB).slice(0, 24);
  if (!matches.length) {
    box.innerHTML = '<div style="color:var(--ink-dim);font-size:13px;padding:6px">No matches</div>';
    return;
  }
  box.innerHTML = matches.map((c, i) =>
    '<div class="compare-chip" data-cidx="' + i + '"><span>' + (c.flag || '🌐') + '</span><span>' + escapeHtml(c.n) + '</span></div>'
  ).join('');
  box.querySelectorAll('.compare-chip').forEach((chip, i) => {
    const country = matches[i];
    chip.addEventListener('pointerdown', e => startChipDrag(e, country, chip));
  });
}

function startChipDrag(e, country, chip) {
  if (e.button != null && e.button !== 0) return;
  e.preventDefault();
  const startX = e.clientX, startY = e.clientY;
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.innerHTML = (country.flag || '🌐') + ' ' + escapeHtml(country.n);
  ghost.style.left = startX + 'px';
  ghost.style.top = startY + 'px';
  document.body.appendChild(ghost);
  if (chip && chip.setPointerCapture) { try { chip.setPointerCapture(e.pointerId); } catch (_) {} }

  const clearHi = () => document.querySelectorAll('.drop-active').forEach(d => d.classList.remove('drop-active'));
  const dropAt = (x, y) => {
    const el = document.elementFromPoint(x, y);
    return (el && el.closest) ? el.closest('[data-dropslot]') : null;
  };
  const move = (ev) => {
    ghost.style.left = ev.clientX + 'px';
    ghost.style.top = ev.clientY + 'px';
    clearHi();
    const drop = dropAt(ev.clientX, ev.clientY);
    if (drop) drop.classList.add('drop-active');
  };
  const assign = (slot) => {
    if (slot === 'A') state.compareA = country; else state.compareB = country;
    renderCompare();
    renderList();
  };
  const up = (ev) => {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    document.removeEventListener('pointercancel', up);
    ghost.remove();
    clearHi();
    const drop = dropAt(ev.clientX, ev.clientY);
    if (drop) {
      assign(drop.getAttribute('data-dropslot'));
    } else if (Math.hypot(ev.clientX - startX, ev.clientY - startY) < 8) {
      // Treat as a tap: fill the first empty slot
      if (!state.compareA) assign('A');
      else if (!state.compareB) assign('B');
    }
  };
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
  document.addEventListener('pointercancel', up);
}

function renderCompare() {
  const root = $('view-compare');
  if (!canCompare()) {
    root.innerHTML = '<div class="center-card quiz-card">' +
      '<div style="text-align:left"><button class="back-btn" onclick="setMode(\'explore\')">← Exit</button></div>' +

      '<button class="btn-primary" onclick="window.__myatlasticOpenPaywall()">See plans</button>' +
      '</div>';
    return;
  }
  if (state.compareSubmitted && state.compareA && state.compareB) {
    renderCompareResult(root);
  } else {
    renderCompareSelect(root);
  }
}

// Wire the per-side search boxes (tap a result to choose it for that side)
function wireCompareSearch(root) {
  root.querySelectorAll('.compare-search').forEach(input => {
    const slot = input.dataset.slot;
    const resultsBox = root.querySelector('.compare-results[data-slot="' + slot + '"]');
    if (!resultsBox) return;
    let currentResults = [];
    function showResults(query) {
      const q = (query || '').trim().toLowerCase();
      let matches = q
        ? COUNTRIES.filter(c => c.n.toLowerCase().includes(q) || (c.cap && c.cap.toLowerCase().includes(q)) || (c.c && c.c.toLowerCase().includes(q)))
        : [...COUNTRIES].sort((a, b) => a.n.localeCompare(b.n));
      const otherSlot = slot === 'A' ? state.compareB : state.compareA;
      if (otherSlot) matches = matches.filter(c => c !== otherSlot);
      matches = matches.slice(0, 40);
      currentResults = matches;
      if (!matches.length) { resultsBox.innerHTML = '<div class="compare-result empty">No matches</div>'; return; }
      resultsBox.innerHTML = matches.map((c, i) =>
        '<button class="compare-result" data-idx="' + i + '">' +
          '<span class="cr-flag">' + (c.flag || '🌐') + '</span>' +
          '<span class="cr-name">' + escapeHtml(c.n) + '</span>' +
          '<span class="cr-cap">' + escapeHtml(c.cap || '') + '</span>' +
        '</button>'
      ).join('');
      resultsBox.querySelectorAll('.compare-result[data-idx]').forEach(btn => {
        btn.onclick = () => {
          const c = currentResults[parseInt(btn.dataset.idx, 10)];
          if (!c) return;
          if (slot === 'A') state.compareA = c; else state.compareB = c;
          renderCompare();
          renderList();
        };
      });
    }
    input.addEventListener('input', e => showResults(e.target.value));
    input.addEventListener('focus', e => showResults(e.target.value));
    showResults('');
  });
}

// Step 1: choose a country for each side, then Compare
function renderCompareSelect(root) {
  const a = state.compareA, b = state.compareB, both = a && b;
  root.innerHTML =
    '<div class="compare-select">' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<button class="back-btn" style="margin:0" onclick="setMode(\'explore\')">← Exit</button>' +
      '</div>' +
      '<h2 style="color:var(--accent);font-size:24px;margin:10px 0 2px">Compare countries</h2>' +
      '<p style="color:var(--ink-dim);font-size:14px;margin-bottom:16px">Pick a country for each side, then tap Compare.</p>' +
      '<div class="compare-slots">' + renderCompareSlotPicker(a, 'A') + renderCompareSlotPicker(b, 'B') + '</div>' +
      renderCompareTray() +
      '<button class="btn-primary" id="cmp-go"' + (both ? '' : ' disabled') +
        ' style="width:100%;padding:14px;margin-top:16px' + (both ? '' : ';opacity:.5;cursor:not-allowed') + '">' +
        (both ? 'Compare ▶' : 'Pick two countries to compare') +
      '</button>' +
    '</div>';

  wireCompareSearch(root);

  // Drag tray: drag a chip onto a side (or tap to fill the next empty side)
  const traySearch = root.querySelector('#tray-search');
  if (traySearch) traySearch.addEventListener('input', e => fillTrayChips(root, e.target.value));
  fillTrayChips(root, '');

  // "Change" on a chosen side
  root.querySelectorAll('.compare-swap').forEach(btn => {
    btn.onclick = () => {
      const slot = btn.dataset.slot;
      if (slot === 'A') state.compareA = null; else state.compareB = null;
      renderCompare();
      renderList();
    };
  });

  // Submit
  const go = $('cmp-go');
  if (go && both) go.onclick = () => { state.compareSubmitted = true; renderCompare(); };
}

// Step 2: the side-by-side comparison
function renderCompareResult(root) {
  root.innerHTML =
    '<div class="compare-topbar">' +
      '<button class="back-btn" id="cmp-edit" style="margin:0">← Edit selection</button>' +
      '<button class="back-btn" id="cmp-exit" style="margin:0">Exit ✕</button>' +
    '</div>' +
    renderCompareCol(state.compareA, 'A') + renderCompareCol(state.compareB, 'B');

  $('cmp-edit').onclick = () => { state.compareSubmitted = false; renderCompare(); };
  $('cmp-exit').onclick = () => { state.compareSubmitted = false; setMode('explore'); };
  root.querySelectorAll('.compare-swap').forEach(btn => {
    btn.onclick = () => {
      const slot = btn.dataset.slot;
      if (slot === 'A') state.compareA = null; else state.compareB = null;
