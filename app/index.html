// Stable RevenueCat app_user_id. Anonymous per-install until the user signs in,
// at which point it becomes their account id so purchases follow them across
// devices and platforms.
function getAppUserId() {
  try {
    const acc = getAccount();
    if (acc && acc.id) return acc.id;
    let id = localStorage.getItem('myatlastic_uid');
    if (!id) {
      const rnd = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID()
        : (Date.now().toString(36) + Math.random().toString(36).slice(2));
      id = 'atl_' + rnd;
      localStorage.setItem('myatlastic_uid', id);
    }
    return id;
  } catch (e) { return 'atl_anon'; }
}
function getAccount() { try { return JSON.parse(localStorage.getItem('myatlastic_account') || 'null'); } catch (e) { return null; } }
function setAccount(acc) {
  try { acc ? localStorage.setItem('myatlastic_account', JSON.stringify(acc)) : localStorage.removeItem('myatlastic_account'); } catch (e) {}
}

function setProState(isPro) {
  state.isPro = !!isPro;

const Billing = {
  configured: false,
  _rc() { return (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Purchases) || null; },
  isNative() { return !!(window.Capacitor && typeof window.Capacitor.isNativePlatform === 'function' && window.Capacitor.isNativePlatform()); },
  live() { return !!(BILLING_CONFIG.revenueCatApiKey && this.isNative() && this._rc()); },

  async init() {
    // Re-check entitlement when the app returns to the foreground — catches renewals,
    // restores done in iOS Settings, and Family Sharing changes. Harmless in demo mode.
    this._wireResume();
    if (!this.live()) return;                       // demo mode — nothing to configure
    try {
      await this._rc().configure({ apiKey: BILLING_CONFIG.revenueCatApiKey });
      this.configured = true;
      // If the user is signed in, tie this device to their RevenueCat customer so
      // entitlements bought on web (or another device) sync here.
      const acc = getAccount();
      if (acc && acc.id) { try { await this._rc().logIn({ appUserID: acc.id }); } catch (e) {} }
      // Real-time entitlement updates (renewals, family-shared access, restores elsewhere)
      try { this._rc().addCustomerInfoUpdateListener((customerInfo) => setProState(this._hasPro(customerInfo))); } catch (e) {}
      await this.refresh();
    } catch (e) { console.warn('[Billing] configure failed', e); }
  },

  // Point this install at a signed-in user's RevenueCat customer (cross-platform sync).
  async identify(userId) {
    if (this.live() && this.configured) {
      try { await this._rc().logIn({ appUserID: userId }); await this.refresh(); } catch (e) { console.warn('[Billing] logIn failed', e); }
    }
  },
  async signOut() {
    if (this.live() && this.configured) { try { await this._rc().logOut(); } catch (e) {} }
    setProState(false);
    await this.refresh();
  },

  _wireResume() {
    if (this._resumeWired) return;
    this._resumeWired = true;
    const App = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App;
    if (App && App.addListener) {
      try { App.addListener('appStateChange', (s) => { if (s && s.isActive) this.refresh(); }); } catch (e) {}
    }
  },

  async refresh() {
    if (!this.live() || !this.configured) return;
    try {
      const { customerInfo } = await this._rc().getCustomerInfo();
      setProState(this._hasPro(customerInfo));
    } catch (e) { console.warn('[Billing] getCustomerInfo failed', e); }
  },

  _hasPro(ci) {
    const active = ci && ci.entitlements && ci.entitlements.active;
    return !!(active && active[BILLING_CONFIG.entitlementId]);
  },

  async _packageFor(plan) {
    try {
      const offerings = await this._rc().getOfferings();
      const cur = offerings && offerings.current;
      if (!cur || !cur.availablePackages) return null;
      const id = BILLING_CONFIG.products[plan];
      return cur.availablePackages.find(p => p.product && p.product.identifier === id) || null;
    } catch (e) { return null; }
  },

  _webCheckoutUrl(plan) {
    const wb = BILLING_CONFIG.webBilling || {};
    if (wb.paywallLink) {
      // RevenueCat Web Billing paywall link — grant the purchase to this app_user_id
      // so it syncs to the same customer's other devices/platforms.
      const sep = wb.paywallLink.indexOf('?') === -1 ? '?' : '&';
      return wb.paywallLink + sep + 'app_user_id=' + encodeURIComponent(getAppUserId()) +
        (plan ? '&plan=' + encodeURIComponent(plan) : '');
    }
    const m = BILLING_CONFIG.webCheckout || {};
    return m[plan] || m.all || '';
  },
  // Web (browser) purchase path — not Apple IAP. Sends the user to a hosted
  // checkout if configured; otherwise a clean "coming soon" status.
  _webPurchase(plan) {
    if (BILLING_CONFIG.devMode) { setProState(true); return { ok: true, demo: true }; }
    const url = this._webCheckoutUrl(plan);
    if (url) return { ok: false, web: true, url: url };
    return { ok: false, webUnconfigured: true };
  },

  // resolves to { ok, demo?, web?, url?, webUnconfigured?, cancelled?, error? }
  async purchase(plan) {
    if (!this.live()) return this._webPurchase(plan);
    try {
      if (!this.configured) await this.init();
      const rc = this._rc();
      let result;
      const pkg = await this._packageFor(plan);
      if (pkg) {
        result = await rc.purchasePackage({ aPackage: pkg });
      } else {
        const id = BILLING_CONFIG.products[plan];
        const { products } = await rc.getProducts({ productIdentifiers: [id] });
        if (!products || !products.length) throw new Error('Product unavailable: ' + id);
        result = await rc.purchaseStoreProduct({ product: products[0] });
      }
      const ok = this._hasPro(result && result.customerInfo);
      setProState(ok);
      return { ok: ok };
    } catch (e) {
      if (e && (e.userCancelled || e.code === '1' || e.code === 1)) return { ok: false, cancelled: true };
      console.warn('[Billing] purchase failed', e);
      return { ok: false, error: (e && e.message) || 'Purchase failed' };
    }
  },

  async restore() {
    if (!this.live()) {
      if (BILLING_CONFIG.devMode) { setProState(true); return { ok: true, demo: true }; }
      return { ok: false, webUnconfigured: true };
    }
    try {
      if (!this.configured) await this.init();
      const { customerInfo } = await this._rc().restorePurchases();
      const ok = this._hasPro(customerInfo);
      setProState(ok);
      return { ok: ok };
    } catch (e) { return { ok: false, error: (e && e.message) || 'Restore failed' }; }
  },
};

/* ============================================================
 * ACCOUNTS — sign-in so a purchase made on one platform (e.g. web)
 * follows the same person to their iPhone. Gated by BILLING_CONFIG.auth;
 * inert until you add credentials (see docs/WEB_BILLING_AND_ACCOUNTS.md).
 * ============================================================ */
function loadScriptOnce(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector('script[data-src="' + src + '"]')) return resolve();
    const s = document.createElement('script');
    s.src = src; s.async = true; s.defer = true; s.dataset.src = src;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('script load failed: ' + src));
    document.head.appendChild(s);
  });
}
function decodeJwt(token) {
  try {
    const part = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(escape(atob(part))));
  } catch (e) { return {}; }
}
const Account = {
  configured() { const a = BILLING_CONFIG.auth || {}; return !!(a.googleClientId || a.appleEnabled); },
  current() { return getAccount(); },
  async afterSignIn(acc) {
    setAccount(acc);
    await Billing.identify(getAppUserId());   // tie this device to the account's RC customer
    await Billing.refresh();                   // pull any entitlement bought elsewhere
  },
  async signInGoogle() {
    const cid = BILLING_CONFIG.auth && BILLING_CONFIG.auth.googleClientId;
    if (!cid) return { ok: false, error: 'Google sign-in not configured' };
    try {
      await loadScriptOnce('https://accounts.google.com/gsi/client');
      await new Promise(r => setTimeout(r, 350));
      if (!(window.google && google.accounts && google.accounts.id)) return { ok: false, error: 'Google library unavailable' };
      return await new Promise((resolve) => {
        google.accounts.id.initialize({
          client_id: cid,
          callback: async (resp) => {
            const c = decodeJwt(resp.credential);
            if (!c.sub) return resolve({ ok: false, error: 'No identity returned' });
            await Account.afterSignIn({ provider: 'google', id: 'g_' + c.sub, email: c.email || '', name: c.name || '' });
            resolve({ ok: true });
          },
        });
        google.accounts.id.prompt();
      });
    } catch (e) { return { ok: false, error: (e && e.message) || 'Google sign-in failed' }; }
  },
  async signInApple() {
    // Native iOS via the Capacitor Sign in with Apple plugin (web Apple needs a
    // server verify endpoint — see the setup doc).
    const p = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SignInWithApple;
    if (p && p.authorize) {
      try {
        const r = await p.authorize({ requestedScopes: [] });
        const resp = (r && r.response) || {};
        const uid = resp.user || (resp.identityToken && decodeJwt(resp.identityToken).sub);
        if (!uid) return { ok: false, error: 'No Apple identity' };
        await Account.afterSignIn({ provider: 'apple', id: 'a_' + uid, email: resp.email || '' });
        return { ok: true };
      } catch (e) { return { ok: false, error: (e && e.message) || 'Apple sign-in failed' }; }
    }
    return { ok: false, error: 'Apple sign-in needs the native app (or a web verify endpoint).' };
  },
  async signOut() {
    setAccount(null);
    await Billing.signOut();
  },
};

/* ============================================================
 * CURRENCY CONVERTER (Pro) — live FX via open.er-api.com (keyless)
 * ============================================================ */
let fxCache = { rates: null, ts: 0, updated: '' };

function buildCurrencyList() {
  const map = {};
  COUNTRIES.forEach(c => {
    if (!c.cur) return;
    const m = c.cur.match(/\(([A-Za-z]{3})\)/);
    if (!m) return;
    const code = m[1].toUpperCase();
    const name = c.cur.replace(/\s*\([^)]*\)\s*/, '').trim();
    if (!map[code]) map[code] = { code: code, name: name };
  });
  return Object.values(map).sort((a, b) => a.code.localeCompare(b.code));
}

async function fetchRates() {
  // Cache for 1 hour to limit network calls
  if (fxCache.rates && (Date.now() - fxCache.ts) < 3600000) return fxCache.rates;
  const res = await fetch('https://open.er-api.com/v6/latest/USD');
  const data = await res.json();
  if (!data || data.result !== 'success' || !data.rates) throw new Error('bad FX response');
  fxCache = { rates: data.rates, ts: Date.now(), updated: data.time_last_update_utc || '' };
  return fxCache.rates;
}

function renderCurrency() {
  const root = $('view-currency');
  if (!state.isPro) {
    root.innerHTML = '<div class="center-card quiz-card">' +
      '<div class="quiz-eyebrow">Pro feature</div>' +

      '<p style="color:var(--ink-dim);margin-bottom:24px">Convert between the currencies of every country with live exchange rates.</p>' +
      '<button class="btn-primary" onclick="window.__myatlasticOpenPaywall()">See plans</button>' +
      '</div>';
    return;
  }

  const list = buildCurrencyList();
  const opts = list.map(x => '<option value="' + x.code + '">' + x.code + ' — ' + escapeHtml(x.name) + '</option>').join('');
  if (!state.fxFrom) state.fxFrom = 'USD';
  if (!state.fxTo) state.fxTo = 'EUR';
  if (state.fxAmount == null) state.fxAmount = '1';

  const field = 'width:100%;padding:12px;margin-top:6px;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:10px;font-size:16px';
  const lbl = 'font-size:12px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.04em';

  root.innerHTML =
    '<div class="center-card" style="max-width:520px;text-align:left">' +
      '<h2 style="color:var(--accent);font-size:28px;margin-bottom:4px;text-align:center">Currency Converter</h2>' +
      '<p style="color:var(--ink-dim);margin-bottom:22px;font-size:14px;text-align:center">Live exchange rates across every country.</p>' +
      '<label style="' + lbl + '">Amount<input id="fx-amount" type="number" inputmode="decimal" min="0" step="any" value="' + escapeHtml(state.fxAmount) + '" style="' + field + '"></label>' +
      '<div style="margin-top:14px"><label style="' + lbl + '">From<select id="fx-from" style="' + field + '">' + opts + '</select></label></div>' +
      '<div style="text-align:center;margin:12px 0"><button id="fx-swap" style="background:var(--panel-2);color:var(--accent);border:1px solid var(--line);border-radius:20px;padding:6px 18px;cursor:pointer;font-size:14px">⇅ Swap</button></div>' +
      '<div><label style="' + lbl + '">To<select id="fx-to" style="' + field + '">' + opts + '</select></label></div>' +
      '<div id="fx-result" style="margin-top:24px;padding:18px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;text-align:center;font-size:22px;font-weight:600;color:var(--ink)">Loading rates…</div>' +
      '<div id="fx-rate" style="margin-top:10px;font-size:12px;color:var(--ink-dim);text-align:center"></div>' +
    '</div>';

  $('fx-from').value = state.fxFrom;
  $('fx-to').value = state.fxTo;

  function convert() {
    const from = $('fx-from').value, to = $('fx-to').value;
    state.fxFrom = from; state.fxTo = to; state.fxAmount = $('fx-amount').value;
    const amount = parseFloat($('fx-amount').value);
    const resultEl = $('fx-result'), rateEl = $('fx-rate');
    if (!fxCache.rates) { resultEl.textContent = 'Loading rates…'; return; }
    if (isNaN(amount)) { resultEl.textContent = 'Enter an amount'; rateEl.textContent = ''; return; }
    const rf = fxCache.rates[from], rt = fxCache.rates[to];
    if (!rf || !rt) { resultEl.textContent = 'Rate unavailable for ' + (!rf ? from : to); rateEl.textContent = ''; return; }
    const rate = rt / rf;
    resultEl.textContent = (amount * rate).toLocaleString(undefined, { maximumFractionDigits: 2 }) + ' ' + to;
    rateEl.textContent = '1 ' + from + ' = ' + rate.toLocaleString(undefined, { maximumFractionDigits: 4 }) + ' ' + to +
      (fxCache.updated ? ' · updated ' + fxCache.updated.replace(/ \d\d:\d\d:\d\d.*$/, '') : '');
  }

  $('fx-amount').addEventListener('input', convert);
  $('fx-from').addEventListener('change', convert);
  $('fx-to').addEventListener('change', convert);
  $('fx-swap').onclick = () => {
    const f = $('fx-from').value;
    $('fx-from').value = $('fx-to').value;
    $('fx-to').value = f;
    convert();
  };

  fetchRates().then(convert).catch(() => {
    $('fx-result').textContent = 'Could not load rates';
    $('fx-rate').innerHTML = '<a href="#" id="fx-retry" style="color:var(--accent)">Tap to retry</a>';
    const r = document.getElementById('fx-retry');
    if (r) r.onclick = (e) => { e.preventDefault(); fxCache.ts = 0; renderCurrency(); };
  });
}

function startGame() {
  gameState = {
    round: 0, totalRounds: 10, correct: 0,
    pool: gameShuffle([...GAME_POOL]).slice(0, 10),
    status: 'playing'
  };
  nextGameRound();
}

function nextGameRound() {
  gameState.round++;
  if (gameState.round > gameState.totalRounds) { gameState.status = 'over'; renderGame(); return; }
  const target = gameState.pool[gameState.round - 1];
  const letters = target.n.toUpperCase().replace(/ /g, '').split('');
  gameState.target = target;
  gameState.tiles = gameShuffle(letters.map((ch, i) => ({ ch: ch, id: i })));
  gameState.placed = [];      // tile ids in placement order
  gameState.wrong = false;
  gameState.revealed = false;
  gameState.status = 'playing';
  renderGame();
}

function checkGameAnswer() {
  const g = gameState;
  const guess = g.placed.map(id => g.tiles.find(t => t.id === id).ch).join('');
  const answer = g.target.n.toUpperCase().replace(/ /g, '');
  if (guess.length < answer.length) return;
  if (guess === answer) {
    g.correct++;
    g.status = 'roundOver';
    renderGame();
  } else {
    g.wrong = true;
    renderGame();
  }
}

function renderGameRound(root) {
  const g = gameState, t = g.target;
  const answer = t.n.toUpperCase();
  let placedIdx = 0;
  const slots = answer.split('').map(ch => {
    if (ch === ' ') return '<span style="width:14px;display:inline-block"></span>';
    const tileId = g.placed[placedIdx];
    const pos = placedIdx;
    placedIdx++;
    const letter = (tileId != null) ? g.tiles.find(x => x.id === tileId).ch : '';
    return '<span class="game-slot" data-slotpos="' + pos + '" style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:42px;margin:3px;border-bottom:3px solid ' + (letter ? 'var(--accent)' : 'var(--line)') + ';font-size:24px;font-weight:700;color:var(--ink)">' + letter + '</span>';
  }).join('');

  const rack = g.tiles.map(tile => {
    const used = g.placed.indexOf(tile.id) !== -1;
    return '<button class="game-tile" data-tileid="' + tile.id + '"' + (used ? ' disabled' : '') +
      ' style="width:44px;height:50px;margin:4px;border-radius:8px;font-size:22px;font-weight:700;cursor:' + (used ? 'default' : 'pointer') +
      ';border:1px solid var(--line);background:' + (used ? 'var(--panel)' : 'var(--panel-2)') +
      ';color:' + (used ? 'var(--line)' : 'var(--accent)') + '">' + tile.ch + '</button>';
  }).join('');

  let statusHtml = '';
  if (g.status === 'roundOver' && !g.revealed) {
    statusHtml = '<div style="color:var(--success);font-weight:700;font-size:18px;margin:14px 0">✓ Correct! It\'s ' + escapeHtml(t.n) + '</div>';
  } else if (g.status === 'roundOver') {
    statusHtml = '<div style="color:var(--ink-dim);font-weight:600;font-size:17px;margin:14px 0">It\'s ' + escapeHtml(t.n) + '</div>';
  } else if (g.wrong) {
    statusHtml = '<div style="color:var(--danger);margin:10px 0">Not quite — tap a letter to remove it, then try again.</div>';
  }

  const speakBtn = speech.available
    ? '<button onclick="window.__myatlasticSpeak(' + JSON.stringify(t.n).replace(/"/g, '&quot;') + ')" aria-label="Hear the name" style="background:var(--panel-2);border:1px solid var(--line);border-radius:50%;width:46px;height:46px;font-size:20px;cursor:pointer">🔊</button>'
    : '';

  root.innerHTML =
    '<div class="center-card" style="max-width:520px;text-align:center">' +
      '<div style="text-align:left"><button class="back-btn" onclick="window.__myatlasticExitGame()" style="margin-bottom:8px">← Quit</button></div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px;color:var(--ink-dim)">' +
        '<span>Country ' + g.round + ' / ' + g.totalRounds + '</span>' +
        '<span>Correct: <b style="color:var(--accent)">' + g.correct + '</b></span>' +
      '</div>' +
      '<div style="font-size:64px;line-height:1;margin:14px 0 6px">' + (t.flag || '🌐') + '</div>' +
      '<div style="color:var(--ink-dim);font-size:13px">' + escapeHtml(t.c) + (t.cap ? ' · capital ' + escapeHtml(t.cap) : '') + '</div>' +
      '<div style="margin:10px 0 4px">' + speakBtn + '</div>' +
      '<div style="margin:14px 0;min-height:48px">' + slots + '</div>' +
      statusHtml +
      (g.status === 'playing'
        ? '<div style="margin:16px 0">' + rack + '</div>' +
          '<div style="display:flex;gap:8px;justify-content:center">' +
          '<button id="game-clear" style="background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:8px;padding:8px 16px;cursor:pointer">Clear</button>' +
          '<button id="game-reveal" style="background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:8px;padding:8px 16px;cursor:pointer">Reveal</button>' +
          '</div>'
        : '<button class="btn-primary" id="game-next" style="width:100%;padding:14px;margin-top:8px">' + (g.round >= g.totalRounds ? 'See results' : 'Next →') + '</button>'
      ) +
    '</div>';

  if (g.status === 'playing') {
    root.querySelectorAll('.game-tile').forEach(btn => {
      if (btn.disabled) return;
      btn.onclick = () => {
        const id = parseInt(btn.dataset.tileid, 10);
        if (g.placed.indexOf(id) !== -1) return;
        g.placed.push(id);
        g.wrong = false;
        renderGame();
        checkGameAnswer();
      };
    });
    root.querySelectorAll('.game-slot').forEach(slot => {
      slot.onclick = () => {
        const pos = parseInt(slot.dataset.slotpos, 10);
        if (pos < g.placed.length) { g.placed.splice(pos, 1); g.wrong = false; renderGame(); }
      };
    });
    const clr = $('game-clear');
    if (clr) clr.onclick = () => { g.placed = []; g.wrong = false; renderGame(); };
    const rev = $('game-reveal');
    if (rev) rev.onclick = () => { g.revealed = true; g.status = 'roundOver'; renderGame(); };
  } else {
    const nx = $('game-next');
    if (nx) nx.onclick = nextGameRound;
  }
}

function renderGameOver(root) {
  const g = gameState;
  const pct = g.totalRounds ? g.correct / g.totalRounds : 0;
  const emoji = pct === 1 ? '🏆' : pct >= 0.6 ? '🌟' : '🌍';
  const msg = pct === 1 ? 'Perfect — you spelled them all!' : pct >= 0.6 ? 'Great work!' : 'Keep exploring!';
  root.innerHTML =
    '<div class="center-card" style="max-width:460px;text-align:center">' +
      '<div style="font-size:64px;margin:10px 0">' + emoji + '</div>' +
      '<h2 style="color:var(--accent);font-size:26px;margin-bottom:8px">' + msg + '</h2>' +
      '<p style="font-size:18px;margin:14px 0">You spelled <b style="color:var(--accent)">' + g.correct + '</b> of ' + g.totalRounds + ' countries</p>' +
      '<button class="btn-primary" id="game-again" style="width:100%;padding:14px;margin-top:10px">Play again</button>' +
      '<button id="game-explore" style="width:100%;padding:12px;margin-top:10px;background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:10px;cursor:pointer">Back to Explore</button>' +
    '</div>';
  $('game-again').onclick = () => { gameState = null; renderGameIntro(root); };
  $('game-explore').onclick = () => { gameState = null; setMode('explore'); };
}

/* ============================================================
 * GLOBE — Three.js with photorealistic texture, flat-map fallback
 * ============================================================ */
let globeAPI = null;

function latLonToVec3(lat, lon, radius, THREE) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

async function initGlobe() {
  const label = $('globe-label');
  try {
    label.textContent = 'Loading globe...';
    // Try local bundled Three.js first (works offline, no CDN flakiness, required for App Store)
    let THREE;
    try {
      THREE = await import('./vendor/three.module.js');
    } catch (localErr) {
      console.warn('Local Three.js failed, trying CDN fallback:', localErr);
      // CDN fallback for the standalone HTML file with no /vendor folder available
      THREE = await import('https://unpkg.com/three@0.160.0/build/three.module.js');
    }
    label.textContent = '3D Globe · drag to rotate';
    setupGlobe(THREE);
  } catch (err) {
    console.error('Three.js failed, using flat map:', err);
    label.textContent = '2D Map · click any country';
    document.body.classList.add('flat-mode');
    renderFlatMap();
  }
}

function setupGlobe(THREE) {
  const canvas = $('globe-canvas');
  const wrap = canvas.parentElement;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.z = 4;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

  function resize() {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    if (w === 0 || h === 0) return;
    renderer.setSize(w, h, false);
    const aspect = w / h;
    camera.aspect = aspect;
    // The camera FOV is vertical, so on portrait/narrow screens (iOS/Android)
    // the globe would overflow the sides. Widen the FOV when aspect < 1 so the
    // whole globe fits. On landscape/desktop (aspect >= 1) this resolves to
    // ~45deg, leaving the web size unchanged.
    const BASE_D = 4, R = 1.5, margin = 1.1;
    const fit = Math.min(1, aspect);
    camera.fov = 2 * Math.atan((R * margin) / (BASE_D * fit)) * (180 / Math.PI);
    camera.updateProjectionMatrix();
  }
  resize();
  new ResizeObserver(resize).observe(wrap);

  const globeGroup = new THREE.Group();
  scene.add(globeGroup);

  const earthGeo = new THREE.SphereGeometry(1.5, 64, 64);
  const earthMat = new THREE.MeshPhongMaterial({
    color: 0x2a4a6e,
    shininess: 12,
    specular: 0x223344,
  });
  const earth = new THREE.Mesh(earthGeo, earthMat);
  globeGroup.add(earth);

  const TEXTURE_URLS = [
    './vendor/earth-blue-marble.jpg',
    'https://unpkg.com/three-globe@2.31.0/example/img/earth-blue-marble.jpg',
    'https://cdn.jsdelivr.net/npm/three-globe@2.31.0/example/img/earth-blue-marble.jpg',
  ];
  const loader = new THREE.TextureLoader();
  loader.crossOrigin = 'anonymous';
  function tryLoad(idx) {
    if (idx >= TEXTURE_URLS.length) return;
    loader.load(
      TEXTURE_URLS[idx],
      tex => {
        if (tex && 'colorSpace' in tex) tex.colorSpace = THREE.SRGBColorSpace;
        earthMat.map = tex;
        earthMat.color.setHex(0xffffff);
        earthMat.needsUpdate = true;
      },
      undefined,
      () => tryLoad(idx + 1)
    );
  }
  tryLoad(0);

  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(1.6, 64, 64),
    new THREE.ShaderMaterial({
      vertexShader: 'varying vec3 vN; void main(){vN = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);}',
      fragmentShader: 'varying vec3 vN; void main(){float i = pow(0.7 - dot(vN, vec3(0.0,0.0,1.0)), 2.0); gl_FragColor = vec4(0.43,0.66,0.95,1.0)*i;}',
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending,
      transparent: true,
    })
  );
  globeGroup.add(glow);

  const ambient = new THREE.AmbientLight(0xffffff, 0.65);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xfff1d0, 1.1);
  sun.position.set(5, 3, 5);
  scene.add(sun);

  const pinsGroup = new THREE.Group();
  globeGroup.add(pinsGroup);
  const pinGeo = new THREE.SphereGeometry(0.018, 10, 10);
  const pinFree = new THREE.MeshBasicMaterial({ color: 0xff5544 });
  const pinLocked = new THREE.MeshBasicMaterial({ color: 0xb89460 });
  COUNTRIES.forEach(c => {
    const pos = latLonToVec3(c.lat, c.lon, 1.518, THREE);
    const pin = new THREE.Mesh(pinGeo, (isFree(c) || state.isPro) ? pinFree : pinLocked);
    pin.position.copy(pos);
    pin.userData = c;
    pinsGroup.add(pin);
  });

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.05, 0.07, 32),
    new THREE.MeshBasicMaterial({ color: 0xffaa44, side: THREE.DoubleSide, transparent: true, opacity: 0.95 })
  );
  ring.visible = false;
  scene.add(ring);

  // DAY / NIGHT — point the sun at the real subsolar point so the lit and dark
  // hemispheres match the actual time right now. Toggled off by default.
  let dayNight = false;
  function subsolarLocalDir() {
    const now = new Date();
    const start = new Date(Date.UTC(now.getUTCFullYear(), 0, 0));
    const dayOfYear = Math.floor((now - start) / 86400000);
    // Solar declination (deg), simple but good-enough approximation.
    const decl = -23.44 * Math.cos((2 * Math.PI / 365) * (dayOfYear + 10));
    const utcHours = now.getUTCHours() + now.getUTCMinutes() / 60;
    const subLon = -15 * (utcHours - 12); // longitude where it's local noon
    return latLonToVec3(decl, subLon, 1, THREE).normalize();
  }

  // EXPLORER AVATAR — an emoji sprite that rides to the active country and bobs.
  // Levels up (icon changes) as the child unlocks more of the world.
  function makeEmojiSprite(emoji, depthTest) {
    const cv = document.createElement('canvas');
    cv.width = cv.height = 128;
    const ctx = cv.getContext('2d');
    ctx.font = '96px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, 64, 72);
    const tex = new THREE.CanvasTexture(cv);
    if ('colorSpace' in tex) tex.colorSpace = THREE.SRGBColorSpace;
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: depthTest !== false });
    const sp = new THREE.Sprite(mat);
    sp.scale.set(0.32, 0.32, 0.32);
    return sp;
  }
  const avatar = makeEmojiSprite(explorerLevel().icon, false);
  avatar.visible = false;
  avatar.renderOrder = 999;
  scene.add(avatar);
  let avatarIcon = explorerLevel().icon;

  // ALL-FLAGS layer — a flag sprite at every country, built lazily. Depth-tested
  // so the Earth occludes flags on the far side as the globe spins.
  let flagsGroup = null;
  function buildFlags() {
    if (flagsGroup) return;
    flagsGroup = new THREE.Group();
    globeGroup.add(flagsGroup);
    COUNTRIES.forEach(c => {
      if (!c.flag || typeof c.lat !== 'number') return;
      const sp = makeEmojiSprite(c.flag, true);
      sp.scale.set(0.17, 0.17, 0.17);
      sp.position.copy(latLonToVec3(c.lat, c.lon, 1.525, THREE));
      flagsGroup.add(sp);
    });
    flagsGroup.visible = false;
  }

  let isDragging = false, prevX = 0, prevY = 0, dragStartX = 0, dragStartY = 0;
  let targetRotY = 0, targetRotX = 0, currentRotY = 0, currentRotX = 0;
  let targetZoom = 4, autoSpin = true, lastTouchDist = 0;

  const raycaster = new THREE.Raycaster();
  raycaster.params.Mesh.threshold = 0.05;
  const mouseVec = new THREE.Vector2();
  function pickPin(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    mouseVec.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouseVec.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseVec, camera);
    const hits = raycaster.intersectObjects(pinsGroup.children, false);
    return hits.length ? hits[0].object.userData : null;
  }

  canvas.addEventListener('mousedown', e => {
    isDragging = true; prevX = e.clientX; prevY = e.clientY;
    dragStartX = e.clientX; dragStartY = e.clientY;
    autoSpin = false;
  });
  window.addEventListener('mouseup', e => {
    if (isDragging) {
      const moved = Math.abs(e.clientX - dragStartX) + Math.abs(e.clientY - dragStartY);
      if (moved < 5) {
        const c = pickPin(e.clientX, e.clientY);
        if (c) {
          state.activeCountry = c;
          renderList();
          renderDetails();
          if (window.innerWidth <= 900 && state.mode === 'explore') setMobilePane('details');
        }
      }
    }
    isDragging = false;
  });
  window.addEventListener('mousemove', e => {
    if (isDragging) {
      targetRotY += (e.clientX - prevX) * 0.005;
      targetRotX += (e.clientY - prevY) * 0.005;
      targetRotX = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, targetRotX));
      prevX = e.clientX; prevY = e.clientY;
    } else if (canvas.contains(e.target)) {
      const c = pickPin(e.clientX, e.clientY);
      const tt = $('globe-tooltip');
      if (c) {
        $('tt-flag').textContent = c.flag || '🌐';
        $('tt-name').textContent = c.n;
        $('tt-cap').textContent = c.cap + ' · ' + c.c.split(' / ')[0];
        const rect = canvas.getBoundingClientRect();
        tt.style.display = 'block';
        tt.style.left = Math.min(rect.width - tt.offsetWidth - 16, e.clientX - rect.left + 18) + 'px';
        tt.style.top = Math.max(8, e.clientY - rect.top - tt.offsetHeight - 12) + 'px';
        canvas.style.cursor = 'pointer';
      } else {
        tt.style.display = 'none';
        canvas.style.cursor = 'grab';
      }
    }
  });
  canvas.addEventListener('mouseleave', () => { $('globe-tooltip').style.display = 'none'; });

  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
      dragStartX = prevX; dragStartY = prevY;
      autoSpin = false;
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (e.changedTouches.length === 1 && isDragging) {
      const t = e.changedTouches[0];
      const moved = Math.abs(t.clientX - dragStartX) + Math.abs(t.clientY - dragStartY);
      if (moved < 8) {
        const c = pickPin(t.clientX, t.clientY);
        if (c) {
          state.activeCountry = c;
          renderList();
          renderDetails();
          if (window.innerWidth <= 900 && state.mode === 'explore') setMobilePane('details');
        }
      }
    }
    isDragging = false;
  });
  canvas.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && isDragging) {
      targetRotY += (e.touches[0].clientX - prevX) * 0.005;
      targetRotX += (e.touches[0].clientY - prevY) * 0.005;
      targetRotX = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, targetRotX));
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (lastTouchDist > 0) {
        targetZoom = Math.max(2.5, Math.min(7, targetZoom * (lastTouchDist / dist)));
      }
      lastTouchDist = dist;
    }
  }, { passive: true });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    targetZoom = Math.max(2.5, Math.min(7, targetZoom + e.deltaY * 0.003));
  }, { passive: false });

  let avatarT = 0;
  function animate() {
    requestAnimationFrame(animate);
    if (autoSpin && !isDragging) targetRotY += 0.0015;
    currentRotY += (targetRotY - currentRotY) * 0.08;
    currentRotX += (targetRotX - currentRotX) * 0.08;
    globeGroup.rotation.y = currentRotY;
    globeGroup.rotation.x = currentRotX;
    camera.position.z += (targetZoom - camera.position.z) * 0.08;
    if (dayNight) {
      // Rotate the real sun direction into scene space so it tracks geography
      // as the user spins the globe.
      const dir = subsolarLocalDir().applyEuler(new THREE.Euler(currentRotX, currentRotY, 0, 'XYZ'));
      sun.position.copy(dir.multiplyScalar(6));
      sun.intensity = 1.5;
      ambient.intensity = 0.12;
    }
    if (ring.visible && state.activeCountry) {
      const p = latLonToVec3(state.activeCountry.lat, state.activeCountry.lon, 1.55, THREE);
      p.applyEuler(new THREE.Euler(currentRotX, currentRotY, 0, 'XYZ'));
      ring.position.copy(p);
      ring.lookAt(camera.position);
      // Avatar bobs just above the active country and faces the camera.
      avatarT += 0.05;
      const bob = 1.62 + Math.sin(avatarT) * 0.03;
      const ap = latLonToVec3(state.activeCountry.lat, state.activeCountry.lon, bob, THREE);
      ap.applyEuler(new THREE.Euler(currentRotX, currentRotY, 0, 'XYZ'));
      avatar.position.copy(ap);
      // Hide the avatar when it's on the far side of the globe.
      avatar.visible = ap.z > -0.2;
    }
    renderer.render(scene, camera);
  }
  animate();

  globeAPI = {
    focus(c) {
      autoSpin = false;
      targetRotY = -c.lon * (Math.PI / 180) - Math.PI / 2;
      targetRotX = c.lat * (Math.PI / 180) * 0.6;
      ring.visible = true;
      avatar.visible = true;
      // Refresh the avatar icon in case the explorer levelled up.
      const ic = explorerLevel().icon;
      if (ic !== avatarIcon) {
        avatarIcon = ic;
        avatar.material.map = makeEmojiSprite(ic).material.map;
        avatar.material.needsUpdate = true;
      }
    },
    setDayNight(on) {
      dayNight = on;
      if (!on) { sun.position.set(5, 3, 5); sun.intensity = 1.1; ambient.intensity = 0.65; }
    },
    setFlags(on) {
      if (on) buildFlags();
      if (flagsGroup) flagsGroup.visible = on;
      pinsGroup.visible = !on;        // swap dots for flags to avoid clutter
      if (on) autoSpin = true;        // let it spin so you see them all go by
    },
    resize
  };
}

/* ============================================================
 * FLAT MAP FALLBACK
 * ============================================================ */
function renderFlatMap() {
  const svg = $('flat-map');
  svg.innerHTML = '';
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = '<linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a3a5f"/><stop offset="1" stop-color="#0a1828"/></linearGradient>';
  svg.appendChild(defs);
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('x', '-180'); bg.setAttribute('y', '-90');
  bg.setAttribute('width', '360'); bg.setAttribute('height', '180');
  bg.setAttribute('fill', 'url(#oceanGrad)');
  svg.appendChild(bg);
  for (let lat = -60; lat <= 60; lat += 30) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', '-180'); line.setAttribute('x2', '180');
    line.setAttribute('y1', String(-lat)); line.setAttribute('y2', String(-lat));
    line.setAttribute('stroke', '#1a2435'); line.setAttribute('stroke-width', '0.3');
    svg.appendChild(line);
  }
  for (let lon = -150; lon <= 150; lon += 30) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', String(lon)); line.setAttribute('x2', String(lon));
    line.setAttribute('y1', '-90'); line.setAttribute('y2', '90');
    line.setAttribute('stroke', '#1a2435'); line.setAttribute('stroke-width', '0.3');
    svg.appendChild(line);
  }
  COUNTRIES.forEach(c => {
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', String(c.lon));
    dot.setAttribute('cy', String(-c.lat));
    dot.setAttribute('r', '1.2');
    dot.setAttribute('fill', (isFree(c) || state.isPro) ? '#ff5544' : '#b89460');
    dot.setAttribute('stroke', '#0b0e13');
    dot.setAttribute('stroke-width', '0.2');
    dot.style.cursor = 'pointer';
    dot.addEventListener('click', () => {
      state.activeCountry = c;
      renderList();
      renderDetails();
      if (window.innerWidth <= 900 && state.mode === 'explore') setMobilePane('details');
    });
    svg.appendChild(dot);
  });
}

/* ============================================================
 * UI HOOKUP
 * ============================================================ */
function updateStreakDisplay() {
  const s = getStreak();
  $('streak-display').textContent = s > 0 ? '🔥 ' + s + '-day streak' : '';
}
function updateProBadge() {
  $('pro-badge').classList.toggle('hidden', state.isPro);
}

document.querySelectorAll('#mode-tabs button').forEach(b => {
  b.onclick = () => setMode(b.dataset.mode);
});
document.querySelectorAll('.mobile-bar button').forEach(b => {
  b.onclick = () => setMobilePane(b.dataset.pane);
});
$('pro-badge').onclick = () => setMode('paywall');
$('kids-toggle').onclick = () => {
  state.kidsMode = !state.kidsMode;
  document.body.classList.toggle('kids', state.kidsMode);
  const t = $('kids-toggle');
  t.textContent = 'Kids: ' + (state.kidsMode ? 'On' : 'Off');
  t.classList.toggle('on', state.kidsMode);
};
$('search').addEventListener('input', e => { state.search = e.target.value; renderList(); });

// Globe: day/night terminator toggle
const dnBtn = $('daynight-toggle');
if (dnBtn) dnBtn.onclick = () => {
  const on = !dnBtn.classList.contains('on');
  dnBtn.classList.toggle('on', on);
  $('globe-hint').textContent = on ? 'Lit side = daytime now · dark side = night' : 'Drag to spin · tap a pin to select';
  if (globeAPI && globeAPI.setDayNight) globeAPI.setDayNight(on);
};
// Globe: all-flags layer toggle
const flagsBtn = $('flags-toggle');
if (flagsBtn) flagsBtn.onclick = () => {
  const on = !flagsBtn.classList.contains('on');
  flagsBtn.classList.toggle('on', on);
  $('globe-hint').textContent = on ? 'All 195 flags · drag to spin the world' : 'Drag to spin · tap a pin to select';
  if (globeAPI && globeAPI.setFlags) globeAPI.setFlags(on);
};
// Globe: true-size comparison opener
const tsBtn = $('truesize-btn');
if (tsBtn) tsBtn.onclick = () => openTrueSize();
// Settings / Pro tools
const setBtn = $('settings-btn');
if (setBtn) setBtn.onclick = () => openSettings();

// Init — with diagnostic fallback so we never end up with "header only, nothing else"
try {
  updateStreakDisplay();
  updateProBadge();
  applySettings();
  updateExploreProgress();
  updateExplorerBadge();
  renderFilters();
  renderList();
  renderDetails();
  setMode('explore');
  if (window.innerWidth <= 900) setMobilePane('list');
  initGlobe();
  Billing.init();
  handleDeepLink();

  // Show onboarding tip for brand new visitors
  try {
    if (!localStorage.getItem('myatlastic_visited')) {
      localStorage.setItem('myatlastic_visited', '1');
      setTimeout(() => {
        if (window.innerWidth <= 900) {
          const tip = document.createElement('div');
          tip.className = 'onboard-tip';
          tip.textContent = 'Tap any country to explore it';
          document.body.appendChild(tip);
          setTimeout(() => tip.remove(), 4500);
        }
      }, 1500);
    }
  } catch (e) {}

  console.log('Myatlastic v7 ready · ' + COUNTRIES.length + ' countries · viewport ' + window.innerWidth + 'x' + window.innerHeight);

  // Debug HUD — tap logo 3 times to toggle
  let logoTaps = 0, logoTimer = null;
  const logoEl = document.querySelector('.logo');
  if (logoEl) {
    logoEl.style.cursor = 'pointer';
    logoEl.addEventListener('click', () => {
      logoTaps++;
      if (logoTimer) clearTimeout(logoTimer);
      logoTimer = setTimeout(() => { logoTaps = 0; }, 1000);
      if (logoTaps >= 3) {
        logoTaps = 0;
        toggleDebugHud();
      }
    });
  }

  function toggleDebugHud() {
    let hud = document.getElementById('debug-hud');
    if (hud) { hud.remove(); return; }
    hud = document.createElement('div');
    hud.id = 'debug-hud';
    hud.style.cssText = 'position:fixed;top:62px;right:6px;background:rgba(0,0,0,0.85);color:#0f0;font-family:monospace;font-size:10px;padding:8px 10px;border-radius:6px;border:1px solid #0f0;z-index:9999;max-width:240px;line-height:1.5;pointer-events:none';
    document.body.appendChild(hud);

    function update() {
      if (!document.getElementById('debug-hud')) return;
      const listVisible = document.querySelector('.pane.list.mobile-active') !== null;
      const globeVisible = document.querySelector('.pane.globe.mobile-active') !== null;
      const detailsVisible = document.querySelector('.pane.details.mobile-active') !== null;
      const mainEl = document.querySelector('main');
      const exploreView = document.getElementById('view-explore');
      const detailsPane = document.getElementById('details-pane');
      const globePane = document.querySelector('.pane.globe');
      hud.innerHTML =
        '<b style="color:#fff">DEBUG HUD</b><br>' +
        'viewport: ' + window.innerWidth + 'x' + window.innerHeight + '<br>' +
        'mode: ' + state.mode + '<br>' +
        'mobilePane: ' + state.mobilePane + '<br>' +
        'pro: ' + state.isPro + '<br>' +
        'active country: ' + (state.activeCountry ? state.activeCountry.n : 'none') + '<br>' +
        'globe ready: ' + (globeAPI !== null) + '<br>' +
        '<b style="color:#fff">layout</b><br>' +
        'main: ' + (mainEl ? mainEl.offsetWidth + 'x' + mainEl.offsetHeight : 'MISSING') + '<br>' +
        'view-explore: ' + (exploreView ? exploreView.offsetWidth + 'x' + exploreView.offsetHeight : 'MISSING') + '<br>' +
        'list visible: ' + listVisible + '<br>' +
        'globe visible: ' + globeVisible + '<br>' +
        'globe pane: ' + (globePane ? globePane.offsetWidth + 'x' + globePane.offsetHeight : 'MISSING') + '<br>' +
        'details visible: ' + detailsVisible + '<br>' +
        'details pane: ' + (detailsPane ? detailsPane.offsetWidth + 'x' + detailsPane.offsetHeight : 'MISSING') + '<br>' +
        '<span style="color:#fff;font-size:9px">tap logo 3× to close</span>';
      requestAnimationFrame(update);
    }
    update();
  }
} catch (initErr) {
  console.error('Init failed:', initErr);
  document.body.innerHTML = '<div style="padding:30px;color:#e8e4d8;background:#0b0e13;height:100vh;font-family:monospace;font-size:13px;line-height:1.6;overflow:auto">' +
    '<h2 style="color:#d4a056;font-family:Fraunces,serif;font-size:24px;margin-bottom:16px">Myatlastic init error</h2>' +
    '<p style="margin-bottom:12px">Something went wrong starting the app. Please send this to the developer:</p>' +
    '<pre style="background:#11151c;padding:12px;border-radius:6px;border:1px solid #232a36;overflow:auto;white-space:pre-wrap;word-break:break-word">' +
    String(initErr.stack || initErr).replace(/[<>&]/g, ch => ({'<':'&lt;','>':'&gt;','&':'&amp;'})[ch]) +
    '</pre>' +
    '<p style="margin-top:16px;font-size:11px;color:#8a8676">UA: ' + navigator.userAgent.replace(/[<>&]/g, ch => ({'<':'&lt;','>':'&gt;','&':'&amp;'})[ch]) + '</p>' +
    '<p style="font-size:11px;color:#8a8676">Viewport: ' + window.innerWidth + ' x ' + window.innerHeight + '</p>' +
    '</div>';
}

// Also catch async/render errors that aren't in the init block
window.addEventListener('error', (e) => {
  console.error('Uncaught:', e.error || e.message);
});

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

</script>
</body>
</html>
